[build]
  publish = "out"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# Netlify Analytics (server-side) does not require snippet injection
# To inject a JS snippet for alternative analytics, uncomment:
# [[headers]]
#   for = "/*"
#   [headers.values]
#     Content-Security-Policy = "script-src 'self' https://plausible.io"

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "staging"

[context.branch-deploy.environment]
  NODE_ENV = "staging"