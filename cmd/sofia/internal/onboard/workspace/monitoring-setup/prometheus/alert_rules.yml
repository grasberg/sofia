groups:
  - name: server_health
    rules:
      # Varning om hög CPU-användning
      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% for 5 minutes. Current value: {{ $value }}%"

      # Kritiskt om hög CPU-användning
      - alert: CriticalCpuUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 90% for 2 minutes. Current value: {{ $value }}%"

      # Varning om högt minnesanvändning
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85% for 5 minutes. Current value: {{ $value }}%"

      # Varning om diskutrymme
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk space is below 20% on root filesystem. Current value: {{ $value }}%"

      # Kritiskt om diskutrymme
      - alert: CriticalLowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical low disk space on {{ $labels.instance }}"
          description: "Disk space is below 10% on root filesystem. Current value: {{ $value }}%"

      # Service down (node exporter nårbarhet)
      - alert: NodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node exporter down on {{ $labels.instance }}"
          description: "Node exporter has been down for more than 1 minute."

  - name: application_health
    rules:
      # Laravel app nårbarhet (om mått finns)
      - alert: LaravelAppDown
        expr: up{job="laravel-app"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Laravel application down"
          description: "Laravel application is not responding to metrics endpoint."

      # Next.js app nårbarhet
      - alert: NextJsAppDown
        expr: up{job="nextjs-app"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Next.js application down"
          description: "Next.js application is not responding to metrics endpoint."

      # Höga HTTP-felkoder (om exporteras)
