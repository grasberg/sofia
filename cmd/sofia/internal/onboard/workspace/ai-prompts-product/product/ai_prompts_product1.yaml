core:
  name: "AI Skribent Prompts - 5 Grundläggande Prompts för Kreativt Skrivande"
  short_description: "Professionellt designade AI-prompts för författare och kreativa skribenter som vill generera idéer, utveckla karaktärer, bygga världar och övervinna skrivblock."
  full_description: |
    # AI Skribent Prompts - 5 Grundläggande Prompts för Kreativt Skrivande

    Är du en författare som kämpar med skrivblock? Eller kanske du vill ge dina berättelser mer djup och trovärdighet? Dessa 5 professionellt designade AI-prompts är skapade för att hjälpa kreativa skribenter att:

    ✅ **Generera nya idéer** när inspirationen tryter
    ✅ **Utveckla karaktärer** med djup och motivation  
    ✅ **Bygga trovärdiga världar** som känns levande
    ✅ **Förbättra dialog** så den låter autentisk
    ✅ **Övervinna skrivblock** med kreativa lösningar

    ## Vad du får:

    ### 1. Berättelsegeneratorn
    Generera en komplett berättelseutkast baserat på genre, karaktärer och teman. Perfekt för att komma igång med nya projekt.

    ### 2. Karaktärsutvecklaren  
    Skapa kompletta, trovärdiga karaktärer med detaljerade profiler inklusive inre konflikter, motivation och utvecklingsbåge.

    ### 3. Världsbyggaren
    Konstruera en fiktiv värld med samhällsstruktur, kultur, geografi och konfliktzoner. Gör din värld levande och konsekvent.

    ### 4. Dialogtränaren
    Analysera och förbättra dialogens naturlighet, rytm och konflikt. Lägg till subtext och göra varje karaktärs röst unik.

    ### 5. Skrivkampslösaren
    Övervinna skrivblock med alternativa vägar, karaktärsdrivna lösningar och kreativa sparkar. Kom vidare när du fastnar.

    ## Hur du använder prompts:
    1. Kopiera och klistra in valfri prompt i ChatGPT, Claude eller annat AI-verktyg
    2. Ersätt texten inom hakparenteser med dina specifika detaljer
    3. Experimentera med olika variationer
    4. Anpassa outputen till din unika röst och stil

    ## Varför dessa prompts fungerar:
    - ✅ **Testade och optimerade** för bästa resultat med moderna AI-modeller
    - ✅ **Omedelbart användbara** - ingen krånglig setup krävs
    - ✅ **Flexibla** - fungerar för alla genrer och skrivstilar
    - ✅ **Tidsbesparande** - få högkvalitativt material på minuter, inte timmar

    ## För vem är detta?
    - Författare (fiktion och fack)
    - Copywriters och content creators
    - Skrivcoacher och lärare
    - Skrivgrupper och workshops
    - Alla som vill förbättra sitt kreativa skrivande med AI

    ## Tekniska detaljer:
    - Format: PDF (kompatibel med alla enheter)
    - Språk: Svenska
    - Storlek: 5 sidor (inklusive instruktioner)
    - Uppdateringar: Livstidsuppdateringar ingår

    ## Köpvillkor:
    - Omedelbar tillgång efter köp
    - 30-dagars pengarna tillbaka-garanti
    - Livstidsåtkomst till uppdateringar
    - Personligt bruk + kommersiell användning tillåten

    ---

    **Investera i din kreativitet idag!** Dessa prompts kommer att spara dig timmar av frustrerande skrivblock och hjälpa dig att producera högkvalitativt innehåll snabbare.
