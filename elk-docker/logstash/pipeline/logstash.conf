input {
  # TCP input for receiving logs
  tcp {
    port => 5044
    codec => json_lines
  }
  
  # HTTP input for REST API
  http {
    port => 5000
    codec => json
  }
  
  # Debug input - generate test logs
  generator {
    message => "Test log message %{+YYYY-MM-dd}"
    count => 5
  }
}

filter {
  # Add timestamp if missing
  if ![@timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
    }
  }
  
  # Add host information
  mutate {
    add_field => { 
      "host" => "%{hostname}"
      "received_at" => "%{@timestamp}"
    }
  }
  
  # Parse JSON if message is JSON
  if [message] =~ /^{.*}$/ {
    json {
      source => "message"
      target => "parsed_json"
    }
  }
}

output {
  # Primary output to Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
    user => ""  # Empty when security is disabled
    password => ""
  }
  
  # Debug output to console
  stdout {
    codec => rubydebug
  }
}