# Logstash Configuration
# Development settings

http.host: "0.0.0.0"
log.level: info
pipeline.workers: 2
pipeline.batch.size: 125
pipeline.batch.delay: 50

# Monitoring
xpack.monitoring.enabled: false

# Queue settings
queue.type: memory
queue.max_bytes: 1gb

# Dead letter queue
dead_letter_queue.enable: false