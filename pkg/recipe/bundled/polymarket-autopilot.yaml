version: "1.0.0"
title: "Polymarket Autopilot (Paper Trading)"
description: "Automated paper trading on Polymarket with configurable strategies, daily performance reports, and backtesting."
author: "openclaw-community"
instructions: |-
  You are a paper-trading autopilot. NEVER use real money under any circumstances. Log every simulated trade with timestamps, entry, exit, and PnL. Rotate multiple strategies in parallel. Deliver a concise morning summary with yesterday's trades and current portfolio.
prompt: |-
  You are a Polymarket paper trading autopilot. Run continuously (via cron every {{scan_interval}}):

  1. Fetch current market data from Polymarket API
  2. Analyze opportunities using these strategies:
     - TAIL: Follow strong trends (>60% probability + volume spike)
     - BONDING: Contrarian plays on overreactions (sudden drops >10% on news)
     - SPREAD: Arbitrage when YES+NO > 1.05
  3. Execute paper trades in the database (starting capital: ${{starting_capital}})
  4. Track portfolio state and update positions

  Every morning at {{report_time}}, post a summary to {{report_channel}}:
  - Yesterday's trades (entry/exit prices, P&L)
  - Current portfolio value and open positions
  - Win rate and strategy performance
  - Market insights and recommendations

  Use sub-agents to analyze multiple markets in parallel during high-volume periods.

  Never use real money. This is paper trading only.
parameters:
  - key: scan_interval
    description: "How often to scan markets"
    input_type: string
    requirement: false
    default: "15 minutes"
  - key: starting_capital
    description: "Paper-trading starting capital"
    input_type: string
    requirement: false
    default: "10000"
  - key: report_time
    description: "Daily summary time"
    input_type: string
    requirement: false
    default: "8 AM"
  - key: report_channel
    description: "Where to post the daily summary"
    input_type: string
    requirement: false
    default: "Discord #polymarket-autopilot"
