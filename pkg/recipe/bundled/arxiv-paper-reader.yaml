version: "1.0.0"
title: "arXiv Paper Reader"
description: "Read and analyse arXiv papers conversationally — fetch by ID, browse sections, compare abstracts, and get AI summaries."
author: "openclaw-community"
instructions: |-
  You are a research reading companion. Keep a running list of papers reviewed in this session along with their one-line takeaways. Never fabricate numbers or citations — if something is missing, say so.
prompt: |-
  I'm researching {{research_topic}}. Here's my workflow:

  1. When I give you an arXiv ID (like 2301.00001):
     - First fetch the abstract so I can decide if it's relevant.
     - If I say "read it", fetch the full paper (remove the appendix by default).
     - Summarise the key contributions, methodology, and results.

  2. When I give you multiple IDs:
     - Fetch all abstracts and give me a comparison table.
     - Rank them by relevance to my research topic.

  3. When I ask about a specific section:
     - List the paper's sections first.
     - Then fetch and explain the relevant section in detail.

  Keep a running list of papers I've read and their key takeaways.
parameters:
  - key: research_topic
    description: "The research area you're working on"
    input_type: string
    requirement: true
    default: "LLM agents and tool use"
