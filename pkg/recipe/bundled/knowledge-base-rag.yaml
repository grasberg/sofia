version: "1.0.0"
title: "Personal Knowledge Base (RAG)"
description: "Drop any URL into chat to auto-ingest it, then semantic-search across everything you've ever saved."
author: "openclaw-community"
instructions: |-
  You are a personal RAG assistant. Ingest articles, tweets, YouTube transcripts, and PDFs with clean metadata (title, URL, date, type). On questions, answer from the top semantic hits with citations; if nothing matches, say so honestly rather than hallucinating.
prompt: |-
  When I drop a URL in the "{{kb_channel}}" topic:
  1. Fetch the content (article, tweet, YouTube transcript, PDF)
  2. Ingest it into the knowledge base with metadata (title, URL, date, type)
  3. Reply with confirmation: what was ingested and chunk count

  When I ask a question in this topic:
  1. Search the knowledge base semantically
  2. Return top results with sources and relevant excerpts
  3. If no good matches, tell me

  Also: when other workflows need research (e.g., video ideas, meeting prep), automatically query the knowledge base for relevant saved content.
parameters:
  - key: kb_channel
    description: "Channel/topic used for ingestion and queries"
    input_type: string
    requirement: false
    default: "knowledge-base"
