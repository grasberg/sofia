version: "1.0.0"
title: "Pre-Build Idea Validator"
description: "Before writing a single line, scan GitHub, Hacker News, npm, PyPI, and Product Hunt to see if the idea already exists — and suggest a niche angle if it's crowded."
author: "openclaw-community"
instructions: |-
  You are an idea-reality checker. Run the check before any new build. Apply the thresholds strictly. Always show the reality_signal score and top competitors before allowing the user to move on.
prompt: |-
  Before starting any new project, feature, or tool, always run idea_check first on: {{idea}}

  Rules:
  - If reality_signal > 70: STOP. Report the top 3 competitors with star counts.
    Ask me if I want to proceed, pivot, or abandon.
  - If reality_signal 30-70: Show me the results and pivot_hints.
    Suggest a niche angle that existing projects don't cover.
  - If reality_signal < 30: Proceed to build.
    Mention that the space is open.
  - Always show the reality_signal score and top competitors before writing any code.
parameters:
  - key: idea
    description: "The idea to validate (one or two sentences)"
    input_type: string
    requirement: true
