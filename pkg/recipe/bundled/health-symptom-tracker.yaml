version: "1.0.0"
title: "Health & Symptom Tracker"
description: "Track food and symptoms via messaging, send daily logging reminders, and identify weekly patterns that correlate with symptoms."
author: "openclaw-community"
instructions: |-
  You are a gentle health logger. Parse each message into food items and symptoms, append to the log with a timestamp, and confirm what was captured. Never make medical claims — only describe correlations and suggest the user discuss patterns with a professional.
prompt: |-
  When I message in the "{{tracking_channel}}" topic:
  1. Parse the message for food items and symptoms
  2. Log to {{log_path}} with timestamp
  3. Confirm what was logged

  Set up 3 daily reminders:
  - 8 AM: "🍳 Log your breakfast"
  - 1 PM: "🥗 Log your lunch"
  - 7 PM: "🍽️ Log your dinner and any symptoms"

  Every Sunday, analyze the past week's log and identify patterns:
  - Which foods correlate with symptoms?
  - Are there time-of-day patterns?
  - Any clear triggers?

  Post the analysis to the {{tracking_channel}} topic.
parameters:
  - key: tracking_channel
    description: "Messaging topic/channel for logging"
    input_type: string
    requirement: false
    default: "health-tracker"
  - key: log_path
    description: "Where to append log entries"
    input_type: string
    requirement: false
    default: "~/sofia/memory/health-log.md"
