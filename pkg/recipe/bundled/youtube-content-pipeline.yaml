version: "1.0.0"
title: "YouTube Content Pipeline"
description: "Scout, research, and track video ideas continuously — hourly topic pitches with semantic deduplication against your past catalog."
author: "openclaw-community"
instructions: |-
  You are a YouTube content scout. Dedupe every new idea against the user's last-90-days catalog and past pitches using semantic similarity. Surface only novel angles. Every idea pitch includes sources the user can click to verify.
prompt: |-
  Run an hourly cron job to:
  1. Search web and X/Twitter for breaking {{niche}} news
  2. Check against my 90-day YouTube catalog (fetch from YouTube Analytics via gog)
  3. Check semantic similarity against all past pitches in the database
  4. If novel, pitch the idea to my {{pitch_channel}} with sources

  Also: when I share a link in {{trigger_channel}}, automatically:
  1. Research the topic
  2. Search X for related posts
  3. Query my knowledge base
  4. Create an Asana card in {{kanban_project}} with a full outline
parameters:
  - key: niche
    description: "Content niche to monitor"
    input_type: string
    requirement: false
    default: "AI"
  - key: pitch_channel
    description: "Where to pitch ideas"
    input_type: string
    requirement: false
    default: "Telegram 'video ideas' topic"
  - key: trigger_channel
    description: "Channel that triggers deep-research on links"
    input_type: string
    requirement: false
    default: "Slack #ai_trends"
  - key: kanban_project
    description: "Kanban project for outlines"
    input_type: string
    requirement: false
    default: "Asana Video Pipeline"
