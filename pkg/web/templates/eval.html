<!-- EVAL DASHBOARD TAB (HTMX Partial) -->
<div id="tab-eval" class="flex flex-col flex-grow min-h-0 animate-fade-in">
    <!-- Header -->
    <div class="px-6 py-5 border-b border-[var(--border-color)] bg-[var(--bg-main)]/50 backdrop-blur shrink-0 flex items-center justify-between">
        <div>
            <h2 class="text-xl font-bold tracking-tight text-[var(--text-main)] flex items-center gap-2">
                <i data-lucide="flask-conical" class="w-5 h-5 text-sofia"></i>
                Eval Dashboard
            </h2>
            <p class="text-xs text-zinc-500 mt-1">Evaluation runs, scores, and regression tracking.</p>
        </div>
        <button onclick="evalRefresh()" class="px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-zinc-800 text-zinc-400 hover:text-[var(--text-main)] transition-colors border border-transparent hover:border-zinc-700 flex items-center gap-1">
            <i data-lucide="refresh-cw" class="w-3 h-3"></i> Refresh
        </button>
    </div>

    <div class="flex-grow overflow-y-auto">
        <!-- Runs Table -->
        <div class="px-6 py-4">
            <div class="flex items-center gap-2 mb-3">
                <i data-lucide="list" class="w-4 h-4 text-zinc-500"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-600">Recent Runs</span>
            </div>
            <div id="eval-runs-table" class="space-y-1">
                <div class="text-xs text-zinc-600 font-mono">Loading...</div>
            </div>
        </div>

        <!-- Run Detail Panel (hidden by default) -->
        <div id="eval-detail-panel" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
            <div class="w-full max-w-3xl max-h-[80vh] bg-[var(--bg-sidebar)] border border-[var(--border-color)] rounded-xl shadow-2xl flex flex-col overflow-hidden">
                <div class="px-5 py-4 border-b border-[var(--border-color)] flex items-center justify-between shrink-0">
                    <div class="flex items-center gap-3 min-w-0">
                        <div class="w-8 h-8 rounded-lg bg-sofia/10 flex items-center justify-center shrink-0">
                            <i data-lucide="flask-conical" class="w-4 h-4 text-sofia"></i>
                        </div>
                        <div class="min-w-0">
                            <h3 id="eval-detail-title" class="text-sm font-bold text-[var(--text-main)] truncate"></h3>
                            <div id="eval-detail-meta" class="text-[9px] text-zinc-600 font-mono mt-0.5"></div>
                        </div>
                    </div>
                    <button onclick="closeEvalDetail()" class="p-1.5 text-zinc-500 hover:text-[var(--text-main)] transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <!-- Summary bar -->
                <div id="eval-detail-summary" class="px-5 py-3 border-b border-[var(--border-color)] flex items-center gap-4 shrink-0">
                </div>
                <!-- Per-test results -->
                <div class="flex-grow overflow-y-auto px-5 py-3">
                    <div class="text-[9px] font-bold uppercase tracking-widest text-zinc-600 mb-3">Test Results</div>
                    <div id="eval-detail-results" class="space-y-2">
                        <div class="text-xs text-zinc-600 font-mono">Loading...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    refreshIcons();

    async function evalRefresh() {
        try {
            var res = await fetch('/api/eval/runs?limit=50');
            if (!res.ok) {
                document.getElementById('eval-runs-table').innerHTML =
                    '<div class="text-xs text-zinc-600 font-mono">No eval data available.</div>';
                return;
            }
            var runs = await res.json();
            renderEvalRuns(runs);
        } catch(e) {
            console.error('Eval refresh failed:', e);
            document.getElementById('eval-runs-table').innerHTML =
                '<div class="text-xs text-red-400 font-mono">Failed to load eval data.</div>';
        }
    }

    function renderEvalRuns(runs) {
        var container = document.getElementById('eval-runs-table');
        container.innerHTML = '';

        if (!runs || runs.length === 0) {
            container.innerHTML = '<div class="text-xs text-zinc-600 font-mono">No evaluation runs yet. Run an eval suite to see results here.</div>';
            return;
        }

        // Group by suite for trend indicators
        var suiteLatest = {};
        runs.forEach(function(r) {
            if (!suiteLatest[r.suite_name]) suiteLatest[r.suite_name] = [];
            suiteLatest[r.suite_name].push(r);
        });

        // Table header
        var header = document.createElement('div');
        header.className = 'grid grid-cols-[1fr_100px_80px_80px_60px_120px] gap-2 px-3 py-2 text-[9px] font-bold uppercase tracking-widest text-zinc-600 border-b border-[var(--border-color)]';
        header.innerHTML = '<span>Suite</span><span>Agent</span><span class="text-right">Score</span><span class="text-right">Pass Rate</span><span class="text-right">Tests</span><span class="text-right">Date</span>';
        container.appendChild(header);

        runs.forEach(function(run) {
            var row = document.createElement('div');
            row.className = 'grid grid-cols-[1fr_100px_80px_80px_60px_120px] gap-2 px-3 py-2.5 rounded-lg border border-[var(--border-color)] bg-[var(--bg-main)] cursor-pointer hover:border-sofia/30 transition-colors items-center';
            row.onclick = function() { openEvalDetail(run.id); };

            // Score color
            var scoreColor = 'text-green-400';
            if (run.avg_score < 0.5) scoreColor = 'text-red-400';
            else if (run.avg_score < 0.8) scoreColor = 'text-amber-400';

            // Pass rate color
            var prColor = 'text-green-400';
            if (run.pass_rate < 0.5) prColor = 'text-red-400';
            else if (run.pass_rate < 0.8) prColor = 'text-amber-400';

            // Trend indicator for the suite
            var trendHtml = '';
            var suiteRuns = suiteLatest[run.suite_name] || [];
            if (suiteRuns.length >= 2 && suiteRuns[0].id === run.id) {
                var diff = suiteRuns[0].avg_score - suiteRuns[1].avg_score;
                if (diff > 0.01) trendHtml = '<i data-lucide="trending-up" class="w-3 h-3 text-green-400 inline-block ml-1"></i>';
                else if (diff < -0.01) trendHtml = '<i data-lucide="trending-down" class="w-3 h-3 text-red-400 inline-block ml-1"></i>';
                else trendHtml = '<i data-lucide="minus" class="w-3 h-3 text-zinc-600 inline-block ml-1"></i>';
            }

            var dateStr = '';
            if (run.run_at) {
                try {
                    var d = new Date(run.run_at);
                    dateStr = d.toLocaleString('sv-SE', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                } catch(ex) {}
            }

            row.innerHTML =
                '<div class="flex items-center gap-2 min-w-0">' +
                '  <span class="text-xs font-semibold text-[var(--text-main)] truncate">' + escapeHtml(run.suite_name) + '</span>' +
                trendHtml +
                '</div>' +
                '<span class="text-[11px] text-zinc-500 truncate">' + escapeHtml(run.agent_id || '-') + '</span>' +
                '<span class="text-xs font-mono font-bold ' + scoreColor + ' text-right">' + (run.avg_score * 100).toFixed(1) + '%</span>' +
                '<span class="text-xs font-mono ' + prColor + ' text-right">' + (run.pass_rate * 100).toFixed(0) + '%</span>' +
                '<span class="text-xs font-mono text-zinc-500 text-right">' + run.total_tests + '</span>' +
                '<span class="text-[10px] text-zinc-600 text-right">' + dateStr + '</span>';

            container.appendChild(row);
        });

        refreshIcons();
    }

    async function openEvalDetail(runId) {
        var panel = document.getElementById('eval-detail-panel');
        panel.classList.remove('hidden');
        document.getElementById('eval-detail-results').innerHTML = '<div class="text-xs text-zinc-600 font-mono animate-pulse">Loading...</div>';

        try {
            var res = await fetch('/api/eval/runs/' + runId);
            if (!res.ok) {
                document.getElementById('eval-detail-results').innerHTML = '<div class="text-xs text-red-400 font-mono">Failed to load run details.</div>';
                return;
            }
            var detail = await res.json();
            renderEvalDetail(detail);
        } catch(e) {
            document.getElementById('eval-detail-results').innerHTML = '<div class="text-xs text-red-400 font-mono">Error loading details.</div>';
        }
    }

    function renderEvalDetail(detail) {
        document.getElementById('eval-detail-title').textContent = detail.suite_name;

        var dateStr = '';
        if (detail.run_at) {
            try { dateStr = new Date(detail.run_at).toLocaleString('sv-SE'); } catch(e) {}
        }
        document.getElementById('eval-detail-meta').textContent =
            'Run #' + detail.id + (detail.agent_id ? ' | Agent: ' + detail.agent_id : '') +
            (detail.model ? ' | Model: ' + detail.model : '') +
            (dateStr ? ' | ' + dateStr : '');

        // Summary bar
        var scoreColor = detail.avg_score >= 0.8 ? 'text-green-400' : detail.avg_score >= 0.5 ? 'text-amber-400' : 'text-red-400';
        var prColor = detail.pass_rate >= 0.8 ? 'text-green-400' : detail.pass_rate >= 0.5 ? 'text-amber-400' : 'text-red-400';
        document.getElementById('eval-detail-summary').innerHTML =
            '<div class="text-center"><div class="text-[9px] font-bold uppercase tracking-widest text-zinc-600">Score</div><div class="text-lg font-bold font-mono ' + scoreColor + '">' + (detail.avg_score * 100).toFixed(1) + '%</div></div>' +
            '<div class="text-center"><div class="text-[9px] font-bold uppercase tracking-widest text-zinc-600">Pass Rate</div><div class="text-lg font-bold font-mono ' + prColor + '">' + (detail.pass_rate * 100).toFixed(0) + '%</div></div>' +
            '<div class="text-center"><div class="text-[9px] font-bold uppercase tracking-widest text-zinc-600">Passed</div><div class="text-lg font-bold font-mono text-green-400">' + detail.passed + '</div></div>' +
            '<div class="text-center"><div class="text-[9px] font-bold uppercase tracking-widest text-zinc-600">Failed</div><div class="text-lg font-bold font-mono text-red-400">' + detail.failed + '</div></div>' +
            '<div class="text-center"><div class="text-[9px] font-bold uppercase tracking-widest text-zinc-600">Duration</div><div class="text-lg font-bold font-mono text-zinc-400">' + formatDuration(detail.duration_ms) + '</div></div>';

        // Per-test results
        var container = document.getElementById('eval-detail-results');
        container.innerHTML = '';

        if (!detail.results || detail.results.length === 0) {
            container.innerHTML = '<div class="text-xs text-zinc-600 font-mono">No test results.</div>';
            refreshIcons();
            return;
        }

        detail.results.forEach(function(r) {
            var entry = document.createElement('div');
            var borderColor = r.passed ? 'border-l-green-500/50' : 'border-l-red-500/50';
            var bgColor = r.passed ? 'bg-green-500/[0.03]' : 'bg-red-500/[0.03]';
            entry.className = 'border-l-2 ' + borderColor + ' ' + bgColor + ' rounded-r-lg p-3';

            var icon = r.passed
                ? '<i data-lucide="check-circle" class="w-3.5 h-3.5 text-green-400 shrink-0"></i>'
                : '<i data-lucide="x-circle" class="w-3.5 h-3.5 text-red-400 shrink-0"></i>';

            var scoreColor = r.score >= 0.8 ? 'text-green-400' : r.score >= 0.5 ? 'text-amber-400' : 'text-red-400';

            var errorsHtml = '';
            if (r.errors && r.errors.length > 0) {
                errorsHtml = '<div class="mt-2 p-2 rounded bg-red-500/[0.05] border border-red-500/20">' +
                    '<div class="text-[9px] font-bold uppercase tracking-widest text-red-400/60 mb-1">Errors</div>';
                r.errors.forEach(function(e) {
                    errorsHtml += '<div class="text-[11px] text-red-300 font-mono">' + escapeHtml(e) + '</div>';
                });
                errorsHtml += '</div>';
            }

            entry.innerHTML =
                '<div class="flex items-start gap-2">' +
                icon +
                '<div class="flex-grow min-w-0">' +
                '  <div class="flex items-center gap-2">' +
                '    <span class="text-xs font-bold text-[var(--text-main)]">' + escapeHtml(r.test_name) + '</span>' +
                '    <span class="text-[10px] font-mono font-bold ' + scoreColor + '">' + (r.score * 100).toFixed(0) + '%</span>' +
                '    <span class="text-[9px] font-mono text-zinc-600 ml-auto">' + formatDuration(r.duration_ms) + '</span>' +
                '  </div>' +
                (r.input ? '<div class="text-[10px] text-zinc-500 mt-1 truncate">Input: ' + escapeHtml(r.input) + '</div>' : '') +
                errorsHtml +
                '</div>' +
                '</div>';

            container.appendChild(entry);
        });

        refreshIcons();
    }

    function closeEvalDetail() {
        document.getElementById('eval-detail-panel').classList.add('hidden');
    }

    // Close on backdrop click
    document.getElementById('eval-detail-panel').addEventListener('click', function(e) {
        if (e.target === this) closeEvalDetail();
    });

    // Close on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeEvalDetail();
    });

    function formatDuration(ms) {
        if (!ms || ms === 0) return '-';
        if (ms < 1000) return ms + 'ms';
        if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
        return (ms / 60000).toFixed(1) + 'm';
    }

    // Initial load
    evalRefresh();
</script>
