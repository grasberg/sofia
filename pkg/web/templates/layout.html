        // Always-on monitor stream for Agent Monitor cards
        function startDashboardStream() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(protocol + '//' + window.location.host + '/ws/dashboard');

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                if (msg.type === 'snapshot') {
                    // Initial load
                    if (msg.data.agents && msg.data.agents.list) {
                        renderAgentCards(msg.data.agents.list, msg.data.agents.active);
                    }
                    // Store snapshot for monitor dashboard
                    window.monitorSnapshot = msg.data;
                } else if (msg.type === 'update') {
                    const d = msg.data;

                    // Track stats
                    window.monitorStats.totalEvents++;
                    if (d.type === 'tool_call_end') window.monitorStats.toolCalls++;
                    if (d.type === 'subagent_task_start') window.monitorStats.subagentTasks++;
                    if (d.type === 'agent_delegating') window.monitorStats.subagentTasks++;
                    if (d.type === 'tool_call_end' && !d.success) window.monitorStats.errors++;
                    if (d.type === 'subagent_task_end' && !d.success) window.monitorStats.errors++;
                    if (d.type === 'goal_step_end' && !d.success) window.monitorStats.errors++;
                    if (d.type === 'agent_nudge') window.monitorStats.errors++;

                    // Track active agent state
                    if (d.type === 'agent_thinking') {
                        window.activeAgents[d.agent_id] = {
                            name: d.agent_name || d.agent_id,
                            model: d.model,
                            status: 'thinking',
                            since: Date.now(),
                        };
                    } else if (d.type === 'agent_done') {
                        delete window.activeAgents[d.agent_id];
                    } else if (d.type === 'subagent_task_start') {
                        window.activeAgents[d.agent_id] = {
                            name: d.agent_name || d.agent_id,
                            status: 'working',
                            task: d.task,
                            since: Date.now(),
                        };
                    } else if (d.type === 'subagent_task_end') {
                        delete window.activeAgents[d.agent_id];
                    } else if (d.type === 'agent_status') {
                        // Real-time status update from the agent loop
                        if (window.activeAgents[d.agent_id]) {
                            window.activeAgents[d.agent_id].status = d.status || 'working';
                        } else {
                            window.activeAgents[d.agent_id] = {
                                name: d.agent_name || d.agent_id,
                                status: d.status || 'working',
                                since: Date.now(),
                            };
                        }
                    } else if (d.type === 'tool_call_start') {
                        if (window.activeAgents[d.agent_id]) {
                            window.activeAgents[d.agent_id].status = 'tool: ' + d.tool;
                        } else {
                            window.activeAgents[d.agent_id] = {
                                name: d.agent_id,
                                status: 'tool: ' + d.tool,
                                since: Date.now(),
                            };
                        }
                    } else if (d.type === 'goal_step_start') {
                        window.activeAgents[d.agent_id || 'autonomy'] = {
                            name: d.goal_name || 'Goal',
                            status: 'pursuing goal: ' + (d.step || '').substring(0, 60),
                            since: Date.now(),
                        };
                    } else if (d.type === 'goal_step_end') {
                        delete window.activeAgents[d.agent_id || 'autonomy'];
                    } else if (d.type === 'message_routed') {
                        window.activeAgents[d.agent_id] = {
                            name: d.agent_name || d.agent_id,
                            status: 'processing message from '
                                + (d.channel || 'unknown'),
                            since: Date.now(),
                        };
                    } else if (d.type === 'agent_delegating') {
                        if (window.activeAgents[d.from_agent_id]) {
                            window.activeAgents[d.from_agent_id].status =
                                'delegating to '
                                + (d.to_agent_name || d.to_agent_id);
                        }
                        window.activeAgents[d.to_agent_id] = {
                            name: d.to_agent_name || d.to_agent_id,
                            status: 'starting delegated task',
                            since: Date.now(),
                        };
                    } else if (d.type === 'subagent_result_received') {
                        // Brief flash - will be cleared by agent_done
                    } else if (d.type === 'agent_nudge') {
                        if (window.activeAgents[d.agent_id]) {
                            window.activeAgents[d.agent_id].status =
                                'nudged — retrying with tools';
                        }
                    } else if (d.type === 'llm_response') {
                        if (window.activeAgents[d.agent_id]) {
                            if (d.tool_calls > 0) {
                                window.activeAgents[d.agent_id].status =
                                    'executing ' + d.tool_calls
                                    + ' tool(s)';
                            } else {
                                window.activeAgents[d.agent_id].status =
                                    'composing response';
                            }
                        }
                    }

                    // Handle agent status updates for sidebar cards
                    if (d.type === 'subagent_task_start' || d.type === 'subagent_task_end') {
                        const agentId = d.agent_id;
                        const taskEl = document.getElementById('card-task-' + agentId);
                        if (taskEl) {
                            if (d.type === 'subagent_task_start') {
                                taskEl.textContent = d.task;
                                taskEl.classList.remove('hidden');
                            } else {
                                taskEl.textContent = "";
                                taskEl.classList.add('hidden');
                            }
                        }
                    }

                    // Forward to monitor page if active, otherwise buffer
                    if (typeof window.processMonitorEvent === 'function') {
                        window.processMonitorEvent(d);
                    } else {
                        window.monitorEventBuffer.push(d);
                        if (window.monitorEventBuffer.length > MONITOR_BUFFER_MAX) {
                            window.monitorEventBuffer.shift();
                        }
                    }

                    // Update monitor dashboard counters if visible
                    if (typeof window.updateMonitorDashboard === 'function') {
                        window.updateMonitorDashboard();
                    }

                    // Update sidebar activity indicator in real-time
                    const sidebarAct = document.getElementById('sidebar-activity');
                    const sidebarActText = document.getElementById('sidebar-activity-text');
                    if (sidebarAct && sidebarActText) {
                        const busyCount = Object.keys(window.activeAgents || {}).length;
                        if (busyCount > 0) {
                            const firstAgent = Object.values(window.activeAgents)[0];
                            sidebarAct.classList.remove('hidden');
                            sidebarActText.textContent = firstAgent.status || 'Working...';
                        } else {
                            sidebarAct.classList.add('hidden');
                        }
                    }

                    // Immediately re-render agent cards with current active state
                    if (window._lastAgentList) {
                        renderAgentCards(window._lastAgentList, {
                            id: window._lastActiveId || '',
                            status: window._lastActiveStatus || 'Idle',
                        });
                    }
                }
            };

            ws.onopen = function() {
                const msDot = document.getElementById('monitor-status-dot');
                const msText = document.getElementById('monitor-status-text');
                if (msDot) { msDot.className = 'w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)] animate-pulse-slow'; }
                if (msText) { msText.textContent = 'Live'; }
            };

            ws.onclose = function() {
                const msDot = document.getElementById('monitor-status-dot');
                const msText = document.getElementById('monitor-status-text');
                if (msDot) { msDot.className = 'w-2 h-2 rounded-full bg-amber-500'; }
                if (msText) { msText.textContent = 'Reconnecting...'; }
                // Reconnect after 3 seconds
                setTimeout(startDashboardStream, 3000);
            };
        }

        startDashboardStream();

    </script>
</body>

</html>
