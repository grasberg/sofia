<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        sofia: {
                            DEFAULT: "#ff4d4d",
                            hover: "#e63e3e",
                            light: "#ff6666",
                            dark: "#cc3d3d",
                            bg: "#050505"
                        },
                        zinc: {
                            950: "#020202",
                        }
                    },
                    borderRadius: {
                        'none': '0',
                        'sm': '2px',
                        'md': '4px',
                        'lg': '8px',
                        'xl': '12px',
                        '2xl': '16px',
                        '3xl': '24px',
                        'full': '9999px',
                        'sofia': '2px', // Johanna's choice: Sharp edges
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'glitch': 'glitch 0.2s ease-in-out infinite',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        glitch: {
                            '0%': { transform: 'translate(0)' },
                            '20%': { transform: 'translate(-2px, 2px)' },
                            '40%': { transform: 'translate(-2px, -2px)' },
                            '60%': { transform: 'translate(2px, 2px)' },
                            '80%': { transform: 'translate(2px, -2px)' },
                            '100%': { transform: 'translate(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/assets/style.css">

</head>

<body class="h-screen flex overflow-hidden bg-[var(--bg-main)] text-[var(--text-main)] transition-colors duration-300">
    <!-- SIDEBAR -->
    <aside
        class="w-20 lg:w-64 min-w-[5rem] lg:min-w-[16rem] shrink-0 border-r border-[var(--border-color)] flex flex-col bg-[var(--bg-sidebar)] z-20 transition-all duration-300">
        <div class="p-4 lg:p-6 flex flex-col lg:flex-row items-center gap-3">
            <div
                class="logo-container w-10 h-10 bg-black flex items-center justify-center border border-sofia/50 glow-red transition-colors duration-300">
                <img src="/assets/sofiamantis.png" alt="S" class="w-7 h-7 object-contain">
            </div>
            <div class="hidden lg:block">
                <h1
                    class="text-xl font-bold tracking-tighter uppercase text-[var(--text-main)] transition-colors duration-300">
                    Sofia</h1>
            </div>
        </div>

        <nav class="flex-grow px-2 lg:px-4 mt-8 space-y-2" id="sidebar-nav">
            <a href="#" hx-get="/ui/chat" hx-target="#main-content" onclick="setActiveNav(this, event);" id="nav-chat"
                class="nav-item active">
                <i data-lucide="message-square" class="w-5 h-5"></i>
                <span class="hidden lg:inline">Terminal</span>
            </a>
            <a href="#" hx-get="/ui/agents" hx-target="#main-content" onclick="setActiveNav(this, event);" id="nav-agents"
                class="nav-item">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="hidden lg:inline">Agents</span>
            </a>
            <a href="#" hx-get="/ui/history" hx-target="#main-content" onclick="setActiveNav(this, event);" id="nav-history"
                class="nav-item">
                <i data-lucide="clock" class="w-5 h-5"></i>
                <span class="hidden lg:inline">History</span>
            </a>
            <a href="#" hx-get="/ui/monitor" hx-target="#main-content" onclick="setActiveNav(this, event);" id="nav-monitor"
                class="nav-item">
                <i data-lucide="activity" class="w-5 h-5"></i>
                <span class="hidden lg:inline">Monitor</span>
            </a>
            <a href="#" hx-get="/ui/settings" hx-target="#main-content" onclick="setActiveNav(this, event);" id="nav-settings"
                class="nav-item">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="hidden lg:inline">System</span>
            </a>
        </nav>

        <div class="p-4 border-t border-[var(--border-color)] space-y-4 hidden lg:block">
            <div class="bg-black/40 p-4 border-l-2 border-sofia">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[9px] font-bold uppercase tracking-widest text-zinc-500">Status</span>
                    <span id="status-dot" class="w-2 h-2 bg-zinc-600"></span>
                </div>
                <div id="mini-status" class="text-[10px] text-zinc-400 space-y-1 font-mono">
                    <div class="flex justify-between"><span>Version:</span> <span id="stat-version"
                            class="text-sofia">-</span></div>
                </div>
                <div id="sidebar-activity" class="hidden mt-3 p-2.5 bg-sofia/5 border border-sofia/20 rounded-lg">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="w-2 h-2 rounded-full bg-sofia animate-pulse shrink-0"></span>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-sofia">Working</span>
                    </div>
                    <div id="sidebar-activity-text" class="text-[10px] text-zinc-400 font-mono truncate"></div>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-grow flex flex-col relative bg-[var(--bg-main)] min-w-0">
        <!-- Top Header -->
        <header
            class="h-16 border-b border-[var(--border-color)] flex items-center justify-between px-6 lg:px-8 bg-black/20 backdrop-blur-md z-10 transition-colors duration-300">
            <div class="flex items-center gap-6">
                <h2 id="view-title" class="text-xs font-bold text-sofia uppercase tracking-[0.3em]">Direct Chat</h2>
                <div id="settings-header-tabs" class="hidden items-center gap-1">
                    <button hx-get="/ui/settings/prompts" hx-target="#subtab-content"
                        onclick="setActiveSettingsTab(this)" id="settings-tab-prompts"
                        class="px-3 py-1 text-[10px] font-bold uppercase tracking-widest border border-[var(--border-color)] bg-transparent hover:border-sofia transition-all">Identity</button>
                    <button hx-get="/ui/settings/heartbeat" hx-target="#subtab-content"
                        onclick="setActiveSettingsTab(this)" id="settings-tab-heartbeat"
                        class="px-3 py-1 text-[10px] font-bold uppercase tracking-widest border border-[var(--border-color)] bg-transparent hover:border-sofia transition-all">Heartbeat</button>
                    <button hx-get="/ui/settings/models" hx-target="#subtab-content"
                        onclick="setActiveSettingsTab(this)" id="settings-tab-models"
                        class="px-3 py-1 text-[10px] font-bold uppercase tracking-widest border border-[var(--border-color)] bg-transparent hover:border-sofia transition-all active">Models</button>
                    <button hx-get="/ui/settings/channels" hx-target="#subtab-content"
                        onclick="setActiveSettingsTab(this)" id="settings-tab-channels"
                        class="px-3 py-1 text-[10px] font-bold uppercase tracking-widest border border-[var(--border-color)] bg-transparent hover:border-sofia transition-all">Comms</button>
                    <button hx-get="/ui/settings/tools" hx-target="#subtab-content" onclick="setActiveSettingsTab(this)"
                        id="settings-tab-tools"
                        class="px-3 py-1 text-[10px] font-bold uppercase tracking-widest border border-[var(--border-color)] bg-transparent hover:border-sofia transition-all">Tools</button>
                    <button hx-get="/ui/settings/skills" hx-target="#subtab-content"
                        onclick="setActiveSettingsTab(this)" id="settings-tab-skills"
                        class="px-3 py-1 text-[10px] font-bold uppercase tracking-widest border border-[var(--border-color)] bg-transparent hover:border-sofia transition-all">Skills</button>
                    <button hx-get="/ui/settings/logs" hx-target="#subtab-content" onclick="setActiveSettingsTab(this)"
                        id="settings-tab-logs"
                        class="px-3 py-1 text-[10px] font-bold uppercase tracking-widest border border-[var(--border-color)] bg-transparent hover:border-sofia transition-all">Logs</button>
                    <button hx-get="/ui/settings/security" hx-target="#subtab-content"
                        onclick="setActiveSettingsTab(this)" id="settings-tab-security"
                        class="px-3 py-1 text-[10px] font-bold uppercase tracking-widest border border-[var(--border-color)] bg-transparent hover:border-sofia transition-all">Security</button>
                </div>
            </div>
            <div class="flex items-center gap-4">

                <div class="flex items-center gap-2">
                    <button onclick="updateSofia()" title="Update"
                        class="p-2 text-zinc-500 hover:text-sofia transition-colors">
                        <i data-lucide="download-cloud" class="w-4 h-4"></i>
                    </button>
                    <button onclick="restartSofia()" title="Restart"
                        class="p-2 text-zinc-500 hover:text-sofia transition-colors">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div id="main-content" class="flex-grow-fix flex flex-col p-4 lg:p-6" hx-get="/ui/chat" hx-trigger="load">
            <!-- HTMX injects content here -->
        </div>

    </main>

        // In-memory model list and standard model (populated from config)
        let configuredModels = [];
        let standardModel = "";

        function renderConfiguredModels() {
            const list = document.getElementById("provider-model-list");
            const agentModelSelect = document.getElementById("agent-model");
            const prevAgent = agentModelSelect ? agentModelSelect.value : "";
            if (agentModelSelect) {
                agentModelSelect.innerHTML = "<option value=''>Default (System Default)</option>";
            }

            if (list && configuredModels.length === 0) {
                list.innerHTML = "<div class='text-sm text-zinc-500 italic p-4 text-center border border-dashed border-[var(--border-color)] rounded-xl'>No models configured. Click Add Model to get started.</div>";
            } else if (list) {
                list.innerHTML = configuredModels.map(function (m, i) {
                    const isStandard = m.model_name === standardModel;
                    const borderClass = isStandard ? "border-sofia bg-sofia/5" : "border-[var(--border-color)] bg-[var(--bg-main)]";
                    const iconBgClass = isStandard ? "bg-sofia/15 text-sofia" : "bg-[var(--bg-sidebar)] text-zinc-400";
                    const iconName = isStandard ? "star" : "cpu";
                    const standardBadge = isStandard ? "<span class='px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-widest bg-sofia text-white'>Standard</span>" : "";
                    const modelStr = m.model || "";
                    const keyBadge = m.api_key ? "\u00b7 \ud83d\udd11" : "\u00b7 no key";
                    const standardBtn = !isStandard ? "<button onclick=\"setStandardModel('" + m.model_name + "')\" title=\"Set as Standard\" class=\"px-2.5 py-1.5 rounded-lg text-[10px] font-bold border border-sofia/30 text-sofia hover:bg-sofia/10 transition whitespace-nowrap flex items-center gap-1\"><i data-lucide=\"star\" class=\"w-3 h-3\"></i> Standard</button>" : "";
                    return "<div class=\"flex items-center justify-between px-4 py-3 rounded-xl border " + borderClass + " transition-all\">" +
                        "<div class=\"flex items-center gap-3 overflow-hidden\">" +
                        "<div class=\"w-8 h-8 rounded-lg " + iconBgClass + " flex items-center justify-center shrink-0\">" +
                        "<i data-lucide=\"" + iconName + "\" class=\"w-4 h-4\"></i>" +
                        "</div>" +
                        "<div class=\"overflow-hidden\">" +
                        "<div class=\"text-sm font-semibold text-[var(--text-main)] flex items-center gap-2\">" +
                        m.model_name + " " + standardBadge +
                        "</div>" +
                        "<div class=\"text-[10px] text-zinc-500 font-mono truncate\">" + modelStr + " " + keyBadge + "</div>" +
                        "</div>" +
                        "</div>" +
                        "<div class=\"flex gap-1 shrink-0 ml-3\">" +
                        standardBtn +
                        "<button onclick=\"openModelForm(" + i + ")\" class=\"p-1.5 rounded-lg hover:bg-[var(--nav-hover)] text-zinc-500 hover:text-[var(--text-main)] transition\"><i data-lucide=\"edit-3\" class=\"w-3.5 h-3.5\"></i></button>" +
                        "<button onclick=\"removeConfiguredModel(" + i + ")\" class=\"p-1.5 rounded-lg hover:bg-red-500/10 text-zinc-500 hover:text-red-400 transition\"><i data-lucide=\"trash-2\" class=\"w-3.5 h-3.5\"></i></button>" +
                        "</div>" +
                        "</div>";
                }).join("");
            }




            if (agentModelSelect) {
                configuredModels.forEach(m => {
                    const opt = document.createElement("option");
                    opt.value = m.model_name;
                    opt.textContent = m.model_name;
                    agentModelSelect.appendChild(opt);
                });
                if (prevAgent === "" || Array.from(agentModelSelect.options).some(o => o.value === prevAgent)) {
                    agentModelSelect.value = prevAgent;
                }
            }

            // Sync hidden cfg-model input
            const cfgModel = document.getElementById("cfg-model");
            if (cfgModel) cfgModel.value = standardModel;
            refreshIcons();
        }

        function setStandardModel(modelName) {
            standardModel = modelName;
            renderConfiguredModels();
            saveConfig();
        }

        function removeConfiguredModel(index) {
            const m = configuredModels[index];
            if (!confirm("Remove model " + (m ? m.model_name : "") + "?")) return;
            configuredModels.splice(index, 1);
            if (standardModel === (m && m.model_name)) {
                standardModel = configuredModels.length > 0 ? configuredModels[0].model_name : "";
            }
            renderConfiguredModels();
            saveConfig();
        }

        function openModelForm(editIndex) {
            const form = document.getElementById("model-config-form");
            const title = document.getElementById("model-form-title");
            document.getElementById("edit-model-index").value = editIndex !== undefined ? editIndex : -1;

            // Reset form fields
            document.getElementById("form-provider").value = "";
            document.getElementById("form-model-select").innerHTML = "";
            document.getElementById("form-step-model").classList.add("hidden");
            document.getElementById("form-step-config").classList.add("hidden");
            document.getElementById("form-model-custom-wrapper").classList.add("hidden");
            document.getElementById("form-model-alias").value = "";
            document.getElementById("form-model-key").value = "";
            document.getElementById("form-model-base").value = "";
            document.getElementById("form-model-workspace").value = "";
            document.getElementById("form-model-rpm").value = "";
            document.getElementById("form-model-timeout").value = "";
            document.getElementById("form-model-max-tokens").value = "";
            document.getElementById("form-model-tokens-field").value = "";
            document.getElementById("form-model-connect").value = "";
            document.getElementById("form-model-proxy").value = "";
            document.getElementById("form-model-auth").value = "";

            if (editIndex !== undefined && editIndex >= 0) {
                const m = configuredModels[editIndex];
                title.textContent = "Edit Model";
                // Detect provider from model string prefix
                const prefix = m.model ? m.model.split("/")[0] : "";
                const providerMap = { gemini: "Google Gemini", openai: "OpenAI", anthropic: "Anthropic", deepseek: "DeepSeek", groq: "Groq" };
                const detectedProvider = providerMap[prefix] || "Custom";
                document.getElementById("form-provider").value = detectedProvider;
                onProviderChange();
                // Try to select model in dropdown
                const sel = document.getElementById("form-model-select");
                let found = false;
                for (let i = 0; i < sel.options.length; i++) {
                    if (sel.options[i].value === m.model) { sel.value = m.model; found = true; break; }
                }
                if (!found) {
                    // custom entry
                    if (detectedProvider === "Custom") {
                        document.getElementById("form-model-custom-wrapper").classList.remove("hidden");
                        document.getElementById("form-model-custom").value = m.model || "";
                    }
                }
                document.getElementById("form-step-config").classList.remove("hidden");
                document.getElementById("form-model-alias").value = m.model_name || "";
                document.getElementById("form-model-key").value = m.api_key || "";
                document.getElementById("form-model-base").value = m.api_base || "";
                document.getElementById("form-model-workspace").value = m.workspace || "";
                document.getElementById("form-model-rpm").value = m.rpm || "";
                document.getElementById("form-model-timeout").value = m.request_timeout || "";
                document.getElementById("form-model-max-tokens").value = m.max_tokens || "";
                document.getElementById("form-model-tokens-field").value = m.max_tokens_field || "";
                document.getElementById("form-model-connect").value = m.connect_mode || "";
                document.getElementById("form-model-proxy").value = m.proxy || "";
                document.getElementById("form-model-auth").value = m.auth_method || "";
            } else {
                title.textContent = "Add New Model";

            form.classList.remove("hidden");
            form.scrollIntoView({ behavior: "smooth", block: "nearest" });
            refreshIcons();

            document.getElementById("model-config-form").classList.add("hidden");

        function onProviderChange() {
            const provider = document.getElementById("form-provider").value;
            const stepModel = document.getElementById("form-step-model");
            const stepConfig = document.getElementById("form-step-config");
            const sel = document.getElementById("form-model-select");
            const customWrapper = document.getElementById("form-model-custom-wrapper");

            if (!provider) {
                stepModel.classList.add("hidden");
                stepConfig.classList.add("hidden");
                return;
            }

            stepModel.classList.remove("hidden");
            stepConfig.classList.add("hidden");

            if (provider === "Custom" || provider === "OpenRouter") {
                sel.classList.add("hidden");
                customWrapper.classList.remove("hidden");
                document.getElementById("form-model-custom").value = provider === "OpenRouter" ? "openrouter/" : "";
                if (provider === "OpenRouter") {
                    document.getElementById("form-model-base").value = "https://openrouter.ai/api/v1";
                }
            } else {
                sel.classList.remove("hidden");
                customWrapper.classList.add("hidden");
                const models = PROVIDER_MODELS[provider] || [];
                sel.innerHTML = "<option value=''>-- Select Model --</option>" +
                    models.map(function (m) { return "<option value=\"" + m.model_id + "\" data-base=\"" + m.api_base + "\">" + m.label + "</option>"; }).join("");

            }
            refreshIcons();
        }

        function onModelChange() {
            const provider = document.getElementById("form-provider").value;
            let modelId = "";
            let apiBase = "";
            if (provider === "Custom" || provider === "OpenRouter") {
                modelId = document.getElementById("form-model-custom").value.trim();
            } else {
                const sel = document.getElementById("form-model-select");
                modelId = sel.value;
                const opt = sel.options[sel.selectedIndex];
                apiBase = opt ? (opt.getAttribute("data-base") || "") : "";
            }

            const stepConfig = document.getElementById("form-step-config");
            if (!modelId) { stepConfig.classList.add("hidden"); return; }
            stepConfig.classList.remove("hidden");

            // Auto-fill API base and alias if empty
            if (!document.getElementById("form-model-base").value) {
                document.getElementById("form-model-base").value = apiBase;
            }
            if (!document.getElementById("form-model-alias").value) {
                const parts = modelId.split("/");
                document.getElementById("form-model-alias").value = parts[parts.length - 1];
            }

            // Try to inherit API key from same provider
            if (!document.getElementById("form-model-key").value) {
                const prefix = modelId.split("/")[0];
                const existing = configuredModels.find(m => m.model && m.model.startsWith(prefix + "/") && m.api_key);
                if (existing) document.getElementById("form-model-key").value = existing.api_key;
            }
            refreshIcons();
        }

        function saveModelForm() {
            const provider = document.getElementById("form-provider").value;
            let modelId = "";
            if (provider === "Custom" || provider === "OpenRouter") {
                modelId = document.getElementById("form-model-custom").value.trim();
            } else {
                modelId = document.getElementById("form-model-select").value;
            }
            const alias = document.getElementById("form-model-alias").value.trim();
            if (!alias || !modelId) {
                alert("Please select a model and provide an alias name.");
                return;
            }
            const entry = {
                model_name: alias,
                model: modelId,
            };
            const apiBase = document.getElementById("form-model-base").value.trim();
            const apiKey = document.getElementById("form-model-key").value.trim();
            const workspace = document.getElementById("form-model-workspace").value.trim();
            const rpm = parseInt(document.getElementById("form-model-rpm").value, 10);
            const timeout = parseInt(document.getElementById("form-model-timeout").value, 10);
            const maxTokens = parseInt(document.getElementById("form-model-max-tokens").value, 10);
            const tokensField = document.getElementById("form-model-tokens-field").value.trim();
            const connectMode = document.getElementById("form-model-connect").value.trim();
            const proxy = document.getElementById("form-model-proxy").value.trim();
            const auth = document.getElementById("form-model-auth").value.trim();

            if (apiBase) entry.api_base = apiBase;
            if (apiKey) entry.api_key = apiKey;
            if (workspace) entry.workspace = workspace;
            if (!isNaN(rpm) && rpm > 0) entry.rpm = rpm;
            if (!isNaN(timeout) && timeout > 0) entry.request_timeout = timeout;
            if (!isNaN(maxTokens) && maxTokens > 0) entry.max_tokens = maxTokens;
            if (proxy) entry.proxy = proxy;
            if (auth) entry.auth_method = auth;
            if (tokensField) entry.max_tokens_field = tokensField;
            if (connectMode) entry.connect_mode = connectMode;

            const editIndex = parseInt(document.getElementById("edit-model-index").value, 10);
            if (editIndex >= 0) {
                configuredModels[editIndex] = entry;
            } else {
                configuredModels.push(entry);
                standardModel = alias; // Auto-set new model as standard
            }
            closeModelForm();
            renderConfiguredModels();
            saveConfig();
        }

        function refreshDefaultModelOptions() {
            const agentModelSelect = document.getElementById("agent-model");
            if (!agentModelSelect) return;
            const prevAgent = agentModelSelect ? agentModelSelect.value : "";
            agentModelSelect.innerHTML = "<option value=''>Default (System Default)</option>";

                opt.value = m.model_name;

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function updateSofia() {
            if (!confirm("This will pull the latest code from Git, recompile Sofia, and restart. Continue?")) return;
            try {
                const res = await fetch("/api/update", { method: "POST" });
                if (res.ok) {
                    alert("Update successful! Sofia is restarting. The page will reload shortly.");
                    setTimeout(() => window.location.reload(), 3000);
                } else {
                    const text = await res.text();
                    alert("Update failed: " + text);
                }
            } catch (err) {
                alert("Error calling update: " + err);
            }
        }

        async function restartSofia() {
            if (!confirm("Are you sure you want to restart Sofia?")) return;
            try {
                const res = await fetch("/api/restart", { method: "POST" });
                if (res.ok) {
                    alert("Sofia is restarting. The page will reload shortly.");
                    setTimeout(() => window.location.reload(), 2000);
                } else {
                    alert("Failed to restart");
                }
            } catch (err) {
                alert("Error calling restart: " + err);
            }
        }

        async function addSkill() {
            const name = document.getElementById("new-skill-name").value;
            const content = document.getElementById("new-skill-content").value;

            if (!name || !content) {
                alert("Name and content are required!");
                return;
            }

            try {
                const res = await fetch("/api/skills/add", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, content })
                });

                if (res.ok) {
                    alert("Skill installed!");
                    document.getElementById("new-skill-name").value = "";
                    document.getElementById("new-skill-content").value = "";
                    fetchStatus();
                } else {
                    const err = await res.text();
                    alert("Error: " + err);
                }
            } catch (e) {
                alert("Could not connect to the server.");
            }
        }

        async function fetchStatus() {
            try {
                const res = await fetch("/api/status");
                const dot = document.getElementById("status-dot");
                if (res.ok) {
                    if (dot) {
                        dot.classList.remove("bg-sofia");
                        dot.classList.add("bg-green-500");
                        dot.classList.remove("shadow-[0_0_8px_rgba(255,77,77,0.5)]");
                        dot.classList.add("shadow-[0_0_8px_rgba(34,197,94,0.5)]");
                    }
                } else {
                    if (dot) {
                        dot.classList.add("bg-sofia");
                        dot.classList.remove("bg-green-500");
                        dot.classList.add("shadow-[0_0_8px_rgba(255,77,77,0.5)]");
                        dot.classList.remove("shadow-[0_0_8px_rgba(34,197,94,0.5)]");
                    }
                    return;
                }
                const data = await res.json();

                // Build agent metadata map for use in Agent Monitor cards
                if (data.agents && data.agents.list) {
                    data.agents.list.forEach(function (a) {
                        agentMeta[a.id] = { name: a.name || a.id, model: a.model || "", role: a.role || "subagent" };
                    });
                }

                // Update Mini Status in Sidebar
                document.getElementById("stat-version").innerText = data.version || "dev";

                // Render persistent agent cards and cache list for WS re-renders
                if (data.agents && data.agents.list) {
                    window._lastAgentList = data.agents.list;
                    window._lastActiveId = data.agents.active ? data.agents.active.id : '';
                    window._lastActiveStatus = data.agents.active ? data.agents.active.status : 'Idle';
                    renderAgentCards(data.agents.list, data.agents.active);
                }

                // Update sidebar activity indicator
                const sidebarActivity = document.getElementById('sidebar-activity');
                const sidebarText = document.getElementById('sidebar-activity-text');
                if (sidebarActivity && sidebarText) {
                    if (data.agents.active && data.agents.active.id && data.agents.active.status && data.agents.active.status !== 'Idle') {
                        sidebarActivity.classList.remove('hidden');
                        sidebarText.textContent = data.agents.active.status;
                    } else {
                        sidebarActivity.classList.add('hidden');
                    }
                }

                // Track active agent ID for Agents tab highlighting
                if (data.agents.active && data.agents.active.id) {
                    activeAgentID = data.agents.active.id;
                } else {
                    activeAgentID = null;
                }

                // If on agents tab, we might want to refresh to show active status
                if (currentTab === 'agents' && activeAgentID) {
                    // We don't want to full refresh every 2s as it's jarring, 
                    // but we can update the borders
                    document.querySelectorAll('[data-agent-id]').forEach(el => {
                        if (el.getAttribute('data-agent-id') === activeAgentID) {
                            el.classList.add('border-sofia', 'bg-sofia/5');
                            el.classList.remove('border-zinc-800');
                        } else {
                            el.classList.remove('border-sofia', 'bg-sofia/5');
                            el.classList.add('border-zinc-800');
                        }
                    });
                }

                // Update System Details in Settings
                const details = document.getElementById("system-details");
                if (details) {
                    details.innerHTML =
                        "<div class='flex justify-between items-center'><span class='text-zinc-500'>Active Agents:</span> <span class='text-zinc-200 font-medium'>" + data.agents.ids.length + "</span></div>" +
                        "<div class='flex flex-wrap gap-1 mt-1'>" + data.agents.ids.map(id => "<span class='px-2 py-0.5 rounded bg-zinc-800 text-[10px] text-zinc-400 border border-zinc-700/50'>" + id + "</span>").join("") + "</div>" +
                        "<div class='flex justify-between items-center mt-4'><span class='text-zinc-500'>Loaded Tools:</span> <span class='text-zinc-200 font-medium'>" + data.tools.count + "</span></div>" +
                        "<div class='flex justify-between items-center'><span class='text-zinc-500'>Loaded Skills:</span> <span class='text-zinc-200 font-medium'>" + data.skills.total + "</span></div>";
                }

                // Update Skills List
                skillsData = data.skills.list || [];
                renderSkills(skillsData);

                // Update Tools List
                const toolsList = document.getElementById("tools-list");
                if (toolsList && data.tools.list) {
                    toolsList.innerHTML = data.tools.list.map(t =>
                        "<div class='p-3 bg-zinc-900/30 rounded-xl border border-zinc-800/50 hover:border-zinc-700 transition-colors'>" +
                        "<div class='font-bold text-xs text-sofia flex items-center gap-2'><i data-lucide='box' class='w-3 h-3'></i>" + escapeHtml(t.name) + "</div>" +
                        "<div class='text-[10px] text-zinc-500 mt-1 leading-relaxed'>" + escapeHtml(t.description || "No description.") + "</div>" +
                        "</div>"
                    ).join("");
                    refreshIcons();
                }
            } catch (e) {
                const dot = document.getElementById("status-dot");
                if (dot) {
                    dot.classList.add("bg-sofia");
                    dot.classList.remove("bg-green-500");
                    dot.classList.add("shadow-[0_0_8px_rgba(255,77,77,0.5)]");
                    dot.classList.remove("shadow-[0_0_8px_rgba(34,197,94,0.5)]");
                }
                console.error("Status fetch failed", e);
            }
        }

        function renderSkills(list) {
            const skillsList = document.getElementById("skills-list");
            if (!skillsList) return;
            if (!list || list.length === 0) {
                skillsList.innerHTML = "<p class='text-zinc-500 italic text-sm'>No skills found.</p>";
                return;
            }

            const grouped = list.reduce((acc, s) => {
                acc[s.source] = acc[s.source] || [];
                acc[s.source].push(s);
                return acc;
            }, {});

            let html = "";
            for (const source in grouped) {
                html += "<div class='mb-6'><h3 class='text-[10px] font-bold uppercase tracking-widest text-zinc-600 mb-3 ml-1'>" + source + "</h3>";
                grouped[source].forEach(s => {
                    html += "<div class='group p-4 bg-zinc-900/40 rounded-xl border border-zinc-800/50 hover:border-sofia/30 transition-all cursor-default'>" +
                        "<div class='flex justify-between items-start'>" +
                        "<div class='font-bold text-sm text-zinc-200 group-hover:text-sofia transition-colors'>" + s.name + "</div>" +
                        "<span class='px-1.5 py-0.5 rounded bg-zinc-800 text-[9px] text-zinc-500 border border-zinc-700'>SKILL</span>" +
                        "</div>" +
                        "<div class='text-xs text-zinc-500 mt-1 line-clamp-2 leading-relaxed'>" + (s.description || "No description available.") + "</div>" +
                        "<div class='text-[9px] font-mono text-zinc-700 mt-3 truncate opacity-50'>" + s.path + "</div>" +
                        "</div>";
                });
                html += "</div>";
            }
            skillsList.innerHTML = html;
            populateSkillPicker();
        }

            try {
                const res = await fetch("/api/agent-templates");
                if (!res.ok) return;
                purposeTemplates = await res.json();

                const select = document.getElementById("agent-template");
                if (!select) return;
                const previousValue = select.value || "";
                select.innerHTML = "<option value=''>No template</option>";

                purposeTemplates.forEach(t => {
                    purposeTemplateMap[t.name] = t;
                    const opt = document.createElement("option");
                    opt.value = t.name;
                    opt.textContent = t.name;
                    select.appendChild(opt);
                });

                if (previousValue && Array.from(select.options).some(o => o.value === previousValue)) {
                    select.value = previousValue;

        async function onTemplateSelected() {
            const templateSelect = document.getElementById("agent-template");
            const warning = document.getElementById("agent-template-missing-skills");
            const hint = document.getElementById("agent-template-hint");
            const textarea = document.getElementById("agent-instructions");
            if (!templateSelect || !warning || !textarea) return;
            const selected = templateSelect.value;

            warning.classList.add("hidden");
            warning.innerText = "";
            if (hint) hint.classList.add("hidden");

            if (!selected) {
                return;
            }

            const idInput = document.getElementById("agent-id");
            const nameInput = document.getElementById("agent-name");
            if (!idInput.value) idInput.value = selected;
            if (!nameInput.value) nameInput.value = selected;

            try {
                const res = await fetch("/api/agent-templates/" + encodeURIComponent(selected));
                if (!res.ok) return;
                const data = await res.json();
                textarea.value = data.instructions || "";
                if (hint) hint.classList.remove("hidden");

                const availableSkills = new Set((skillsData || []).map(s => s.name));
                const missing = (data.skills || []).filter(s => !availableSkills.has(s));
                if (missing.length > 0) {
                    warning.innerText = "Missing skills: " + missing.join(", ");
                    warning.classList.remove("hidden");
                }
            } catch (e) {
                console.error("Template load failed", e);
            }
        }

        function validateChannelSettings() {
            const telegramToggle = document.getElementById("cfg-telegram");
            const telegramTokenInput = document.getElementById("cfg-telegram-token");
            const discordToggle = document.getElementById("cfg-discord");
            const discordTokenInput = document.getElementById("cfg-discord-token");
            if (!telegramToggle || !telegramTokenInput || !discordToggle || !discordTokenInput) {
                return true;
            }

            const telegramEnabled = telegramToggle.checked;
            const telegramToken = telegramTokenInput.value.trim();
            const discordEnabled = discordToggle.checked;
            const discordToken = discordTokenInput.value.trim();

            const telegramWarn = document.getElementById("cfg-telegram-warning");
            const discordWarn = document.getElementById("cfg-discord-warning");
            const globalWarn = document.getElementById("cfg-channels-warning");

            const telegramInvalid = telegramEnabled && !telegramToken;
            const discordInvalid = discordEnabled && !discordToken;

            if (telegramWarn) telegramWarn.classList.toggle("hidden", !telegramInvalid);
            if (discordWarn) discordWarn.classList.toggle("hidden", !discordInvalid);
            if (globalWarn) globalWarn.classList.toggle("hidden", !(telegramInvalid || discordInvalid));

            return !(telegramInvalid || discordInvalid);

        let logEventSource = null;

        // ── Log rendering ────────────────────────────────────────────────

        function appendLogRow(logView, entry) {
            if (!logView) return;

            // Remove placeholder "Connecting..." line on first real entry
            const placeholder = logView.querySelector('.italic');
            if (placeholder) placeholder.remove();

            // Timestamp  HH:MM:SS.mmm
            let timeStr = "";
            if (entry.timestamp) {
                const t = entry.timestamp.split("T")[1] || "";
                timeStr = t.replace("Z", "").substring(0, 12); // HH:MM:SS.mmm
            }

            // Level badge color
            const levelColors = {
                DEBUG: "bg-zinc-700 text-zinc-400",
                INFO:  "bg-sky-900/60 text-sky-400",
                WARN:  "bg-yellow-900/60 text-yellow-400",
                ERROR: "bg-red-900/60 text-red-400",
                FATAL: "bg-red-900/80 text-red-300 font-bold",
            };
            const level = (entry.level || "INFO").toUpperCase();
            const levelBadge = "<span class='shrink-0 px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wide " +
                (levelColors[level] || levelColors.INFO) + "'>" + level + "</span>";

            // Component badge
            const comp = entry.component || "";
            let compBadge = "";
            if (comp === "agent:main") {
                compBadge = "<span class='shrink-0 px-1.5 py-0.5 rounded text-[9px] font-mono bg-violet-900/50 text-violet-400'>" + escapeHtml(comp) + "</span>";
            } else if (comp.startsWith("agent:")) {
                compBadge = "<span class='shrink-0 px-1.5 py-0.5 rounded text-[9px] font-mono bg-amber-900/40 text-amber-400'>" + escapeHtml(comp) + "</span>";
            } else if (comp === "tool" || comp.startsWith("tool:")) {
                compBadge = "<span class='shrink-0 px-1.5 py-0.5 rounded text-[9px] font-mono bg-yellow-900/40 text-yellow-500'>" + escapeHtml(comp) + "</span>";
            } else if (comp) {
                compBadge = "<span class='shrink-0 px-1.5 py-0.5 rounded text-[9px] font-mono bg-zinc-800 text-zinc-500'>" + escapeHtml(comp) + "</span>";
            }

            // Message color by prefix
            const msg = entry.message || "";
            let msgColor = "text-zinc-400";
            if (level === "ERROR" || level === "FATAL") {
                msgColor = "text-red-400";
            } else if (level === "WARN") {
                msgColor = "text-yellow-400";
            } else if (msg.startsWith("SOFIA:")) {
                msgColor = "text-sky-400";
            } else if (msg.startsWith("SUBAGENT:")) {
                msgColor = "text-amber-400";
            } else if (msg.startsWith("TOOL:")) {
                msgColor = "text-yellow-300";
            } else if (msg.startsWith("ROUTER:")) {
                msgColor = "text-violet-400";
            }

            // Determine filter category for this row
            let filterCat = "other";
            if (level === "ERROR" || level === "FATAL") {
                filterCat = "error";
            } else if (msg.startsWith("SOFIA:") || comp === "agent:main") {
                filterCat = "sofia";
            } else if (msg.startsWith("SUBAGENT:") || (comp.startsWith("agent:") && comp !== "agent:main")) {
                filterCat = "subagent";
            } else if (msg.startsWith("TOOL:") || comp === "tool" || comp.startsWith("tool:")) {
                filterCat = "tool";
            }

            // Fields section (collapsible)
            let fieldsHtml = "";
            if (entry.fields && Object.keys(entry.fields).length > 0) {
                const pairs = Object.entries(entry.fields)
                    .map(([k, v]) => "<span class='mr-3'><span class='text-zinc-600'>" + escapeHtml(k) + "=</span><span class='text-zinc-400'>" + escapeHtml(String(v)) + "</span></span>")
                    .join("");
                fieldsHtml = "<div class='log-fields hidden pl-24 pb-1 text-[10px] font-mono leading-relaxed flex-wrap'>" + pairs + "</div>";
            }

            const row = document.createElement("div");
            row.className = "log-row border-b border-zinc-900/60 hover:bg-white/[0.02] transition-colors cursor-default" +
                (fieldsHtml ? " has-fields" : "");
            row.setAttribute("data-filter", filterCat);
            row.setAttribute("data-msg", msg.toLowerCase());

            row.innerHTML =
                "<div class='flex items-baseline gap-1.5 px-2 py-0.5 min-w-0'>" +
                "<span class='shrink-0 text-zinc-700 font-mono text-[10px] w-28 tabular-nums'>" + timeStr + "</span>" +
                levelBadge +
                (compBadge ? " " + compBadge : "") +
                "<span class='flex-1 min-w-0 text-[11px] font-mono " + msgColor + " truncate ml-1'>" + escapeHtml(msg) + "</span>" +
                (fieldsHtml ? "<span class='shrink-0 text-zinc-700 text-[9px] ml-1 select-none'>▶</span>" : "") +
                "</div>" +
                fieldsHtml;

            if (fieldsHtml) {
                row.addEventListener("click", function () {
                    const fd = row.querySelector(".log-fields");
                    const arrow = row.querySelector(".select-none");
                    if (fd) {
                        const hidden = fd.classList.toggle("hidden");
                        if (arrow) arrow.textContent = hidden ? "▶" : "▼";
                    }
                });
            }

            logView.appendChild(row);

            // Apply current filter to the new row immediately
            applyFilterToRow(row);

            // Trim to MAX_LOG_ROWS (remove oldest rows)
            const rows = logView.querySelectorAll(".log-row");
            if (rows.length > MAX_LOG_ROWS) {
                for (let i = 0; i < rows.length - MAX_LOG_ROWS; i++) {
                    rows[i].remove();
                }
            }

            // Auto-scroll if near bottom
            if (logView.scrollHeight - logView.scrollTop < logView.clientHeight + 80) {
                logView.scrollTop = logView.scrollHeight;
            }
        }

        function setLogFilter(filter) {
            currentLogFilter = filter;

            // Update chip active states
            document.querySelectorAll(".log-filter-btn").forEach(function (btn) {
                const isActive = btn.id === "logfilter-" + filter;
                if (isActive) {
                    btn.classList.add("active", "bg-zinc-800", "text-zinc-300");
                    btn.classList.remove("text-zinc-500");
                } else {
                    btn.classList.remove("active", "bg-zinc-800", "text-zinc-300");
                    btn.classList.add("text-zinc-500");
                }
            });

            applyLogFilter();
        }

        function applyLogFilter() {
            const logView = document.getElementById("log-view");
            if (!logView) return;
            const searchEl = document.getElementById("log-search");
            const searchTerm = searchEl ? searchEl.value.toLowerCase() : "";
            logView.querySelectorAll(".log-row").forEach(function (row) {
                applyFilterToRow(row, searchTerm);
            });
        }

        function applyFilterToRow(row, searchTerm) {
            const filterCat = row.getAttribute("data-filter") || "other";
            const msg = row.getAttribute("data-msg") || "";
            if (!searchTerm && searchTerm !== "") {
                const searchEl = document.getElementById("log-search");
                searchTerm = searchEl ? searchEl.value.toLowerCase() : "";
            }
            let visible = true;
            if (currentLogFilter !== "all") {
                if (currentLogFilter === "error") {
                    visible = filterCat === "error";
                } else if (currentLogFilter === "sofia") {
                    visible = filterCat === "sofia";
                } else if (currentLogFilter === "subagent") {
                    visible = filterCat === "subagent";
                } else if (currentLogFilter === "tool") {
                    visible = filterCat === "tool";
                }
            }
            if (visible && searchTerm) {
                visible = msg.includes(searchTerm);
            }
            row.style.display = visible ? "" : "none";
        }

        function clearLogs() {
            const logView = document.getElementById("log-view");
            if (!logView) return;
            logView.innerHTML = "<div class='text-zinc-600 italic'>Logs cleared.</div>";

        function stopLogStream() {
            logStreamEnabled = false;
            if (logReconnectTimer) {
                clearTimeout(logReconnectTimer);
                logReconnectTimer = null;
            }
            if (logEventSource) {
                logEventSource.close();
                logEventSource = null;
            }
        }

        // Always-on SSE connection that powers the Agent Monitor regardless of which tab is open.
        function startMonitorStream() {
            if (monitorEventSource) return;
            monitorEventSource = new EventSource("/api/logs");
            monitorEventSource.onmessage = function (event) {
                try {
                    const entry = JSON.parse(event.data);
                    if (entry.component && entry.component.startsWith("agent:")) {
                        handleAgentLog(entry);
                    }
                } catch (e) { /* ignore parse errors */ }
            };
            monitorEventSource.onerror = function () {
                if (!monitorEventSource) return;
                monitorEventSource.close();
                monitorEventSource = null;
                // Reconnect after 5s
                setTimeout(startMonitorStream, 5000);
            };
        }

        function setupLogStream(forceReconnect) {
            const logView = document.getElementById("log-view");
            if (!logView) return;

            logStreamEnabled = true;
            if (logReconnectTimer) {
                clearTimeout(logReconnectTimer);
                logReconnectTimer = null;
            }

            if (forceReconnect && logEventSource) {
                logEventSource.close();
                logEventSource = null;
            }
            if (logEventSource) return;

            logView.innerHTML = "<div class='text-zinc-600 italic px-2 py-1'>Connecting to stream...</div>";
            logEventSource = new EventSource("/api/logs");

            logEventSource.onmessage = function (event) {
                try {
                    const logView = document.getElementById("log-view");
                    const entry = JSON.parse(event.data);

                    // 1. Render rich log row
                    appendLogRow(logView, entry);

                    // 2. Handle Agent Monitor
                    if (entry.component && entry.component.startsWith("agent:")) {
                        handleAgentLog(entry);
                    }
                } catch (e) {
                    const logView = document.getElementById("log-view");
                    if (!logView) return;
                    const div = document.createElement("div");
                    div.className = "px-2 py-0.5 text-zinc-600 italic";
                    div.textContent = event.data;
                    logView.appendChild(div);
                }
            };

            logEventSource.onerror = function () {
                if (!logEventSource) return;
                logEventSource.close();
                logEventSource = null;
                if (!logStreamEnabled) return;
                logReconnectTimer = setTimeout(function () {
                    setupLogStream(false);
                }, 5000);
            };
        }

        // renderAgentCards builds/updates the persistent per-agent status cards.
        // Called every 2s from fetchStatus(). Creates cards on first call, then
        // only updates the status/activity fields without tearing down existing cards.
        function renderAgentCards(agentList, active) {
            const container = document.getElementById("agent-card-list");
            const pulse = document.getElementById("monitor-pulse");
            if (!container) return;

            const activeId = (active && active.id) ? active.id : null;
            const activeStatus = (active && active.status) ? active.status : "Idle";

            // Pulse indicator: red when any agent is busy, green when all idle
            const anyBusy = activeId || (window.activeAgents && Object.keys(window.activeAgents).length > 0);
            if (pulse) {
                if (anyBusy) {
                    pulse.className = "w-1.5 h-1.5 bg-red-500 animate-pulse";
                } else {
                    pulse.className = "w-1.5 h-1.5 bg-green-500";
                }
            }

            // Build set of known card IDs
            const existingIds = new Set();
            container.querySelectorAll('[data-agent-card]').forEach(function(el) {
                existingIds.add(el.getAttribute('data-agent-card'));
            });

            agentList.forEach(function(a) {
                const isMain = (a.role === 'sofia' || a.id === 'main');
                // Check both the global active agent and per-agent tracking
                const isBusy = (a.id === activeId) ||
                    (window.activeAgents && window.activeAgents[a.id]);
                const busyInfo = window.activeAgents && window.activeAgents[a.id];
                const status = isBusy
                    ? (busyInfo ? busyInfo.status || activeStatus : activeStatus)
                    : 'Ready';
                // Green = ready/idle, Red = busy/working
                const statusColor = isBusy
                    ? 'text-red-400 animate-pulse'
                    : 'text-green-500';
                const dotColor = isBusy
                    ? 'bg-red-500 animate-pulse shadow-[0_0_4px_rgba(239,68,68,0.6)]'
                    : 'bg-green-500 shadow-[0_0_4px_rgba(34,197,94,0.4)]';
                const borderColor = isBusy
                    ? 'border-red-500/30'
                    : 'border-green-500/20';
                const roleLabel = isMain ? 'Primary' : 'Sub-agent';
                const roleLabelColor = isMain ? 'text-sofia' : 'text-zinc-500';

                if (!existingIds.has(a.id)) {
                    // Create new card
                    const card = document.createElement('div');
                    card.setAttribute('data-agent-card', a.id);
                    card.className = 'agent-status-card p-2.5 border ' + borderColor + ' bg-black/30 transition-all duration-300';

                        '<div class="flex items-center gap-2 mb-1.5">' +
                        '  <div id="card-dot-' + a.id + '" class="w-2 h-2 shrink-0 ' + dotColor + '"></div>' +
                        '  <span class="text-[10px] font-bold uppercase tracking-wider text-zinc-200 truncate flex-grow">' + escapeHtml(a.name || a.id) + '</span>' +
                        '  <span class="text-[8px] font-bold uppercase ' + roleLabelColor + ' shrink-0">' + roleLabel + '</span>' +
                        '</div>' +
                        '<div class="text-[8px] text-zinc-600 font-mono mb-1.5 truncate">' + escapeHtml(a.model || '') + '</div>' +
                        '<div class="flex items-center gap-1.5">' +
                        '  <span id="card-status-' + a.id + '" class="text-[9px] font-mono ' + statusColor + ' truncate">' + escapeHtml(status) + '</span>' +
                        '</div>' +
                        '<div id="card-task-' + a.id + '" class="mt-1 text-[8px] text-red-400/70 font-mono truncate hidden"></div>';
                    container.appendChild(card);
                    refreshIcons();
                } else {
                    // Update existing card
                    const card = container.querySelector('[data-agent-card="' + a.id + '"]');
                    if (!card) return;
                    card.className = 'agent-status-card p-2.5 border ' + borderColor + ' bg-black/30 transition-all duration-300';

                    const statusEl = document.getElementById('card-status-' + a.id);

                        statusEl.className = 'text-[9px] font-mono ' + statusColor + ' truncate';

            existingIds.forEach(function(id) {

                    if (card) card.remove();
                }
            });

        function handleAgentLog(entry) {
            const agentId = entry.component.replace("agent:", "");
            const msg = entry.message || "";

            // While a chat request is in flight, update the typing indicator in the chat area
            if (chatWaiting) {
                const indicator = document.getElementById("typing-indicator");
                if (indicator) {
                    let hint = "";
                    if (msg.startsWith("OPENCODE: started")) {
                        openCodeActive = true;
                        indicator.classList.remove("text-sofia", "text-[9px]");
                        indicator.classList.add("text-amber-400", "text-[10px]", "px-2", "py-0.5", "bg-amber-400/10", "border", "border-amber-400/40", "rounded");
                        hint = "OpenCode running...";
                    } else if (msg.startsWith("OPENCODE: finished")) {
                        openCodeActive = false;
                        indicator.classList.remove("text-amber-400", "text-[10px]", "px-2", "py-0.5", "bg-amber-400/10", "border", "border-amber-400/40", "rounded");
                        indicator.classList.add("text-sofia", "text-[9px]");
                        hint = "OpenCode done";
                    } else if (msg.startsWith("TOOL: started ")) {
                        hint = "Running " + msg.replace(/^TOOL: started\s*/, "").replace(/\s*\(.*/, "") + "...";
                    } else if (msg.startsWith("TOOL: finished ")) {
                        hint = "Done: " + msg.replace(/^TOOL: finished\s*/, "").split(" in ")[0];
                    } else if (msg.startsWith("TOOL: LLM requested ")) {
                        hint = msg.replace(/^TOOL:\s*/, "");
                    } else if (msg.startsWith("SOFIA: generating response")) {
                        hint = "Generating response...";
                    } else if (msg.startsWith("SOFIA: synthesis start")) {
                        hint = "Synthesizing result...";
                    } else if (msg.startsWith("SOFIA: delegating to")) {
                        const m = msg.match(/delegating to "([^"]+)"/);
                        hint = m ? "Delegating to " + m[1] + "..." : "Delegating...";
                    } else if (msg.startsWith("SUBAGENT: task started")) {
                        hint = "Sub-agent working...";
                    } else if (msg.startsWith("ROUTER:")) {
                        hint = "Routing request...";
                    }
                    if (hint) {
                        indicator.textContent = hint.length > 60 ? hint.substring(0, 60) + "…" : hint;
                    }
                }
            }

            // Update the task label on the persistent card if it exists
            const taskEl = document.getElementById('card-task-' + agentId);
            if (taskEl) {
                // Show a condensed task hint from key log messages
                let hint = "";
                if (msg.startsWith("TOOL:")) {
                    hint = msg.replace(/^TOOL:\s*/, "");
                } else if (msg.startsWith("SUBAGENT:")) {
                    hint = msg.replace(/^SUBAGENT:\s*/, "");
                } else if (msg.startsWith("SOFIA:")) {
                    hint = msg.replace(/^SOFIA:\s*/, "");
                }
                if (hint) {
                    taskEl.textContent = hint.length > 60 ? hint.substring(0, 60) + "…" : hint;
                    taskEl.classList.remove("hidden");
                    // Clear after 10s
                    if (taskEl._clearTimer) clearTimeout(taskEl._clearTimer);
                    taskEl._clearTimer = setTimeout(function() {
                        taskEl.textContent = "";
                        taskEl.classList.add("hidden");
                    }, 10000);
                }
            }

            // Append to the live-log strip at the bottom
            const liveLog = document.getElementById("agent-live-log");
            const linesDiv = document.getElementById("agent-live-log-lines");
            if (liveLog && linesDiv) {
                liveLog.classList.remove("hidden");

                const msg = entry.message || "";
                let textColor = "text-zinc-500";
                let prefix = "";
                if (msg.startsWith("TOOL:")) { textColor = "text-yellow-400"; prefix = "⚡ "; }
                else if (msg.startsWith("SUBAGENT:")) { textColor = "text-amber-400"; prefix = "◈ "; }
                else if (msg.startsWith("SOFIA:") && (msg.includes("response ready") || msg.includes("direct answer") || msg.includes("synthesis"))) { textColor = "text-green-400"; prefix = "✓ "; }
                else if (msg.startsWith("SOFIA:") || msg.startsWith("ROUTER:")) { textColor = "text-sky-400"; prefix = "→ "; }
                else if (entry.level === "ERROR" || entry.level === "FATAL") { textColor = "text-red-400"; prefix = "✗ "; }
                else if (entry.level === "WARN") { textColor = "text-yellow-400"; prefix = "⚠ "; }

                const meta = agentMeta[agentId];
                const agentLabel = meta ? meta.name : agentId;
                const timeStr = entry.timestamp ? entry.timestamp.split("T")[1].replace("Z","").substring(0,8) : "";

                const line = document.createElement("div");
                line.className = "flex gap-1.5 py-0.5 " + textColor;
                line.innerHTML =
                    '<span class="text-zinc-700 shrink-0">' + timeStr + '</span>' +
                    '<span class="text-zinc-600 shrink-0 font-bold">' + escapeHtml(agentLabel) + '</span>' +
                    '<span class="truncate">' + prefix + escapeHtml(msg) + '</span>';
                linesDiv.appendChild(line);

                // Keep max 80 lines
                while (linesDiv.children.length > 80) {
                    linesDiv.removeChild(linesDiv.firstChild);
                }

                if (linesDiv.scrollHeight - linesDiv.scrollTop < linesDiv.clientHeight + 60) {
                    linesDiv.scrollTop = linesDiv.scrollHeight;
                }

                // Hide live log when idle for 20s
                if (liveLog._hideTimer) clearTimeout(liveLog._hideTimer);
                liveLog._hideTimer = setTimeout(function() {
                    liveLog.classList.add("hidden");
                }, 20000);
            }
        }

        function formatAssistantMessage(text) {
            let safe = escapeHtml(text);

            // Code fences
            safe = safe.replace(new RegExp("\\x60\\x60\\x60([\\w-]+)?\\n([\\s\\S]*?)\\x60\\x60\\x60", "g"), (_, lang, code) => {
                const language = lang ? "<div class='text-[10px] text-zinc-400 mb-1 uppercase tracking-wider'>" + lang + "</div>" : "";
                return "<div class='mt-3 mb-2 p-3 rounded-xl bg-black/20 border border-[var(--border-color)] overflow-x-auto'>" +
                    language +
                    "<pre class='text-xs text-zinc-200 whitespace-pre'><code>" + code + "</code></pre>" +
                    "</div>";
            });

            // Basic emphasis
            safe = safe.replace(/\*\*(.*?)\*\*/g, "<strong class='text-[var(--text-main)]'>$1</strong>");
            safe = safe.replace(new RegExp("\\x60([^\\x60]+)\\x60", "g"), "<code class='px-1 py-0.5 rounded bg-black/20 border border-[var(--border-color)] text-xs'>$1</code>");

            // Preserve line breaks
            safe = safe.replace(/\n/g, "<br>");
            return safe;
        }

        // ── File Attachment ────────────────────────────────────────────────
        let attachedFiles = []; // [{name, type, content (base64 or text)}]

        function handleFileAttach(input) {
            const files = Array.from(input.files);
            if (!files.length) return;

            const reads = files.map(file => new Promise(resolve => {
                const isImage = file.type.startsWith("image/");
                const isText = !isImage && (file.type.startsWith("text/") ||
                    /\.(md|txt|csv|json|yaml|yml|toml|go|py|js|ts|html|css|sh|log|xml|sql)$/i.test(file.name));
                const reader = new FileReader();
                reader.onload = e => resolve({
                    name: file.name,
                    type: file.type || "application/octet-stream",
                    isText,
                    isImage,
                    // For images: raw base64 (backend builds the data URL)
                    // For text: plain text string
                    // For binary: base64
                    content: isText ? e.target.result : btoa(e.target.result),
                    // For preview thumbnail only (data URL)
                    previewURL: isImage ? URL.createObjectURL(file) : null,
                });
                if (isText) reader.readAsText(file);
                else reader.readAsBinaryString(file);
            }));

            Promise.all(reads).then(results => {
                attachedFiles.push(...results);
                renderFilePreview();
                input.value = "";
                refreshIcons();
            });
        }

        function renderFilePreview() {
            const strip = document.getElementById("chat-file-preview");
            if (attachedFiles.length === 0) {
                strip.classList.add("hidden");
                strip.innerHTML = "";
                return;
            }
            strip.classList.remove("hidden");
            strip.innerHTML = attachedFiles.map((f, i) => {
                if (f.isImage && f.previewURL) {
                    return "<div class='relative group'>" +
                        "<img src='" + f.previewURL + "' class='h-16 w-16 object-cover border border-sofia/20' title='" + escapeHtml(f.name) + "'>" +
                        "<button onclick='removeAttachment(" + i + ")' class='absolute top-0 right-0 bg-black/70 text-red-400 text-xs w-4 h-4 flex items-center justify-center hover:bg-red-500 hover:text-white transition'>&times;</button>" +
                        "</div>";
                }
                return "<div class='flex items-center gap-1.5 px-2 py-1 bg-sofia/10 border border-sofia/20 text-[10px] text-sofia font-mono'>" +
                    "<i data-lucide='file-text' class='w-3 h-3 shrink-0'></i>" +
                    "<span class='truncate max-w-[160px]'>" + escapeHtml(f.name) + "</span>" +
                    "<button onclick='removeAttachment(" + i + ")' class='ml-1 text-sofia/50 hover:text-red-400 transition leading-none text-xs'>&times;</button>" +
                    "</div>";
            }).join("");
            refreshIcons();
        }

        function removeAttachment(index) {
            attachedFiles.splice(index, 1);
            renderFilePreview();
        }

        async function sendChat() {
            const input = document.getElementById("chat-input");
            const msg = input.value;
            if (!msg && attachedFiles.length === 0) return;

            const history = document.getElementById("chat-history");
            const indicator = document.getElementById("typing-indicator");

            // Build display message
            let displayMsg = msg || (attachedFiles.length > 0 ? "" : "(files attached)");
            let filesBadge = attachedFiles.length > 0
                ? "<div class='mt-2 flex flex-wrap gap-2'>" +
                attachedFiles.map(f => f.isImage && f.previewURL
                    ? "<img src='" + f.previewURL + "' class='h-20 w-20 object-cover border border-sofia/30'>"
                    : "<span class='px-1.5 py-0.5 bg-zinc-800 text-[9px] text-zinc-400 border border-zinc-700 font-mono'>" + escapeHtml(f.name) + "</span>"
                ).join("") +
                "</div>"
                : "";

            // User message
            const userHtml =
                "<div class='flex flex-col items-end gap-1 animate-slide-up'>" +
                "<div class='chat-bubble-user px-4 py-3 rounded-xl text-sm max-w-[85%] text-white'>" + escapeHtml(displayMsg) + filesBadge + "</div>" +
                "<div class='text-[9px] text-zinc-600 mr-1 font-medium'>MAGNUS</div>" +
                "</div>";
            chatHistory.push(userHtml);
            history.innerHTML += userHtml;

            const filesToSend = attachedFiles.slice();
            input.value = "";
            attachedFiles = [];
            renderFilePreview();
            indicator.textContent = "Sofia is thinking...";
            indicator.classList.remove("hidden");
            chatWaiting = true;
            history.scrollTop = history.scrollHeight;

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg, files: filesToSend, session_key: (typeof currentSessionKey !== 'undefined' ? currentSessionKey : '') })
                });

                const contentType = res.headers.get("content-type");
                let responseData;

                if (contentType && contentType.includes("application/json")) {
                    responseData = await res.json();
                } else {
                    const text = await res.text();
                    responseData = { error: text || "An unexpected error occurred (non-JSON response)" };
                }

                if (!res.ok) {
                    throw new Error(responseData.error || "Unknown error");
                }

                // Persist the session key returned by the server
                if (responseData.session_key && typeof currentSessionKey !== 'undefined') {
                    currentSessionKey = responseData.session_key;
                    if (typeof updateSessionLabel === 'function') updateSessionLabel();
                }

                chatWaiting = false;
                openCodeActive = false;
                indicator.classList.remove("text-amber-400", "text-[10px]", "px-2", "py-0.5", "bg-amber-400/10", "border", "border-amber-400/40", "rounded");
                indicator.classList.add("text-sofia", "text-[9px]", "hidden");
                indicator.textContent = "Sofia is thinking...";
                const sofiaHtml =
                    "<div class='flex gap-4 animate-slide-up'>" +
                    "<div class='w-8 h-8 rounded-lg bg-sofia/10 border border-sofia/20 flex items-center justify-center shrink-0'>" +
                    "<img src='/assets/sofiamantis.png' class='w-5 h-5 opacity-80'>" +
                    "</div>" +
                    "<div>" +
                    "<div class='chat-bubble-sofia px-4 py-3 rounded-xl text-sm leading-relaxed max-w-[85%] text-zinc-300 whitespace-pre-wrap break-words'>" + formatAssistantMessage(responseData.response) + "</div>" +
                    "<div class='text-[9px] text-zinc-600 ml-1 mt-1 font-bold uppercase tracking-widest'>Sofia System</div>" +
                    "</div>" +
                    "</div>";
                chatHistory.push(sofiaHtml);
                history.innerHTML += sofiaHtml;
            } catch (err) {
                chatWaiting = false;
                openCodeActive = false;
                indicator.classList.remove("text-amber-400", "text-[10px]", "px-2", "py-0.5", "bg-amber-400/10", "border", "border-amber-400/40", "rounded");
                indicator.classList.add("text-sofia", "text-[9px]", "hidden");
                indicator.textContent = "Sofia is thinking...";
                const errHtml =
                    "<div class='flex flex-col items-center py-4'>" +
                    "<div class='px-4 py-2 rounded-xl bg-red-900/10 border border-red-900/30 text-[11px] text-red-400 flex items-center gap-2'>" +
                    "<i data-lucide='alert-circle' class='w-3.5 h-3.5'></i>" +
                    "Critical error: " + err.message +
                    "</div>" +
                    "</div>";
                chatHistory.push(errHtml);
                history.innerHTML += errHtml;
                refreshIcons();
            }
            history.scrollTop = history.scrollHeight;
        }

        // Restore saved chat messages into #chat-history after HTMX reloads the chat tab.
        function restoreChatHistory() {
            if (chatHistory.length === 0) return;
            const history = document.getElementById("chat-history");
            if (!history) return;
            // Append saved messages after the initial greeting (keep it)
            chatHistory.forEach(function (html) {
                history.innerHTML += html;
            });
            history.scrollTop = history.scrollHeight;
            // Restore session label
            if (typeof updateSessionLabel === 'function') updateSessionLabel();
        }

        async function saveConfig() {
            try {
                let cfg = currentConfig;
                if (!cfg) {
                    const res = await fetch("/api/config");
                    cfg = await res.json();
                }

                const cfgModel = document.getElementById("cfg-model");
                if (cfgModel) {
                    cfg.model_list = getProviderModelsFromForm();
                    cfg.agents.defaults.model_name = cfgModel.value;
                    cfg.agents.defaults.model = "";
                    cfg.agents.defaults.provider = ""; // Clear legacy provider field
                }

                const telegramEnabledEl = document.getElementById("cfg-telegram");
                const discordEnabledEl = document.getElementById("cfg-discord");
                const telegramTokenEl = document.getElementById("cfg-telegram-token");
                const telegramProxyEl = document.getElementById("cfg-telegram-proxy");
                const telegramAllowFromEl = document.getElementById("cfg-telegram-allow-from");
                const discordTokenEl = document.getElementById("cfg-discord-token");
                const discordAllowFromEl = document.getElementById("cfg-discord-allow-from");
                const discordMentionOnlyEl = document.getElementById("cfg-discord-mention-only");

                if (telegramEnabledEl && discordEnabledEl && telegramTokenEl && telegramProxyEl && telegramAllowFromEl && discordTokenEl && discordAllowFromEl && discordMentionOnlyEl) {
                    cfg.channels.telegram.enabled = telegramEnabledEl.checked;
                    cfg.channels.discord.enabled = discordEnabledEl.checked;
                    cfg.channels.telegram.token = telegramTokenEl.value.trim();
                    cfg.channels.telegram.proxy = telegramProxyEl.value.trim();
                    cfg.channels.telegram.allow_from = parseAllowFromInput(telegramAllowFromEl.value);
                    cfg.channels.discord.token = discordTokenEl.value.trim();
                    cfg.channels.discord.allow_from = parseAllowFromInput(discordAllowFromEl.value);
                    cfg.channels.discord.mention_only = discordMentionOnlyEl.checked;
                }

                const restrictWorkspaceEl = document.getElementById("cfg-restrict-workspace");
                if (restrictWorkspaceEl) {
                    cfg.agents.defaults.restrict_to_workspace = restrictWorkspaceEl.checked;
                }

                const useOpenCodeEl = document.getElementById("cfg-use-opencode");
                if (useOpenCodeEl) {
                    cfg.agents.defaults.use_opencode = useOpenCodeEl.checked;
                }

                // Save Heartbeat settings if block exists
                const heartbeatEnabledEl = document.getElementById("cfg-heartbeat-enabled");
                const heartbeatIntervalEl = document.getElementById("cfg-heartbeat-interval");
                const heartbeatHoursEl = document.getElementById("cfg-heartbeat-hours");
                if (heartbeatEnabledEl && heartbeatIntervalEl && heartbeatHoursEl) {
                    if (!cfg.heartbeat) cfg.heartbeat = {};
                    cfg.heartbeat.enabled = heartbeatEnabledEl.checked;
                    cfg.heartbeat.interval = parseInt(heartbeatIntervalEl.value, 10) || 30;
                    cfg.heartbeat.active_hours = heartbeatHoursEl.value.trim();
                    cfg.heartbeat.active_days = getCheckedHeartbeatDays();
                }

                validateChannelSettings();

                const saveRes = await fetch("/api/config", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(cfg)
                });

                if (saveRes.ok) {
                    currentConfig = cfg;
                    alert("Settings saved!");
                } else {
                    alert("Could not save settings.");
                }
            } catch (e) {
                alert("An error occurred while communicating with the server.");
            }
        }
