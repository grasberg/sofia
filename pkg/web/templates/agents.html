<!-- AGENTS TAB -->
<div id="tab-agents" class="h-full">
    <div class="flex-grow-fix flex flex-col lg:flex-row gap-6">
        <!-- Add/Edit Agent -->
        <div
            class="w-full lg:w-96 shrink-0 glass-panel p-6 border border-[var(--border-color)] shadow-xl overflow-y-auto">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-sofia/10 border border-sofia/30 flex items-center justify-center text-sofia">
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                </div>
                <h2 id="agent-form-title" class="text-sm font-bold uppercase tracking-widest text-white">Initialize
                    Agent</h2>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Identifier
                        (Slug)</label>
                    <input type="text" id="agent-id" placeholder="e.g. coder"
                        class="w-full bg-black border border-[var(--border-color)] rounded-none px-4 py-3 text-xs font-mono focus:outline-none focus:border-sofia/50 transition-all text-white">
                </div>
                <div>
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Display
                        Name</label>
                    <input type="text" id="agent-name" placeholder="e.g. Coder"
                        class="w-full bg-black border border-[var(--border-color)] rounded-none px-4 py-3 text-xs font-mono focus:outline-none focus:border-sofia/50 transition-all text-white">
                </div>
                <div>
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-zinc-500 mb-2">AI Neural
                        Model</label>
                    <select id="agent-model"
                        class="w-full bg-black border border-[var(--border-color)] rounded-none px-4 py-3 text-xs font-mono focus:outline-none focus:border-sofia/50 transition-all text-white">
                        <option value="">Default (System Default)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Purpose
                        Template</label>
                    <select id="agent-template" onchange="onTemplateSelected()"
                        class="w-full bg-black border border-[var(--border-color)] rounded-none px-4 py-3 text-xs font-mono focus:outline-none focus:border-sofia/50 transition-all text-white">
                        <option value="">No template</option>
                    </select>
                </div>
                <div>
                    <label
                        class="block text-[9px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Directives</label>
                    <div id="agent-template-missing-skills"
                        class="mb-2 hidden text-[10px] text-yellow-500 font-bold uppercase">Missing dependencies
                        detected</div>
                    <textarea id="agent-instructions" rows="8" placeholder="Enter behavioral directives..."
                        class="w-full bg-black border border-[var(--border-color)] rounded-none px-4 py-3 text-xs font-mono focus:outline-none focus:border-sofia/50 transition-all text-white resize-none"></textarea>
                </div>
                <div class="pt-4 flex flex-col gap-2">
                    <button onclick="saveAgent()" class="btn-brutalist w-full py-4 text-xs">Commit
                        Configuration</button>
                    <button onclick="resetAgentForm()"
                        class="text-zinc-600 hover:text-zinc-400 text-[9px] font-bold uppercase tracking-widest transition">Purge
                        Form</button>
                </div>
            </div>
        </div>

        <!-- Agent List -->
        <div class="flex-grow-fix overflow-y-auto pr-2">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">Active Agent Matrix</h2>
                <span class="text-[10px] font-mono text-sofia" id="agent-count">0 UNITS</span>
            </div>
            <div id="agents-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>
</div>
