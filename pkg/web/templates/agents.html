<!-- AGENTS TAB -->
<div id="tab-agents" class="flex-grow-fix flex flex-col min-h-0">
    <div class="flex-grow-fix flex flex-col lg:flex-row gap-6 min-h-0">
        <!-- Add/Edit Agent -->
        <div
            class="w-full lg:w-96 shrink-0 glass-panel p-6 shadow-xl overflow-y-auto max-h-full">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 rounded-xl bg-tertiary/10 border border-tertiary/20 flex items-center justify-center text-tertiary">
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                </div>
                <h2 id="agent-form-title" class="text-sm font-bold tracking-tight text-on-surface font-headline">New Agent</h2>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-widest text-on-surface-variant/50 mb-2">Identifier (Slug)</label>
                    <input type="text" id="agent-id" placeholder="e.g. coder"
                        class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-xl px-4 py-3 text-sm font-mono focus:outline-none focus:border-tertiary/40 transition-all text-on-surface placeholder:text-on-surface-variant/30">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-widest text-on-surface-variant/50 mb-2">Display Name</label>
                    <input type="text" id="agent-name" placeholder="e.g. Coder"
                        class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-xl px-4 py-3 text-sm font-mono focus:outline-none focus:border-tertiary/40 transition-all text-on-surface placeholder:text-on-surface-variant/30">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-widest text-on-surface-variant/50 mb-2">AI Model</label>
                    <select id="agent-model"
                        class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-xl px-4 py-3 text-sm font-mono focus:outline-none focus:border-tertiary/40 transition-all text-on-surface">
                        <option value="">Default (System Default)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-widest text-on-surface-variant/50 mb-2">Purpose Template</label>
                    <select id="agent-template" onchange="onTemplateSelected()"
                        class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-xl px-4 py-3 text-sm font-mono focus:outline-none focus:border-tertiary/40 transition-all text-on-surface">
                        <option value="">No template</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-widest text-on-surface-variant/50 mb-2">Directives</label>
                    <div id="agent-template-missing-skills"
                        class="mb-2 hidden text-[10px] text-amber-400 font-bold uppercase">Missing dependencies detected</div>
                    <textarea id="agent-instructions" rows="8" placeholder="Enter behavioral directives..."
                        class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-tertiary/40 transition-all text-on-surface resize-none placeholder:text-on-surface-variant/30"></textarea>
                </div>
                <div class="pt-4 flex flex-col gap-3">
                    <button onclick="saveAgent()" class="btn-brutalist w-full py-3.5 text-xs">Save Agent</button>
                    <button onclick="resetAgentForm()"
                        class="text-on-surface-variant/40 hover:text-on-surface-variant text-[10px] font-semibold uppercase tracking-widest transition">Reset Form</button>
                </div>
            </div>
        </div>

        <!-- Agent List -->
        <div class="flex-grow-fix overflow-y-auto pr-2 min-h-0">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-sm font-bold tracking-tight text-on-surface font-headline">Agents</h2>
                <span class="text-[10px] font-mono text-tertiary" id="agent-count">0 agents</span>
            </div>
            <div id="agents-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>
</div>
