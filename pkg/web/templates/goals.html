<!-- GOALS PAGE (HTMX Partial) -->
<style>
@keyframes goal-flash { 0%,100%{opacity:1} 50%{opacity:0.4;background:rgba(59,130,246,0.1)} }
.goal-step-flash { animation: goal-flash 0.6s ease; }
@keyframes toast-in { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes toast-out { from{opacity:1} to{opacity:0;transform:translateY(-20px)} }
.goal-toast { animation: toast-in 0.3s ease; }
.goal-toast-exit { animation: toast-out 0.3s ease forwards; }
</style>
<div id="goal-toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>
<div id="tab-goals" class="flex flex-col flex-grow min-h-0 animate-fade-in">

    <!-- ===== LIST VIEW ===== -->
    <div id="goals-list-view">
        <!-- Header -->
        <div class="px-6 py-5 border-b border-[var(--border-color)] bg-[var(--bg-main)]/50 backdrop-blur shrink-0 flex items-center justify-between">
            <div>
                <h2 class="text-xl font-bold tracking-tight text-[var(--text-main)] flex items-center gap-2">
                    <i data-lucide="target" class="w-5 h-5 text-sofia"></i>
                    Goals
                </h2>
                <p class="text-xs text-zinc-500 mt-1">Set a goal. Sofia plans and delegates to subagents.</p>
            </div>
            <button onclick="goalRefresh()" class="px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-zinc-800 text-zinc-400 hover:text-[var(--text-main)] transition-colors border border-transparent hover:border-zinc-700 flex items-center gap-1">
                <i data-lucide="refresh-cw" class="w-3 h-3"></i> Refresh
            </button>
        </div>

        <div class="flex-grow overflow-y-auto">
            <!-- Input Bar -->
            <div class="px-6 py-4 border-b border-[var(--border-color)]">
                <div class="max-w-3xl mx-auto">
                    <div class="flex gap-3">
                        <div class="flex-grow">
                            <textarea id="goal-input" placeholder="Describe your goal..." rows="1"
                                class="w-full bg-[var(--bg-main)] border border-[var(--border-color)] rounded-xl px-4 py-3 text-sm text-[var(--text-main)] focus:outline-none focus:border-sofia/50 transition-all resize-none"
                                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();goalSubmit()}"
                                oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                        </div>
                        <button onclick="goalSubmit()" id="goal-submit-btn" class="bg-sofia hover:bg-sofia-hover text-white font-bold px-6 py-3 rounded-xl transition shadow-lg shadow-sofia/20 flex items-center gap-2 shrink-0 self-end">
                            <i data-lucide="rocket" class="w-4 h-4"></i> Start
                        </button>
                    </div>
                    <!-- Options row -->
                    <div class="flex items-center gap-6 mt-3 text-xs text-zinc-400">
                        <div class="flex items-center gap-2">
                            <span class="text-zinc-500 font-medium">Priority:</span>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="radio" name="goal-priority" value="low" class="accent-sofia w-3 h-3"> Low</label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="radio" name="goal-priority" value="medium" class="accent-sofia w-3 h-3" checked> Medium</label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="radio" name="goal-priority" value="high" class="accent-sofia w-3 h-3"> High</label>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-zinc-500 font-medium">Agents:</span>
                            <select id="goal-agent-count" class="bg-[var(--bg-main)] border border-[var(--border-color)] rounded-lg px-2 py-1 text-xs text-[var(--text-main)] focus:outline-none focus:border-sofia/50">
                                <option value="0">Auto</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                            </select>
                        </div>
                    </div>
                    <div id="goal-set-status" class="hidden mt-2 text-[11px] font-mono"></div>
                </div>
            </div>

            <!-- Goal List -->
            <div class="px-6 py-4">
                <div id="goal-list-empty" class="hidden text-center py-12 text-zinc-600">
                    <i data-lucide="clipboard-list" class="w-12 h-12 mx-auto mb-3 text-zinc-700"></i>
                    <div class="text-sm font-medium">No goals yet</div>
                    <div class="text-xs mt-1 mb-6">Describe a goal above, or try an example:</div>
                    <div class="flex flex-wrap justify-center gap-2 max-w-lg mx-auto">
                        <button onclick="useExample('Build a REST API for managing todos with CRUD endpoints and tests')" class="text-xs bg-zinc-800/60 border border-zinc-700 text-zinc-400 hover:text-sofia hover:border-sofia/30 px-3 py-2 rounded-lg transition">Build a REST API for todos</button>
                        <button onclick="useExample('Set up CI/CD pipeline with GitHub Actions for automated testing and deployment')" class="text-xs bg-zinc-800/60 border border-zinc-700 text-zinc-400 hover:text-sofia hover:border-sofia/30 px-3 py-2 rounded-lg transition">Set up CI/CD pipeline</button>
                        <button onclick="useExample('Write comprehensive unit tests for the authentication module with 80% coverage')" class="text-xs bg-zinc-800/60 border border-zinc-700 text-zinc-400 hover:text-sofia hover:border-sofia/30 px-3 py-2 rounded-lg transition">Write tests for auth module</button>
                        <button onclick="useExample('Create a Docker Compose setup for local development with hot reload')" class="text-xs bg-zinc-800/60 border border-zinc-700 text-zinc-400 hover:text-sofia hover:border-sofia/30 px-3 py-2 rounded-lg transition">Docker Compose setup</button>
                    </div>
                </div>
                <div id="goal-list" class="max-w-3xl mx-auto space-y-2"></div>
            </div>
        </div>
    </div>

    <!-- ===== TIMELINE VIEW (hidden by default) ===== -->
    <div id="goals-timeline-view" class="hidden flex flex-col flex-grow min-h-0">
        <!-- Timeline Header -->
        <div class="px-6 py-5 border-b border-[var(--border-color)] bg-[var(--bg-main)]/50 backdrop-blur shrink-0">
            <div class="max-w-3xl mx-auto">
                <button onclick="closeTimeline()" class="text-xs text-zinc-400 hover:text-[var(--text-main)] transition flex items-center gap-1 mb-4">
                    <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Back to goals
                </button>
                <div class="flex items-center gap-6">
                    <!-- Progress Ring -->
                    <div class="shrink-0">
                        <svg id="tl-progress-ring" width="96" height="96" viewBox="0 0 96 96">
                            <circle cx="48" cy="48" r="42" fill="none" stroke="currentColor" stroke-width="5" class="text-zinc-800"></circle>
                            <circle id="tl-progress-arc" cx="48" cy="48" r="42" fill="none" stroke="currentColor" stroke-width="5"
                                stroke-linecap="round" class="text-sofia transition-all duration-700"
                                stroke-dasharray="263.9" stroke-dashoffset="263.9" transform="rotate(-90 48 48)"></circle>
                            <text id="tl-progress-pct" x="48" y="48" text-anchor="middle" dominant-baseline="central"
                                class="text-lg font-bold fill-current text-[var(--text-main)]">0%</text>
                        </svg>
                    </div>
                    <div class="flex-grow min-w-0">
                        <h2 id="tl-goal-name" class="text-lg font-bold text-[var(--text-main)] truncate"></h2>
                        <div class="flex items-center gap-3 mt-1 text-xs text-zinc-400">
                            <span id="tl-step-count"></span>
                            <span id="tl-agent-count"></span>
                            <span id="tl-elapsed"></span>
                        </div>
                        <div class="flex items-center gap-2 mt-2">
                            <span id="tl-priority-badge" class="text-[10px] font-semibold uppercase px-2 py-0.5 rounded-full"></span>
                            <span id="tl-status-badge" class="text-[10px] font-semibold uppercase px-2 py-0.5 rounded-full"></span>
                        </div>
                    </div>
                    <!-- Actions -->
                    <div id="tl-actions" class="flex items-center gap-2 shrink-0"></div>
                </div>
            </div>
        </div>

        <!-- Result Card (shown when completed) -->
        <div id="tl-result-card" class="hidden px-6 py-6 border-b border-[var(--border-color)] bg-[var(--bg-main)]/50">
            <div class="max-w-3xl mx-auto">
                <div class="flex items-center justify-between mb-4">
                    <div class="text-[10px] font-bold uppercase tracking-widest text-blue-400">Completed</div>
                    <button onclick="shareGoalResult()" class="text-xs text-zinc-400 hover:text-[var(--text-main)] transition flex items-center gap-1 px-3 py-1.5 rounded-lg border border-zinc-700 hover:border-zinc-600">
                        <i data-lucide="share-2" class="w-3 h-3"></i> <span id="share-btn-text">Share</span>
                    </button>
                </div>
                <div id="tl-result-summary" class="text-sm text-zinc-300 leading-relaxed"></div>
                <div id="tl-result-artifacts" class="hidden mt-4">
                    <div class="text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Files Generated</div>
                    <div id="tl-artifacts-list" class="space-y-1"></div>
                </div>
                <div id="tl-result-unmet" class="hidden mt-4">
                    <div class="text-[10px] font-bold uppercase tracking-widest text-amber-400 mb-2">Unmet Criteria</div>
                    <div id="tl-unmet-list" class="space-y-1"></div>
                </div>
                <div id="tl-result-nextsteps" class="hidden mt-4">
                    <div class="text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Next Steps</div>
                    <div id="tl-nextsteps-list" class="space-y-1.5"></div>
                </div>
            </div>
        </div>

        <!-- Needs Attention Banner -->
        <div id="tl-attention-banner" class="hidden px-6 py-3 border-b border-red-500/20 bg-red-500/[0.05]">
            <div class="max-w-3xl mx-auto flex items-start gap-3">
                <i data-lucide="alert-triangle" class="w-5 h-5 text-red-400 shrink-0 mt-0.5"></i>
                <div class="flex-grow">
                    <div class="text-sm font-bold text-red-300">This goal needs your help</div>
                    <div id="tl-attention-reason" class="text-xs text-red-400/80 mt-1"></div>
                </div>
                <div class="flex gap-2 shrink-0">
                    <button onclick="retryGoal()" class="text-[10px] font-bold px-3 py-1.5 rounded-lg bg-red-500/10 border border-red-500/20 text-red-300 hover:bg-red-500/20 transition">Restart Goal</button>
                    <button onclick="failGoal()" class="text-[10px] font-bold px-3 py-1.5 rounded-lg bg-zinc-800 border border-zinc-700 text-zinc-400 hover:text-zinc-300 transition">Mark Failed</button>
                </div>
            </div>
        </div>

        <!-- Step Timeline -->
        <div class="flex-grow overflow-y-auto px-6 py-4">
            <div class="max-w-3xl mx-auto">
                <div id="tl-toggle-steps" class="hidden mb-3">
                    <button onclick="toggleStepTimeline()" class="text-xs text-zinc-400 hover:text-[var(--text-main)] transition flex items-center gap-1">
                        <i data-lucide="chevron-down" class="w-3.5 h-3.5 transition-transform" id="tl-toggle-icon"></i>
                        <span id="tl-toggle-text">Show step timeline</span>
                    </button>
                </div>
                <div id="tl-steps" class="space-y-0.5"></div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // ===== STATE =====
    var _allGoals = [];
    var _allPlans = [];
    var _openGoalId = null;
    var _openGoalData = null;
    var _refreshInFlight = false;
    var _refreshQueued = false;
    var _elapsedTimer = null;

    // ===== TOAST NOTIFICATIONS =====
    function showToast(message, type) {
        var container = document.getElementById('goal-toast-container');
        var toast = document.createElement('div');
        var bg = type === 'success' ? 'bg-green-500/10 border-green-500/20 text-green-300' :
                 type === 'error' ? 'bg-red-500/10 border-red-500/20 text-red-300' :
                 'bg-blue-500/10 border-blue-500/20 text-blue-300';
        toast.className = 'goal-toast pointer-events-auto px-4 py-2.5 rounded-xl border text-xs font-medium backdrop-blur ' + bg;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(function() {
            toast.classList.add('goal-toast-exit');
            setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
        }, 5000);
    }

    // ===== EXAMPLE GOALS =====
    function useExample(text) {
        var input = document.getElementById('goal-input');
        input.value = text;
        input.style.height = 'auto';
        input.style.height = input.scrollHeight + 'px';
        input.focus();
    }
    window.useExample = useExample;

    // ===== GOAL SUBMIT (Step 8: uses POST /api/goals directly) =====
    function goalSubmit() {
        var input = document.getElementById('goal-input');
        var status = document.getElementById('goal-set-status');
        var btn = document.getElementById('goal-submit-btn');
        var goalText = (input.value || '').trim();
        if (!goalText) return;

        var priority = 'medium';
        var radios = document.querySelectorAll('input[name="goal-priority"]');
        for (var i = 0; i < radios.length; i++) {
            if (radios[i].checked) { priority = radios[i].value; break; }
        }
        var agentCount = parseInt(document.getElementById('goal-agent-count').value) || 0;

        input.disabled = true;
        btn.disabled = true;
        status.textContent = 'Creating goal...';
        status.className = 'mt-2 text-[11px] font-mono text-sofia animate-pulse';
        status.classList.remove('hidden');

        fetch('/api/goals', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-Requested-With': 'fetch'},
            body: JSON.stringify({
                name: goalText.length > 100 ? goalText.substring(0, 100) : goalText,
                description: goalText,
                priority: priority,
                agent_count: agentCount
            })
        }).then(function(res) {
            if (res.ok || res.status === 201) {
                input.value = '';
                input.style.height = 'auto';
                status.textContent = 'Goal created! Sofia is planning...';
                status.className = 'mt-2 text-[11px] font-mono text-sofia';
                showToast('Goal created — Sofia is planning and executing', 'success');
                setTimeout(function() { status.classList.add('hidden'); }, 4000);
                goalRefresh();
                setTimeout(goalRefresh, 3000);
                setTimeout(goalRefresh, 8000);
            } else {
                return res.json().then(function(d) {
                    throw new Error(d.error || d.message || 'HTTP ' + res.status);
                });
            }
        }).catch(function(e) {
            status.textContent = 'Error: ' + (e.message || 'Failed to create goal');
            status.className = 'mt-2 text-[11px] font-mono text-red-400';
            showToast('Failed to create goal', 'error');
        }).finally(function() {
            input.disabled = false;
            btn.disabled = false;
        });
    }

    // ===== FETCH DATA =====
    function goalRefresh() {
        if (_refreshInFlight) { _refreshQueued = true; return; }
        _refreshInFlight = true;
        Promise.all([
            fetch('/api/goals').then(function(r) { return r.json(); }),
            fetch('/api/plans').then(function(r) { return r.json(); })
        ]).then(function(results) {
            _allGoals = results[0] || [];
            _allPlans = results[1] || [];
            renderGoalList();
            if (_openGoalId) refreshTimeline();
        }).catch(function(e) {
            console.error('Goal refresh failed:', e);
        }).finally(function() {
            _refreshInFlight = false;
            if (_refreshQueued) { _refreshQueued = false; goalRefresh(); }
        });
    }

    // ===== GOAL LIST RENDERING =====
    function renderGoalList() {
        var listEl = document.getElementById('goal-list');
        var emptyEl = document.getElementById('goal-list-empty');
        if (!_allGoals || _allGoals.length === 0) {
            listEl.innerHTML = '';
            emptyEl.classList.remove('hidden');
            return;
        }
        emptyEl.classList.add('hidden');

        // Link plans to goals
        var planByGoal = {};
        (_allPlans || []).forEach(function(p) {
            if (p.goal_id) planByGoal[p.goal_id] = p;
        });

        // Split into working and completed
        var working = [];
        var done = [];
        _allGoals.forEach(function(g) {
            if (g.status === 'completed') done.push(g);
            else working.push(g);
        });

        // Sort each group by most recent first
        var byDate = function(a, b) {
            return new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at);
        };
        working.sort(byDate);
        done.sort(byDate);

        var frag = document.createDocumentFragment();

        // Render working goals
        working.forEach(function(goal) {
            frag.appendChild(createGoalListItem(goal, planByGoal[goal.id]));
        });

        // Render completed section if any
        if (done.length > 0) {
            var divider = document.createElement('div');
            divider.className = 'px-4 pt-6 pb-2 flex items-center gap-2';
            divider.innerHTML = '<i data-lucide="check-circle-2" class="w-4 h-4 text-blue-400"></i>' +
                '<span class="text-xs font-bold uppercase tracking-wider text-zinc-500">Completed</span>' +
                '<span class="text-[10px] bg-zinc-800 text-zinc-400 px-1.5 py-0.5 rounded-full font-mono">' + done.length + '</span>';
            frag.appendChild(divider);

            done.forEach(function(goal) {
                frag.appendChild(createCompletedGoalCard(goal, planByGoal[goal.id]));
            });
        }

        listEl.innerHTML = '';
        listEl.appendChild(frag);
        refreshIcons();
    }

    function isWorking(goal) {
        return goal.status === 'active' || goal.status === 'in_progress';
    }

    function isNeedsAttention(goal) {
        return goal.status === 'failed';
    }

    // Step 14: Richer list items with priority border and description
    function createGoalListItem(goal, plan) {
        var el = document.createElement('div');
        var borderColors = {high: 'border-l-red-500', medium: 'border-l-amber-500/50', low: 'border-l-zinc-600'};
        var borderClass = borderColors[goal.priority] || borderColors.medium;
        el.className = 'group flex items-center gap-4 px-4 py-3 rounded-xl border border-transparent border-l-2 ' + borderClass + ' hover:border-[var(--border-color)] hover:bg-[var(--bg-main)]/50 cursor-pointer transition-all';
        el.id = 'goal-item-' + goal.id;
        el.onclick = function() { openTimeline(goal.id); };

        var working = isWorking(goal);
        var done = goal.status === 'completed';
        var attention = isNeedsAttention(goal);

        // Status dot
        var dotClass = 'w-2.5 h-2.5 rounded-full shrink-0 ';
        if (attention) dotClass += 'bg-red-500';
        else if (done) dotClass += 'bg-blue-500';
        else dotClass += 'bg-green-500 animate-pulse';

        // Progress info
        var completed = 0, total = 0;
        if (plan && plan.steps) {
            total = plan.steps.length;
            plan.steps.forEach(function(s) { if (s.status === 'completed') completed++; });
        }
        var pct = total > 0 ? Math.round((completed / total) * 100) : 0;

        // Description line (truncated)
        var descHtml = '';
        if (goal.description && goal.description !== goal.name) {
            var desc = goal.description.length > 80 ? goal.description.substring(0, 80) + '...' : goal.description;
            descHtml = '<div class="text-[11px] text-zinc-500 truncate mt-0.5">' + escapeHtml(desc) + '</div>';
        }

        // Right side content
        var rightHtml = '';
        if (working && total > 0) {
            rightHtml = '<div class="flex items-center gap-3 shrink-0">' +
                '<div id="goal-bar-' + goal.id + '" class="w-24 bg-zinc-800 rounded-full h-1.5 transition-all"><div class="bg-sofia rounded-full h-1.5 transition-all" style="width:' + pct + '%"></div></div>' +
                '<span class="text-[11px] font-mono text-zinc-500 w-12 text-right">' + completed + '/' + total + '</span>' +
                '<span class="text-[11px] font-mono text-zinc-600">' + formatElapsed(goal.created_at) + '</span>' +
                '</div>';
        } else if (working) {
            rightHtml = '<span class="text-[11px] font-mono text-zinc-600 shrink-0">' + formatElapsed(goal.created_at) + '</span>';
        } else if (done) {
            rightHtml = '<span class="text-[11px] text-zinc-500 shrink-0">Completed ' + formatRelative(goal.updated_at) + '</span>';
        } else if (attention) {
            rightHtml = '<span class="text-[11px] text-red-400 font-medium shrink-0">Needs attention</span>';
        }

        // Action buttons (visible on hover)
        var actionsHtml = '<div class="hidden group-hover:flex items-center gap-1 shrink-0">';
        if (working) {
            actionsHtml += '<button onclick="event.stopPropagation();pauseGoal(' + goal.id + ')" title="Pause" class="p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-500 hover:text-amber-400 transition"><i data-lucide="pause" class="w-3.5 h-3.5"></i></button>';
        }
        if (goal.status === 'paused') {
            actionsHtml += '<button onclick="event.stopPropagation();resumeGoal(' + goal.id + ')" title="Resume" class="p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-500 hover:text-green-400 transition"><i data-lucide="play" class="w-3.5 h-3.5"></i></button>';
        }
        if (attention) {
            actionsHtml += '<button onclick="event.stopPropagation();restartGoal(' + goal.id + ')" title="Restart" class="p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-500 hover:text-sofia transition"><i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i></button>';
        }
        actionsHtml += '<button onclick="event.stopPropagation();deleteGoal(' + goal.id + ')" title="Delete" class="p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-500 hover:text-red-400 transition"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>';
        actionsHtml += '</div>';

        el.innerHTML = '<span class="' + dotClass + '"></span>' +
            '<div class="flex-grow min-w-0">' +
            '<span class="text-sm font-medium text-[var(--text-main)]">' + escapeHtml(goal.name) + '</span>' +
            descHtml +
            '</div>' +
            rightHtml + actionsHtml;

        return el;
    }

    function createCompletedGoalCard(goal, plan) {
        var el = document.createElement('div');
        var borderColors = {high: 'border-l-red-500/50', medium: 'border-l-amber-500/30', low: 'border-l-zinc-600/50'};
        var borderClass = borderColors[goal.priority] || borderColors.medium;
        el.className = 'group flex flex-col gap-1.5 px-4 py-3 rounded-xl border border-transparent border-l-2 ' + borderClass + ' hover:border-[var(--border-color)] hover:bg-[var(--bg-main)]/50 cursor-pointer transition-all';
        el.onclick = function() { openTimeline(goal.id); };

        // Summary text
        var summary = '';
        if (goal.goal_result && goal.goal_result.summary) {
            summary = goal.goal_result.summary;
            if (summary.length > 150) summary = summary.substring(0, 150) + '\u2026';
        } else if (goal.description) {
            summary = goal.description;
            if (summary.length > 150) summary = summary.substring(0, 150) + '\u2026';
        }

        // Metadata badges
        var badges = '';
        var stepCount = (plan && plan.steps) ? plan.steps.length : 0;
        if (stepCount > 0) {
            badges += '<span class="text-[10px] bg-zinc-800 text-zinc-400 px-1.5 py-0.5 rounded-full">' + stepCount + ' steps</span>';
        }
        var artifactCount = (goal.goal_result && goal.goal_result.artifacts) ? goal.goal_result.artifacts.length : 0;
        if (artifactCount > 0) {
            badges += '<span class="text-[10px] bg-blue-500/10 text-blue-400 px-1.5 py-0.5 rounded-full">' + artifactCount + ' files</span>';
        }

        // Delete button (hover)
        var deleteBtn = '<button onclick="event.stopPropagation();deleteGoal(' + goal.id + ')" title="Delete" class="hidden group-hover:block p-1.5 rounded-lg hover:bg-zinc-800 text-zinc-500 hover:text-red-400 transition shrink-0"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>';

        el.innerHTML =
            '<div class="flex items-center gap-3">' +
                '<span class="w-2.5 h-2.5 rounded-full shrink-0 bg-blue-500"></span>' +
                '<span class="text-sm font-medium text-[var(--text-main)] flex-grow min-w-0 truncate">' + escapeHtml(goal.name) + '</span>' +
                '<span class="text-[11px] text-zinc-500 shrink-0">' + formatRelative(goal.updated_at) + '</span>' +
                deleteBtn +
            '</div>' +
            (summary ? '<div class="text-xs text-zinc-400 leading-relaxed pl-[22px]">' + escapeHtml(summary) + '</div>' : '') +
            (badges ? '<div class="flex items-center gap-1.5 pl-[22px]">' + badges + '</div>' : '');

        return el;
    }

    // ===== TIMELINE VIEW =====
    function openTimeline(goalId) {
        _openGoalId = goalId;
        document.getElementById('goals-list-view').classList.add('hidden');
        document.getElementById('goals-timeline-view').classList.remove('hidden');
        refreshTimeline();
        startElapsedTimer();
    }

    function closeTimeline() {
        _openGoalId = null;
        _openGoalData = null;
        stopElapsedTimer();
        document.getElementById('goals-timeline-view').classList.add('hidden');
        document.getElementById('goals-list-view').classList.remove('hidden');
        goalRefresh();
    }

    function refreshTimeline() {
        if (!_openGoalId) return;
        fetch('/api/goals/' + _openGoalId + '/timeline')
            .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(function(data) {
                _openGoalData = data;
                renderTimeline(data);
            })
            .catch(function(e) { console.error('Timeline fetch failed:', e); });
    }

    function renderTimeline(data) {
        var goal = data.goal;
        var plan = data.plan;
        var steps = (plan && plan.steps) || [];
        var completed = 0, failed = 0, inProgress = 0, total = steps.length;
        var agents = {};

        steps.forEach(function(s) {
            if (s.status === 'completed') completed++;
            else if (s.status === 'failed') failed++;
            else if (s.status === 'in_progress') inProgress++;
            if (s.assigned_to) agents[s.assigned_to] = true;
        });

        var pct = total > 0 ? Math.round((completed / total) * 100) : 0;
        var agentCount = Object.keys(agents).length;
        var isDone = goal.status === 'completed';
        var isAttention = goal.status === 'failed';

        // Progress ring
        var circumference = 2 * Math.PI * 42;
        var offset = circumference * (1 - pct / 100);
        var arc = document.getElementById('tl-progress-arc');
        arc.setAttribute('stroke-dashoffset', offset);
        arc.classList.remove('text-sofia', 'text-blue-500', 'text-red-500');
        arc.classList.add(isDone ? 'text-blue-500' : isAttention ? 'text-red-500' : 'text-sofia');
        document.getElementById('tl-progress-pct').textContent = pct + '%';

        // Header info
        document.getElementById('tl-goal-name').textContent = goal.name || '';
        document.getElementById('tl-step-count').textContent = completed + '/' + total + ' steps';
        document.getElementById('tl-agent-count').textContent = agentCount + ' agent' + (agentCount !== 1 ? 's' : '');
        document.getElementById('tl-elapsed').textContent = formatElapsed(goal.created_at);

        // Priority badge
        var priBadge = document.getElementById('tl-priority-badge');
        var priColors = {high: 'bg-red-500/10 text-red-400 border border-red-500/20', medium: 'bg-amber-500/10 text-amber-400 border border-amber-500/20', low: 'bg-zinc-700/50 text-zinc-400 border border-zinc-600'};
        priBadge.className = 'text-[10px] font-semibold uppercase px-2 py-0.5 rounded-full ' + (priColors[goal.priority] || priColors.medium);
        priBadge.textContent = goal.priority || 'medium';

        // Status badge
        var stBadge = document.getElementById('tl-status-badge');
        if (isDone) {
            stBadge.className = 'text-[10px] font-semibold uppercase px-2 py-0.5 rounded-full bg-blue-500/10 text-blue-400 border border-blue-500/20';
            stBadge.textContent = 'Done';
        } else if (isAttention) {
            stBadge.className = 'text-[10px] font-semibold uppercase px-2 py-0.5 rounded-full bg-red-500/10 text-red-400 border border-red-500/20';
            stBadge.textContent = 'Needs attention';
        } else {
            stBadge.className = 'text-[10px] font-semibold uppercase px-2 py-0.5 rounded-full bg-green-500/10 text-green-400 border border-green-500/20';
            stBadge.textContent = 'Working';
        }

        // Action buttons
        var actionsEl = document.getElementById('tl-actions');
        actionsEl.innerHTML = '';
        if (!isDone) {
            if (goal.status !== 'paused') {
                actionsEl.innerHTML += '<button onclick="pauseGoal(' + goal.id + ');refreshTimeline()" class="text-[10px] font-bold px-3 py-1.5 rounded-lg bg-zinc-800 border border-zinc-700 text-zinc-400 hover:text-amber-400 transition flex items-center gap-1"><i data-lucide="pause" class="w-3 h-3"></i> Pause</button>';
            } else {
                actionsEl.innerHTML += '<button onclick="resumeGoal(' + goal.id + ');refreshTimeline()" class="text-[10px] font-bold px-3 py-1.5 rounded-lg bg-zinc-800 border border-zinc-700 text-zinc-400 hover:text-green-400 transition flex items-center gap-1"><i data-lucide="play" class="w-3 h-3"></i> Resume</button>';
            }
        }

        // Result card (completed goals)
        var resultCard = document.getElementById('tl-result-card');
        var toggleEl = document.getElementById('tl-toggle-steps');
        if (isDone && goal.goal_result) {
            renderResultCard(goal.goal_result, goal);
            resultCard.classList.remove('hidden');
            toggleEl.classList.remove('hidden');
        } else {
            resultCard.classList.add('hidden');
            toggleEl.classList.add('hidden');
        }

        // Attention banner
        var banner = document.getElementById('tl-attention-banner');
        if (isAttention) {
            var failedStep = steps.find(function(s) { return s.status === 'failed'; });
            var reason = failedStep ? 'Step ' + (failedStep.index + 1) + ' failed: ' + (failedStep.result || '').substring(0, 200) : 'Goal execution failed.';
            document.getElementById('tl-attention-reason').textContent = reason;
            banner.classList.remove('hidden');
        } else {
            banner.classList.add('hidden');
        }

        // Render steps
        renderSteps(steps);
        refreshIcons();

        // Auto-scroll to active step
        var activeStep = document.querySelector('#tl-steps [data-status="in_progress"]');
        if (activeStep) activeStep.scrollIntoView({behavior: 'smooth', block: 'center'});
    }

    // Step 12: Actionable next steps — each is a clickable button
    function renderResultCard(gr, goal) {
        document.getElementById('tl-result-summary').textContent = gr.summary || '';

        var artifactsEl = document.getElementById('tl-result-artifacts');
        var artifactsList = document.getElementById('tl-artifacts-list');
        if (gr.artifacts && gr.artifacts.length > 0) {
            artifactsList.innerHTML = gr.artifacts.map(function(a) {
                return '<div class="flex items-center gap-2 text-xs text-zinc-300"><i data-lucide="file-text" class="w-3 h-3 text-zinc-500 shrink-0"></i> ' + escapeHtml(a) + '</div>';
            }).join('');
            artifactsEl.classList.remove('hidden');
        } else {
            artifactsEl.classList.add('hidden');
        }

        var unmetEl = document.getElementById('tl-result-unmet');
        var unmetList = document.getElementById('tl-unmet-list');
        if (gr.unmet_criteria && gr.unmet_criteria.length > 0) {
            unmetList.innerHTML = gr.unmet_criteria.map(function(c) {
                return '<div class="flex items-start gap-2 text-xs text-amber-300"><i data-lucide="alert-triangle" class="w-3 h-3 text-amber-400 shrink-0 mt-0.5"></i> ' + escapeHtml(c) + '</div>';
            }).join('');
            unmetEl.classList.remove('hidden');
        } else {
            unmetEl.classList.add('hidden');
        }

        var nextEl = document.getElementById('tl-result-nextsteps');
        var nextList = document.getElementById('tl-nextsteps-list');
        if (gr.next_steps && gr.next_steps.length > 0) {
            nextList.innerHTML = gr.next_steps.map(function(s) {
                var escaped = escapeHtml(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                return '<button onclick="createGoalFromNextStep(\'' + escaped.replace(/'/g, "\\'") + '\')" class="w-full text-left flex items-start gap-2 text-xs text-zinc-300 hover:text-sofia hover:bg-sofia/5 px-2 py-1.5 rounded-lg transition group/ns">' +
                    '<i data-lucide="arrow-right" class="w-3 h-3 text-zinc-500 shrink-0 mt-0.5 group-hover/ns:text-sofia"></i> ' +
                    escapeHtml(s) +
                    '<span class="ml-auto text-[9px] text-zinc-600 group-hover/ns:text-sofia/60 shrink-0">+ New goal</span>' +
                    '</button>';
            }).join('');
            nextEl.classList.remove('hidden');
            refreshIcons();
        } else {
            nextEl.classList.add('hidden');
        }
    }

    function renderSteps(steps) {
        var container = document.getElementById('tl-steps');
        var frag = document.createDocumentFragment();

        steps.forEach(function(step) {
            var el = document.createElement('div');
            el.setAttribute('data-status', step.status);
            el.setAttribute('data-step-index', step.index);
            el.id = 'tl-step-' + step.index;

            var iconName, iconColor, bgBorder;
            if (step.status === 'completed') { iconName = 'check-circle'; iconColor = 'text-green-400'; bgBorder = 'border-green-500/10 bg-green-500/[0.02]'; }
            else if (step.status === 'in_progress') { iconName = 'loader'; iconColor = 'text-blue-400 animate-spin'; bgBorder = 'border-blue-500/20 bg-blue-500/[0.03]'; }
            else if (step.status === 'failed') { iconName = 'x-circle'; iconColor = 'text-red-400'; bgBorder = 'border-red-500/20 bg-red-500/[0.03]'; }
            else { iconName = 'clock'; iconColor = 'text-zinc-600'; bgBorder = 'border-zinc-800/50 bg-zinc-900/30'; }

            el.className = 'border rounded-xl px-4 py-3 transition-all cursor-pointer ' + bgBorder;
            el.onclick = function() { toggleStepDetail(step.index); };

            // Status line
            var statusText = '';
            if (step.status === 'in_progress') {
                statusText = (step.assigned_to || 'subagent') + ' \u00b7 running' + (step.retry_count > 0 ? ' (attempt ' + (step.retry_count + 1) + ')' : '');
            } else if (step.status === 'completed') {
                statusText = step.assigned_to || 'subagent';
                var logEntries = _openGoalData && _openGoalData.log ? _openGoalData.log : [];
                for (var li = logEntries.length - 1; li >= 0; li--) {
                    if (logEntries[li].step === step.description && logEntries[li].duration_ms > 0) {
                        var durSec = Math.round(logEntries[li].duration_ms / 1000);
                        if (durSec < 60) {
                            statusText += ' \u00b7 ' + durSec + 's';
                        } else {
                            statusText += ' \u00b7 ' + Math.floor(durSec / 60) + 'm ' + (durSec % 60) + 's';
                        }
                        break;
                    }
                }
            } else if (step.status === 'failed') {
                statusText = (step.assigned_to || 'subagent') + (step.retry_count > 0 ? ' \u00b7 ' + step.retry_count + ' retries' : '');
            } else {
                // pending — check dependencies
                var blocked = step.depends_on && step.depends_on.length > 0;
                if (blocked) {
                    var depNames = step.depends_on.map(function(d) { return 'step ' + (d + 1); }).join(', ');
                    statusText = 'Waiting for ' + depNames;
                } else {
                    statusText = 'Ready';
                }
            }

            // Result snippet (completed/failed only)
            var resultSnippet = '';
            if ((step.status === 'completed' || step.status === 'failed') && step.result) {
                var truncated = step.result.length > 200 ? step.result.substring(0, 200) + '...' : step.result;
                resultSnippet = '<div class="text-[10px] text-zinc-500 font-mono mt-1.5 truncate">' + escapeHtml(truncated) + '</div>';
            }

            el.innerHTML = '<div class="flex items-start gap-3">' +
                '<i data-lucide="' + iconName + '" class="w-4 h-4 ' + iconColor + ' shrink-0 mt-0.5"></i>' +
                '<div class="flex-grow min-w-0">' +
                '<div class="text-xs font-medium text-[var(--text-main)]">Step ' + (step.index + 1) + ': ' + escapeHtml(step.description) + '</div>' +
                '<div class="text-[10px] text-zinc-500 mt-0.5">' + escapeHtml(statusText) + '</div>' +
                resultSnippet +
                '</div>' +
                '</div>' +
                '<div id="step-detail-' + step.index + '" class="hidden mt-3 pt-3 border-t border-[var(--border-color)] text-[11px] space-y-2"></div>';

            frag.appendChild(el);
        });

        container.innerHTML = '';
        container.appendChild(frag);
    }

    function toggleStepDetail(idx) {
        var el = document.getElementById('step-detail-' + idx);
        if (!el) return;
        if (!el.classList.contains('hidden')) {
            el.classList.add('hidden');
            return;
        }
        el.classList.remove('hidden');
        if (el.innerHTML.trim()) return; // already rendered

        var step = (_openGoalData && _openGoalData.plan && _openGoalData.plan.steps) ? _openGoalData.plan.steps[idx] : null;
        if (!step) return;

        var html = '';
        if (step.result) html += '<div><span class="text-zinc-500 font-bold">Result:</span><pre class="mt-1 p-2 rounded-lg bg-zinc-900/50 border border-zinc-800 text-zinc-300 whitespace-pre-wrap text-[10px] max-h-48 overflow-y-auto">' + escapeHtml(step.result) + '</pre></div>';
        if (step.acceptance_criteria) html += '<div><span class="text-zinc-500 font-bold">Acceptance Criteria:</span> <span class="text-zinc-400">' + escapeHtml(step.acceptance_criteria) + '</span></div>';
        if (step.verify_command) html += '<div><span class="text-zinc-500 font-bold">Verify:</span> <code class="text-zinc-400 bg-zinc-900/50 px-1.5 py-0.5 rounded">' + escapeHtml(step.verify_command) + '</code></div>';
        if (step.verify_result) html += '<div><span class="text-zinc-500 font-bold">Verify Output:</span><pre class="mt-1 p-2 rounded-lg bg-zinc-900/50 border border-zinc-800 text-zinc-300 whitespace-pre-wrap text-[10px] max-h-32 overflow-y-auto">' + escapeHtml(step.verify_result) + '</pre></div>';
        el.innerHTML = html || '<span class="text-zinc-600">No details available.</span>';
    }

    function toggleStepTimeline() {
        var steps = document.getElementById('tl-steps');
        var icon = document.getElementById('tl-toggle-icon');
        var text = document.getElementById('tl-toggle-text');
        if (steps.classList.contains('hidden')) {
            steps.classList.remove('hidden');
            icon.style.transform = 'rotate(180deg)';
            text.textContent = 'Hide step timeline';
        } else {
            steps.classList.add('hidden');
            icon.style.transform = '';
            text.textContent = 'Show step timeline';
        }
    }

    // ===== SHARE =====
    function shareGoalResult() {
        if (!_openGoalData || !_openGoalData.goal) return;
        var g = _openGoalData.goal;
        var gr = g.goal_result || {};
        var md = '## Goal: ' + (g.name || '') + '\n';
        md += 'Completed ' + formatRelative(g.updated_at) + '\n\n';
        if (gr.summary) md += '### Summary\n' + gr.summary + '\n\n';
        if (gr.artifacts && gr.artifacts.length > 0) {
            md += '### Files\n';
            gr.artifacts.forEach(function(a) { md += '- ' + a + '\n'; });
            md += '\n';
        }
        if (gr.next_steps && gr.next_steps.length > 0) {
            md += '### Next Steps\n';
            gr.next_steps.forEach(function(s) { md += '- ' + s + '\n'; });
        }
        navigator.clipboard.writeText(md).then(function() {
            var btn = document.getElementById('share-btn-text');
            btn.textContent = 'Copied!';
            setTimeout(function() { btn.textContent = 'Share'; }, 2000);
        });
    }

    // Step 12: Create a new goal from a next step
    function createGoalFromNextStep(text) {
        var cleanText = text.replace(/<[^>]*>/g, '').trim();
        if (!cleanText) return;
        var input = document.getElementById('goal-input');
        input.value = cleanText;
        goalSubmit();
    }
    window.createGoalFromNextStep = createGoalFromNextStep;

    // ===== GOAL ACTIONS =====
    function patchGoal(goalId, status) {
        fetch('/api/goals', {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json', 'X-Requested-With': 'fetch'},
            body: JSON.stringify({goal_id: goalId, status: status})
        }).then(function() { goalRefresh(); });
    }
    window.pauseGoal = function(id) { patchGoal(id, 'paused'); };
    window.resumeGoal = function(id) { patchGoal(id, 'active'); };
    window.failGoal = function() { if (_openGoalId) patchGoal(_openGoalId, 'failed'); };
    window.restartGoal = function(id) {
        fetch('/api/goals/restart', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-Requested-With': 'fetch'},
            body: JSON.stringify({goal_id: id || _openGoalId})
        }).then(function() { goalRefresh(); if (_openGoalId) refreshTimeline(); });
    };
    window.retryGoal = function() { if (_openGoalId) window.restartGoal(_openGoalId); };
    window.deleteGoal = function(id) {
        if (!confirm('Delete this goal and all its data?')) return;
        fetch('/api/goals?goal_id=' + id, {
            method: 'DELETE',
            headers: {'X-Requested-With': 'fetch'}
        }).then(function() {
            if (_openGoalId === id) closeTimeline();
            goalRefresh();
        });
    };

    // ===== ELAPSED TIME =====
    function startElapsedTimer() {
        stopElapsedTimer();
        _elapsedTimer = setInterval(function() {
            if (!_openGoalData || !_openGoalData.goal) return;
            var g = _openGoalData.goal;
            if (g.status !== 'completed') {
                document.getElementById('tl-elapsed').textContent = formatElapsed(g.created_at);
            }
        }, 1000);
    }
    function stopElapsedTimer() {
        if (_elapsedTimer) { clearInterval(_elapsedTimer); _elapsedTimer = null; }
    }

    // ===== UTILITIES =====
    function formatElapsed(dateStr) {
        if (!dateStr) return '';
        var diff = Math.max(0, Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000));
        if (diff < 60) return diff + 's';
        var m = Math.floor(diff / 60);
        var s = diff % 60;
        if (m < 60) return m + 'm ' + s + 's';
        var h = Math.floor(m / 60);
        return h + 'h ' + (m % 60) + 'm';
    }

    function formatRelative(dateStr) {
        if (!dateStr) return '';
        var diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        return Math.floor(diff / 86400) + 'd ago';
    }

    // ===== WEBSOCKET HOOK (Step 9: Targeted updates) =====
    window._goalsRefresh = goalRefresh;
    window._goalsPlanEvent = function(d) {
        // Full list refresh for structural changes
        if (d.type === 'goal_plan_created' || d.type === 'goal_deleted' ||
            d.type === 'goal_status_changed' || d.type === 'goal_failed' ||
            d.type === 'goal_auto_fix_applied') {
            goalRefresh();
        }

        // Targeted list update for step events (flash animation instead of full re-render)
        if (d.type === 'goal_step_end' && d.goal_id) {
            var bar = document.getElementById('goal-bar-' + d.goal_id);
            if (bar) bar.classList.add('goal-step-flash');
            // Still do a lightweight refresh to update progress
            goalRefresh();
        }

        // Toast for goal completion
        if (d.type === 'goal_completed' && d.goal_name) {
            showToast('Goal completed: ' + d.goal_name, 'success');
            goalRefresh();
        }

        // If timeline is open for this goal, refresh it
        if (_openGoalId && d.goal_id === _openGoalId) {
            refreshTimeline();
        }
    };

    // Expose for action buttons
    window.goalSubmit = goalSubmit;
    window.goalRefresh = goalRefresh;
    window.openTimeline = openTimeline;
    window.closeTimeline = closeTimeline;
    window.refreshTimeline = refreshTimeline;
    window.toggleStepTimeline = toggleStepTimeline;
    window.shareGoalResult = shareGoalResult;

    // ===== INIT =====
    goalRefresh();
    var _goalRefreshTimer = setInterval(function() {
        if (document.getElementById('tab-goals') && !document.getElementById('tab-goals').closest('.hidden')) {
            goalRefresh();
        }
    }, 15000);
})();
</script>
