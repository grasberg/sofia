<!-- WORKSPACE FILES TAB (HTMX Partial) -->
<div id="tab-files" class="flex flex-col flex-grow min-h-0 animate-fade-in">
    <!-- Header -->
    <div class="px-6 py-5 border-b border-[var(--border-color)] bg-[var(--bg-main)]/50 backdrop-blur shrink-0 flex items-center justify-between">
        <div>
            <h2 class="text-xl font-bold tracking-tight text-[var(--text-main)] flex items-center gap-2">
                <i data-lucide="folder-open" class="w-5 h-5 text-sofia"></i>
                Workspace Files
            </h2>
            <p id="files-workspace-path" class="text-xs text-zinc-500 mt-1 font-mono"></p>
        </div>
        <button onclick="filesRefresh()" class="px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-zinc-800 text-zinc-400 hover:text-[var(--text-main)] transition-colors border border-transparent hover:border-zinc-700 flex items-center gap-1">
            <i data-lucide="refresh-cw" class="w-3 h-3"></i> Refresh
        </button>
    </div>

    <!-- Breadcrumb -->
    <div class="px-6 py-3 border-b border-[var(--border-color)] shrink-0">
        <div id="files-breadcrumb" class="flex items-center gap-1 text-xs font-mono"></div>
    </div>

    <!-- Content area: split into file list and file viewer -->
    <div class="flex-grow flex min-h-0">
        <!-- File list (left panel) -->
        <div id="files-list-panel" class="w-full lg:w-1/3 border-r border-[var(--border-color)] overflow-y-auto">
            <div id="files-list" class="divide-y divide-[var(--border-color)]">
                <div class="p-6 text-xs text-zinc-600 font-mono">Loading...</div>
            </div>
        </div>

        <!-- File viewer (right panel) -->
        <div id="files-viewer-panel" class="hidden lg:flex flex-col flex-grow min-w-0">
            <div id="files-viewer-empty" class="flex-grow flex items-center justify-center text-zinc-600">
                <div class="text-center">
                    <i data-lucide="file-text" class="w-12 h-12 mx-auto mb-3 text-zinc-700"></i>
                    <div class="text-sm font-medium">Select a file to view</div>
                    <div class="text-xs mt-1">Click any file in the list to read its contents</div>
                </div>
            </div>
            <div id="files-viewer-content" class="hidden flex flex-col flex-grow min-h-0">
                <!-- File header -->
                <div class="px-5 py-3 border-b border-[var(--border-color)] shrink-0 flex items-center justify-between">
                    <div class="flex items-center gap-2 min-w-0">
                        <i data-lucide="file-text" class="w-4 h-4 text-sofia shrink-0"></i>
                        <span id="files-viewer-name" class="text-sm font-bold text-[var(--text-main)] truncate"></span>
                    </div>
                    <div class="flex items-center gap-3 text-[10px] text-zinc-500 font-mono shrink-0">
                        <span id="files-viewer-size"></span>
                        <span id="files-viewer-modified"></span>
                    </div>
                </div>
                <!-- File body -->
                <div class="flex-grow overflow-auto p-5">
                    <pre id="files-viewer-text" class="text-xs text-zinc-300 font-mono whitespace-pre-wrap break-words leading-relaxed"></pre>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile file viewer overlay -->
    <div id="files-mobile-viewer" class="hidden fixed inset-0 z-50 flex flex-col bg-[var(--bg-sidebar)] lg:hidden">
        <div class="px-5 py-4 border-b border-[var(--border-color)] flex items-center justify-between shrink-0">
            <div class="flex items-center gap-2 min-w-0">
                <i data-lucide="file-text" class="w-4 h-4 text-sofia shrink-0"></i>
                <span id="files-mobile-name" class="text-sm font-bold text-[var(--text-main)] truncate"></span>
            </div>
            <button onclick="closeMobileViewer()" class="p-1.5 text-zinc-500 hover:text-[var(--text-main)] transition-colors">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        <div class="flex-grow overflow-auto p-5">
            <pre id="files-mobile-text" class="text-xs text-zinc-300 font-mono whitespace-pre-wrap break-words leading-relaxed"></pre>
        </div>
    </div>
</div>

<script>
    refreshIcons();

    var _filesCurrentPath = '.';

    // ===== BREADCRUMB =====
    function renderBreadcrumb(path) {
        var bc = document.getElementById('files-breadcrumb');
        bc.innerHTML = '';

        var root = document.createElement('a');
        root.className = 'text-sofia hover:underline cursor-pointer';
        root.textContent = 'workspace';
        root.onclick = function() { filesNavigate('.'); };
        bc.appendChild(root);

        if (path && path !== '.') {
            var parts = path.split('/');
            var accumulated = '';
            parts.forEach(function(part, idx) {
                var sep = document.createElement('span');
                sep.className = 'text-zinc-600';
                sep.textContent = ' / ';
                bc.appendChild(sep);

                accumulated = accumulated ? accumulated + '/' + part : part;
                var link = document.createElement('a');
                if (idx < parts.length - 1) {
                    link.className = 'text-sofia hover:underline cursor-pointer';
                    var target = accumulated;
                    link.onclick = function() { filesNavigate(target); };
                } else {
                    link.className = 'text-[var(--text-main)]';
                }
                link.textContent = part;
                bc.appendChild(link);
            });
        }
    }

    // ===== NAVIGATE =====
    async function filesNavigate(path) {
        _filesCurrentPath = path;
        renderBreadcrumb(path);

        var list = document.getElementById('files-list');
        list.innerHTML = '<div class="p-4 text-xs text-zinc-600 font-mono animate-pulse">Loading...</div>';

        try {
            var res = await fetch('/api/workspace/files?path=' + encodeURIComponent(path));
            if (!res.ok) throw new Error('Failed to load');
            var data = await res.json();

            document.getElementById('files-workspace-path').textContent = data.workspace;
            renderFileList(data.entries || [], path);
        } catch(e) {
            list.innerHTML = '<div class="p-4 text-xs text-red-400 font-mono">Error loading files: ' + e.message + '</div>';
        }
    }

    // ===== RENDER FILE LIST =====
    function renderFileList(entries, currentPath) {
        var list = document.getElementById('files-list');
        list.innerHTML = '';

        if (entries.length === 0) {
            list.innerHTML = '<div class="p-6 text-center text-xs text-zinc-600 font-mono">Empty directory</div>';
            return;
        }

        // Sort: directories first, then files, alphabetically
        entries.sort(function(a, b) {
            if (a.is_dir !== b.is_dir) return a.is_dir ? -1 : 1;
            return a.name.localeCompare(b.name);
        });

        // Parent directory link
        if (currentPath && currentPath !== '.') {
            var parent = document.createElement('div');
            parent.className = 'flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-zinc-800/50 transition-colors';
            parent.onclick = function() {
                var parts = currentPath.split('/');
                parts.pop();
                filesNavigate(parts.length > 0 ? parts.join('/') : '.');
            };
            parent.innerHTML =
                '<i data-lucide="corner-left-up" class="w-4 h-4 text-zinc-500 shrink-0"></i>' +
                '<span class="text-xs text-zinc-400">..</span>';
            list.appendChild(parent);
        }

        entries.forEach(function(entry) {
            var el = document.createElement('div');
            el.className = 'flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-zinc-800/50 transition-colors';

            var icon, iconColor;
            if (entry.is_dir) {
                icon = 'folder';
                iconColor = 'text-amber-400';
            } else if (/\.(md|txt)$/i.test(entry.name)) {
                icon = 'file-text';
                iconColor = 'text-blue-400';
            } else if (/\.(go|py|js|ts|json|yaml|yml|toml)$/i.test(entry.name)) {
                icon = 'file-code';
                iconColor = 'text-green-400';
            } else if (/\.(png|jpg|jpeg|gif|svg|webp)$/i.test(entry.name)) {
                icon = 'image';
                iconColor = 'text-purple-400';
            } else {
                icon = 'file';
                iconColor = 'text-zinc-400';
            }

            var sizeText = '';
            if (!entry.is_dir) {
                if (entry.size >= 1024 * 1024) sizeText = (entry.size / (1024 * 1024)).toFixed(1) + ' MB';
                else if (entry.size >= 1024) sizeText = (entry.size / 1024).toFixed(1) + ' KB';
                else sizeText = entry.size + ' B';
            }

            var entryPath = currentPath === '.' ? entry.name : currentPath + '/' + entry.name;

            el.innerHTML =
                '<i data-lucide="' + icon + '" class="w-4 h-4 ' + iconColor + ' shrink-0"></i>' +
                '<div class="flex-grow min-w-0">' +
                '  <div class="text-xs font-medium text-[var(--text-main)] truncate">' + escapeHtml(entry.name) + '</div>' +
                '</div>' +
                '<div class="flex items-center gap-3 shrink-0">' +
                (sizeText ? '<span class="text-[10px] text-zinc-600 font-mono">' + sizeText + '</span>' : '') +
                '<span class="text-[10px] text-zinc-700 font-mono">' + escapeHtml(entry.mod_time || '') + '</span>' +
                '</div>';

            if (entry.is_dir) {
                el.onclick = function() { filesNavigate(entryPath); };
            } else {
                el.onclick = function() { openFile(entryPath); };
            }
            list.appendChild(el);
        });

        refreshIcons();
    }

    // ===== OPEN FILE =====
    async function openFile(path) {
        // Show loading in viewer
        var empty = document.getElementById('files-viewer-empty');
        var content = document.getElementById('files-viewer-content');
        var textEl = document.getElementById('files-viewer-text');
        empty.classList.add('hidden');
        content.classList.remove('hidden');
        textEl.textContent = 'Loading...';

        try {
            var res = await fetch('/api/workspace/file?path=' + encodeURIComponent(path));
            if (!res.ok) {
                var errData = await res.json().catch(function() { return {error: 'Failed to load'}; });
                textEl.textContent = 'Error: ' + (errData.error || 'Unknown error');
                return;
            }
            var data = await res.json();

            document.getElementById('files-viewer-name').textContent = data.name;
            document.getElementById('files-viewer-size').textContent = formatSize(data.size);
            document.getElementById('files-viewer-modified').textContent = data.mod_time;
            textEl.textContent = data.content;

            // Mobile: show overlay
            if (window.innerWidth < 1024) {
                document.getElementById('files-mobile-name').textContent = data.name;
                document.getElementById('files-mobile-text').textContent = data.content;
                document.getElementById('files-mobile-viewer').classList.remove('hidden');
                refreshIcons();
            }
        } catch(e) {
            textEl.textContent = 'Error: ' + e.message;
        }
    }

    function formatSize(bytes) {
        if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return bytes + ' B';
    }

    function closeMobileViewer() {
        document.getElementById('files-mobile-viewer').classList.add('hidden');
    }

    function filesRefresh() {
        filesNavigate(_filesCurrentPath);
    }

    // ===== GLOBAL: allow goals tab to deep-link into a file =====
    window.openWorkspaceFile = function(path) {
        // Switch to files tab
        var nav = document.getElementById('nav-files');
        if (nav) nav.click();
        // Wait for HTMX to load the partial, then open the file
        setTimeout(function() { openFile(path); }, 300);
    };

    // Initial load
    filesNavigate('.');
</script>
