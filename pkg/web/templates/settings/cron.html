<div id="settings-subtab-cron" class="h-full flex flex-col">
    <div class="flex-grow min-h-0 overflow-y-auto pr-2 space-y-4">
        <div class="glass-panel p-6 rounded-xl border border-[var(--border-color)] shadow-xl transition-colors duration-300">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500">Scheduled Jobs</h3>
                    <p class="text-[11px] text-zinc-600 mt-1">Manage cron jobs that send messages to agents on a schedule.</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="fetchCronJobs()" class="px-3 py-1.5 rounded-lg text-[10px] font-bold border border-[var(--border-color)] text-zinc-400 hover:text-[var(--text-main)] hover:border-zinc-600 transition flex items-center gap-1">
                        <i data-lucide="refresh-cw" class="w-3 h-3"></i> Refresh
                    </button>
                    <button onclick="toggleCronForm()" class="px-3 py-1.5 rounded-lg text-[10px] font-bold border border-sofia/30 text-sofia hover:bg-sofia/10 transition flex items-center gap-1">
                        <i data-lucide="plus" class="w-3 h-3"></i> Add Job
                    </button>
                </div>
            </div>

            <!-- Add Job Form (hidden by default) -->
            <div id="cron-add-form" class="hidden mb-4 p-4 rounded-lg border border-sofia/30 bg-sofia/5 space-y-3">
                <h4 class="text-xs font-bold text-sofia uppercase tracking-widest">New Cron Job</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 ml-1">Name</label>
                        <input type="text" id="cron-new-name" placeholder="daily-report"
                            class="w-full bg-transparent border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)]">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 ml-1">Schedule (cron)</label>
                        <input type="text" id="cron-new-schedule" placeholder="0 9 * * *"
                            class="w-full bg-transparent border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)] font-mono">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 ml-1">Message</label>
                    <textarea id="cron-new-message" rows="2" placeholder="Generate a daily summary report"
                        class="w-full bg-transparent border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)]"></textarea>
                </div>
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 ml-1">Agent ID (optional)</label>
                    <input type="text" id="cron-new-agent" placeholder="Leave empty for default agent"
                        class="w-full bg-transparent border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)]">
                </div>
                <div class="flex gap-2">
                    <button onclick="addCronJob()" class="px-4 py-2 bg-sofia hover:bg-sofia-hover text-white text-xs font-bold rounded-lg transition">Create</button>
                    <button onclick="toggleCronForm()" class="px-4 py-2 bg-transparent border border-[var(--border-color)] text-[var(--text-main)] text-xs rounded-lg transition hover:bg-[var(--bg-main)]">Cancel</button>
                </div>
            </div>

            <div id="cron-jobs-list" class="space-y-2">
                <div id="cron-jobs-empty" class="text-xs text-zinc-600 font-mono py-8 text-center border border-dashed border-[var(--border-color)] rounded-xl">
                    <i data-lucide="clock" class="w-8 h-8 text-zinc-700 mx-auto mb-2"></i>
                    <div>No scheduled jobs. Click "Add Job" to create one.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleCronForm() {
        document.getElementById('cron-add-form').classList.toggle('hidden');
    }

    async function fetchCronJobs() {
        try {
            const res = await fetch('/api/cron');
            if (!res.ok) return;
            const jobs = await res.json();
            renderCronJobs(jobs);
        } catch (e) {
            console.error('Failed to fetch cron jobs:', e);
        }
    }

    function renderCronJobs(jobs) {
        const list = document.getElementById('cron-jobs-list');
        const empty = document.getElementById('cron-jobs-empty');
        list.querySelectorAll('.cron-job-row').forEach(function(el) { el.remove(); });

        if (!jobs || jobs.length === 0) {
            if (empty) empty.style.display = '';
            return;
        }
        if (empty) empty.style.display = 'none';

        jobs.forEach(function(job) {
            const row = document.createElement('div');
            row.className = 'cron-job-row flex items-center gap-4 p-4 rounded-lg border border-[var(--border-color)] bg-[var(--bg-main)]';
            row.innerHTML =
                '<label class="relative inline-flex items-center cursor-pointer shrink-0">' +
                '  <input type="checkbox" class="sr-only peer"' + (job.enabled !== false ? ' checked' : '') + ' onchange="toggleCronJob(\'' + escapeHtml(job.name) + '\', this.checked)">' +
                '  <div class="w-9 h-5 bg-zinc-700 rounded-full peer peer-checked:bg-sofia transition-colors after:content-[\'\'] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>' +
                '</label>' +
                '<div class="flex-grow min-w-0">' +
                '  <div class="flex items-center gap-2">' +
                '    <span class="text-sm font-semibold text-[var(--text-main)]">' + escapeHtml(job.name || 'Unnamed') + '</span>' +
                '    <span class="text-[10px] font-mono text-zinc-500 bg-zinc-900 px-2 py-0.5 rounded">' + escapeHtml(job.schedule || '') + '</span>' +
                (job.agent_id ? '    <span class="text-[10px] text-blue-400">' + escapeHtml(job.agent_id) + '</span>' : '') +
                '  </div>' +
                '  <div class="text-[11px] text-zinc-500 truncate mt-0.5">' + escapeHtml(job.message || '') + '</div>' +
                '</div>' +
                '<button onclick="deleteCronJob(\'' + escapeHtml(job.name) + '\')" class="p-1.5 rounded-lg hover:bg-red-500/10 text-zinc-500 hover:text-red-400 transition shrink-0">' +
                '  <i data-lucide="trash-2" class="w-4 h-4"></i>' +
                '</button>';
            list.appendChild(row);
        });
        lucide.createIcons({ root: list });
    }

    async function addCronJob() {
        const name = document.getElementById('cron-new-name').value.trim();
        const schedule = document.getElementById('cron-new-schedule').value.trim();
        const message = document.getElementById('cron-new-message').value.trim();
        const agentId = document.getElementById('cron-new-agent').value.trim();

        if (!name || !schedule || !message) {
            alert('Name, schedule, and message are required.');
            return;
        }

        try {
            const res = await fetch('/api/cron', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, schedule: schedule, message: message, agent_id: agentId, enabled: true })
            });
            if (res.ok) {
                toggleCronForm();
                document.getElementById('cron-new-name').value = '';
                document.getElementById('cron-new-schedule').value = '';
                document.getElementById('cron-new-message').value = '';
                document.getElementById('cron-new-agent').value = '';
                fetchCronJobs();
            } else {
                const err = await res.json();
                alert(err.error || 'Failed to create job');
            }
        } catch (e) {
            alert('Failed to create cron job');
        }
    }

    async function deleteCronJob(name) {
        if (!confirm('Delete job "' + name + '"?')) return;
        try {
            await fetch('/api/cron?name=' + encodeURIComponent(name), { method: 'DELETE' });
            fetchCronJobs();
        } catch (e) {
            alert('Failed to delete cron job');
        }
    }

    async function toggleCronJob(name, enabled) {
        try {
            await fetch('/api/cron/toggle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, enabled: enabled })
            });
        } catch (e) {
            console.error('Failed to toggle cron job:', e);
        }
    }

    lucide.createIcons();
    fetchCronJobs();
</script>
