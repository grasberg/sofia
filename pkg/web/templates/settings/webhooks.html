<div id="settings-subtab-webhooks" class="h-full flex flex-col">
    <div class="flex-grow min-h-0 overflow-y-auto pr-2 space-y-4">
        <!-- Outbound Webhooks -->
        <div class="glass-panel p-6 rounded-xl border border-[var(--border-color)] shadow-xl transition-colors duration-300">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500">Outbound Webhooks</h3>
                    <p class="text-[11px] text-zinc-600 mt-1">Send HTTP notifications when events occur.</p>
                </div>
                <button onclick="addWebhookRow()" class="px-3 py-1.5 rounded-lg text-[10px] font-bold border border-sofia/30 text-sofia hover:bg-sofia/10 transition flex items-center gap-1">
                    <i data-lucide="plus" class="w-3 h-3"></i> Add Webhook
                </button>
            </div>
            <div id="webhooks-list" class="space-y-3">
                <div id="webhooks-empty" class="text-xs text-zinc-600 font-mono py-4 text-center border border-dashed border-[var(--border-color)] rounded-xl">
                    No outbound webhooks configured.
                </div>
            </div>
        </div>

        <!-- Digests -->
        <div class="glass-panel p-6 rounded-xl border border-[var(--border-color)] shadow-xl transition-colors duration-300">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500">Scheduled Digests</h3>
                    <p class="text-[11px] text-zinc-600 mt-1">Periodic summaries delivered to channels.</p>
                </div>
                <button onclick="addDigestRow()" class="px-3 py-1.5 rounded-lg text-[10px] font-bold border border-sofia/30 text-sofia hover:bg-sofia/10 transition flex items-center gap-1">
                    <i data-lucide="plus" class="w-3 h-3"></i> Add Digest
                </button>
            </div>
            <div id="digests-list" class="space-y-3">
                <div id="digests-empty" class="text-xs text-zinc-600 font-mono py-4 text-center border border-dashed border-[var(--border-color)] rounded-xl">
                    No digests configured.
                </div>
            </div>
        </div>

        <button onclick="saveConfig()" class="mt-2 bg-sofia hover:bg-sofia-hover text-white font-bold px-8 py-3 rounded-xl transition shadow-lg shadow-sofia/20 flex items-center gap-2">
            <i data-lucide="save" class="w-4 h-4"></i>
            Save changes
        </button>
    </div>
</div>

<script>
    function addWebhookRow(url, secret, events, enabled) {
        const list = document.getElementById('webhooks-list');
        const empty = document.getElementById('webhooks-empty');
        if (empty) empty.style.display = 'none';

        const evtList = ['agent_done', 'tool_call_end', 'goal_completed', 'subagent_task_end', 'message_routed', 'evolution_change'];
        const row = document.createElement('div');
        row.className = 'p-4 rounded-lg border border-[var(--border-color)] bg-[var(--bg-main)] space-y-3 webhook-row';

        let eventsHtml = '<div class="flex flex-wrap gap-2 mt-1">';
        evtList.forEach(function(e) {
            const checked = events && events.includes(e) ? ' checked' : '';
            eventsHtml += '<label class="flex items-center gap-1 text-[10px] text-zinc-400">' +
                '<input type="checkbox" value="' + e + '"' + checked + ' class="webhook-event w-3 h-3 text-sofia bg-zinc-800 border-zinc-600 rounded">' +
                e + '</label>';
        });
        eventsHtml += '</div>';

        row.innerHTML =
            '<div class="flex items-center justify-between">' +
            '  <div class="flex items-center gap-3">' +
            '    <label class="relative inline-flex items-center cursor-pointer shrink-0">' +
            '      <input type="checkbox" class="sr-only peer webhook-enabled"' + (enabled !== false ? ' checked' : '') + '>' +
            '      <div class="w-9 h-5 bg-zinc-700 rounded-full peer peer-checked:bg-sofia transition-colors after:content-[\'\'] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>' +
            '    </label>' +
            '    <span class="text-xs font-semibold text-[var(--text-main)]">Webhook</span>' +
            '  </div>' +
            '  <button onclick="this.closest(\'.webhook-row\').remove(); checkWebhooksEmpty()" class="p-1.5 rounded-lg hover:bg-red-500/10 text-zinc-500 hover:text-red-400 transition">' +
            '    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>' +
            '  </button>' +
            '</div>' +
            '<input type="text" placeholder="https://example.com/webhook" value="' + (url || '') + '"' +
            '  class="w-full bg-transparent border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)] webhook-url">' +
            '<input type="password" placeholder="HMAC secret (optional)" value="' + (secret || '') + '"' +
            '  class="w-full bg-transparent border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)] webhook-secret">' +
            '<div class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">Events</div>' +
            eventsHtml;

        list.appendChild(row);
        lucide.createIcons({ root: row });
    }

    function checkWebhooksEmpty() {
        const rows = document.querySelectorAll('.webhook-row');
        const empty = document.getElementById('webhooks-empty');
        if (empty) empty.style.display = rows.length === 0 ? '' : 'none';
    }

    function addDigestRow(period, channel, chatId, includeMemory, includeUsage) {
        const list = document.getElementById('digests-list');
        const empty = document.getElementById('digests-empty');
        if (empty) empty.style.display = 'none';

        const row = document.createElement('div');
        row.className = 'flex items-center gap-3 p-3 rounded-lg border border-[var(--border-color)] bg-[var(--bg-main)] digest-row';
        row.innerHTML =
            '<select class="w-24 bg-[var(--bg-main)] border border-[var(--border-color)] rounded-lg px-2 py-2 text-xs text-[var(--text-main)] digest-period">' +
            '  <option value="daily"' + (period === 'daily' ? ' selected' : '') + '>Daily</option>' +
            '  <option value="weekly"' + (period === 'weekly' ? ' selected' : '') + '>Weekly</option>' +
            '</select>' +
            '<select class="w-24 bg-[var(--bg-main)] border border-[var(--border-color)] rounded-lg px-2 py-2 text-xs text-[var(--text-main)] digest-channel">' +
            '  <option value="telegram"' + (channel === 'telegram' ? ' selected' : '') + '>Telegram</option>' +
            '  <option value="discord"' + (channel === 'discord' ? ' selected' : '') + '>Discord</option>' +
            '  <option value="web"' + (channel === 'web' ? ' selected' : '') + '>Web</option>' +
            '</select>' +
            '<input type="text" placeholder="Chat ID" value="' + (chatId || '') + '"' +
            '  class="flex-grow bg-transparent border border-[var(--border-color)] rounded-lg px-2 py-2 text-xs text-[var(--text-main)] digest-chatid">' +
            '<label class="flex items-center gap-1 text-[10px] text-zinc-400 shrink-0">' +
            '  <input type="checkbox" class="digest-memory w-3 h-3 text-sofia bg-zinc-800 border-zinc-600 rounded"' + (includeMemory ? ' checked' : '') + '> Memory' +
            '</label>' +
            '<label class="flex items-center gap-1 text-[10px] text-zinc-400 shrink-0">' +
            '  <input type="checkbox" class="digest-usage w-3 h-3 text-sofia bg-zinc-800 border-zinc-600 rounded"' + (includeUsage ? ' checked' : '') + '> Usage' +
            '</label>' +
            '<button onclick="this.closest(\'.digest-row\').remove(); checkDigestsEmpty()" class="p-1.5 rounded-lg hover:bg-red-500/10 text-zinc-500 hover:text-red-400 transition shrink-0">' +
            '  <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>' +
            '</button>';

        list.appendChild(row);
        lucide.createIcons({ root: row });
    }

    function checkDigestsEmpty() {
        const rows = document.querySelectorAll('.digest-row');
        const empty = document.getElementById('digests-empty');
        if (empty) empty.style.display = rows.length === 0 ? '' : 'none';
    }

    lucide.createIcons();
</script>
