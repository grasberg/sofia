<div id="settings-subtab-budget" class="h-full flex flex-col">
    <div class="flex-grow min-h-0 overflow-y-auto pr-2 space-y-4">
        <div class="glass-panel p-6 rounded-xl border border-[var(--border-color)] shadow-xl transition-colors duration-300">
            <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500 border-b border-[var(--border-color)] pb-3 mb-4">Budget &amp; Cost Controls</h3>

            <div class="p-4 rounded-lg border border-[var(--border-color)] bg-[var(--bg-main)] space-y-4">
                <h4 class="text-sm font-semibold text-[var(--text-main)]">Default Budget</h4>
                <p class="text-[11px] text-zinc-500">Applies to all agents unless overridden per-agent.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 ml-1">Max Cost (USD)</label>
                        <input type="number" id="cfg-budget-max-cost" step="0.01" min="0" placeholder="10.00"
                            class="w-full bg-transparent border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)]">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 ml-1">Period</label>
                        <select id="cfg-budget-period"
                            class="w-full bg-[var(--bg-main)] border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)]">
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-panel p-6 rounded-xl border border-[var(--border-color)] shadow-xl transition-colors duration-300">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500">Per-Agent Budget Overrides</h3>
                <button onclick="addAgentBudgetRow()" class="px-3 py-1.5 rounded-lg text-[10px] font-bold border border-sofia/30 text-sofia hover:bg-sofia/10 transition flex items-center gap-1">
                    <i data-lucide="plus" class="w-3 h-3"></i> Add Override
                </button>
            </div>
            <div id="agent-budget-list" class="space-y-2">
                <div id="agent-budget-empty" class="text-xs text-zinc-600 font-mono py-4 text-center border border-dashed border-[var(--border-color)] rounded-xl">
                    No per-agent overrides. All agents use the default budget.
                </div>
            </div>
        </div>

        <button onclick="saveConfig()" class="mt-2 bg-sofia hover:bg-sofia-hover text-white font-bold px-8 py-3 rounded-xl transition shadow-lg shadow-sofia/20 flex items-center gap-2">
            <i data-lucide="save" class="w-4 h-4"></i>
            Save changes
        </button>
    </div>
</div>

<script>
    function addAgentBudgetRow(agentId, maxCost, period) {
        const list = document.getElementById('agent-budget-list');
        const empty = document.getElementById('agent-budget-empty');
        if (empty) empty.style.display = 'none';

        const row = document.createElement('div');
        row.className = 'flex items-center gap-3 p-3 rounded-lg border border-[var(--border-color)] bg-[var(--bg-main)] agent-budget-row';
        row.innerHTML =
            '<input type="text" placeholder="Agent ID" value="' + (agentId || '') + '"' +
            '  class="flex-grow bg-transparent border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)] agent-budget-id">' +
            '<input type="number" placeholder="Max USD" step="0.01" min="0" value="' + (maxCost || '') + '"' +
            '  class="w-28 bg-transparent border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)] agent-budget-cost">' +
            '<select class="w-28 bg-[var(--bg-main)] border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)] agent-budget-period">' +
            '  <option value="daily"' + (period === 'daily' ? ' selected' : '') + '>Daily</option>' +
            '  <option value="weekly"' + (period === 'weekly' ? ' selected' : '') + '>Weekly</option>' +
            '  <option value="monthly"' + (period === 'monthly' ? ' selected' : '') + '>Monthly</option>' +
            '</select>' +
            '<button onclick="this.parentElement.remove(); checkBudgetEmpty()" class="p-1.5 rounded-lg hover:bg-red-500/10 text-zinc-500 hover:text-red-400 transition shrink-0">' +
            '  <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>' +
            '</button>';
        list.appendChild(row);
        refreshIcons();
    }

    function checkBudgetEmpty() {
        const rows = document.querySelectorAll('.agent-budget-row');
        const empty = document.getElementById('agent-budget-empty');
        if (empty) empty.style.display = rows.length === 0 ? '' : 'none';
    }

    refreshIcons();
</script>
