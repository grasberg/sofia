<div id="settings-subtab-remote" class="h-full flex flex-col">
    <div class="flex-grow min-h-0 overflow-y-auto pr-2 space-y-4">
        <div class="glass-panel p-6 rounded-xl border border-[var(--border-color)] shadow-xl transition-colors duration-300">
            <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500 border-b border-[var(--border-color)] pb-3 mb-4">Remote Access</h3>

            <div class="p-4 rounded-lg border border-[var(--border-color)] bg-[var(--bg-main)]">
                <div class="flex items-start justify-between">
                    <div class="space-y-1 pr-6">
                        <h4 class="text-sm font-semibold text-[var(--text-main)]">Enable Remote Access</h4>
                        <p class="text-[11px] leading-relaxed text-zinc-500">
                            Expose the Sofia web UI and API securely over the internet via Tailscale or similar VPN tunnels.
                        </p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer shrink-0 mt-1">
                        <input type="checkbox" id="cfg-remote-enabled" class="sr-only peer" onchange="saveConfig()">
                        <div class="w-9 h-5 bg-zinc-700 rounded-full peer peer-checked:bg-sofia transition-colors after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                    </label>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 ml-1">Provider</label>
                    <select id="cfg-remote-provider"
                        class="w-full bg-[var(--bg-main)] border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)]">
                        <option value="tailscale">Tailscale</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 ml-1">Port</label>
                    <input type="number" id="cfg-remote-port" min="1" max="65535" placeholder="3000"
                        class="w-full bg-transparent border border-[var(--border-color)] rounded-lg px-3 py-2 text-xs text-[var(--text-main)]">
                </div>
            </div>
        </div>

        <button onclick="saveConfig()" class="mt-2 bg-sofia hover:bg-sofia-hover text-white font-bold px-8 py-3 rounded-xl transition shadow-lg shadow-sofia/20 flex items-center gap-2">
            <i data-lucide="save" class="w-4 h-4"></i>
            Save changes
        </button>
    </div>
</div>
