<!-- CHAT TAB -->
            <div id="tab-chat" class="tab-content active">
                <div class="flex-grow-fix flex flex-col lg:flex-row gap-6">
                    <!-- Chat Area -->
                        <div class="flex-grow-fix flex flex-col glass-panel shadow-xl">
                            <!-- Chat header: shows current session info + New Chat button -->
                            <div class="px-4 py-2.5 border-b border-outline-variant/10 bg-surface-container-high/50 flex items-center justify-between rounded-t-xl">
                                <div class="flex items-center gap-2">
                                    <span class="text-[9px] text-on-surface-variant/40 font-bold uppercase tracking-widest">Session</span>
                                    <span id="chat-session-label" class="text-[10px] text-on-surface-variant font-mono truncate max-w-[200px]">New conversation</span>
                                </div>
                                <button onclick="startNewChat()" title="New conversation"
                                    class="flex items-center gap-1.5 px-3 py-1.5 text-[9px] font-bold uppercase tracking-wider rounded-lg border border-outline-variant/20 text-on-surface-variant hover:border-tertiary/40 hover:text-tertiary transition-all">
                                    <i data-lucide="plus" class="w-3 h-3"></i>
                                    <span class="hidden lg:inline">New Chat</span>
                                </button>
                            </div>

                            <!-- Goal & Plan Tracker -->
                            <div id="chat-goal-panel" class="hidden border-b border-outline-variant/10 bg-surface-container-lowest/40">
                                <!-- Active Goal -->
                                <div id="chat-goal-bar" class="hidden px-4 py-2 flex items-center gap-3 border-b border-outline-variant/5">
                                    <i data-lucide="target" class="w-3.5 h-3.5 text-sofia shrink-0"></i>
                                    <div class="flex-grow min-w-0">
                                        <div class="flex items-center gap-2">
                                            <span class="text-[9px] font-bold uppercase tracking-widest text-on-surface-variant/40">Goal</span>
                                            <span id="chat-goal-name" class="text-[10px] font-semibold text-on-surface truncate"></span>
                                            <span id="chat-goal-priority" class="px-1 py-0 rounded text-[8px] font-bold uppercase"></span>
                                        </div>
                                        <div id="chat-goal-desc" class="text-[9px] text-on-surface-variant/60 truncate mt-0.5"></div>
                                    </div>
                                    <div id="chat-goal-actions" class="flex items-center gap-1 shrink-0"></div>
                                </div>
                                <!-- Active Plan -->
                                <div id="chat-plan-bar" class="hidden px-4 py-2">
                                    <div class="flex items-center gap-2 mb-1.5">
                                        <i data-lucide="list-checks" class="w-3.5 h-3.5 text-primary shrink-0"></i>
                                        <span class="text-[9px] font-bold uppercase tracking-widest text-on-surface-variant/40">Plan</span>
                                        <span id="chat-plan-goal" class="text-[10px] text-on-surface-variant font-mono truncate"></span>
                                        <span id="chat-plan-progress" class="text-[9px] font-mono text-on-surface-variant/60 ml-auto shrink-0"></span>
                                    </div>
                                    <div id="chat-plan-steps" class="space-y-0.5 max-h-32 overflow-y-auto scrollbar-custom"></div>
                                </div>
                            </div>

                            <div id="chat-history" class="flex-grow-fix overflow-y-auto p-4 lg:p-6 space-y-6">
                                <div class="flex gap-4 animate-fade-in">
                                    <div class="w-8 h-8 rounded-lg bg-tertiary/10 border border-tertiary/20 flex items-center justify-center shrink-0">
                                        <img src="/assets/sofiamantis.png" class="w-5 h-5 opacity-80">
                                    </div>
                                    <div class="chat-bubble-sofia px-4 py-3 text-sm leading-relaxed max-w-[85%] text-on-surface-variant">
                                        System initialized. How can I help you?
                                    </div>
                                </div>
                            </div>

                            <!-- Quick Reply Suggestions -->
                            <div id="chat-suggestions" class="hidden px-4 py-2 bg-surface-container-lowest/40 border-t border-outline-variant/10 flex flex-wrap gap-2">
                            </div>

                            <!-- Input Area -->
                            <div class="p-4 bg-surface-container-high/40 border-t border-outline-variant/10 rounded-b-xl">
                                <!-- File preview strip -->
                                <div id="chat-file-preview" class="hidden mb-2 flex flex-wrap gap-2"></div>
                                <!-- Hidden file input -->
                                <input type="file" id="chat-file-input" multiple accept="*/*" class="hidden" onchange="handleFileAttach(this)">
                                <div class="relative flex items-center gap-2">
                                    <!-- Attach button -->
                                    <button onclick="document.getElementById('chat-file-input').click()"
                                        title="Attach files"
                                        class="shrink-0 w-10 h-10 flex items-center justify-center rounded-xl border border-outline-variant/20 text-on-surface-variant hover:text-tertiary hover:border-tertiary/30 transition-all">
                                        <i data-lucide="paperclip" class="w-4 h-4"></i>
                                    </button>
                                    <div class="flex-grow flex items-center gap-0">
                                        <input type="text" id="chat-input" placeholder="Type your message..."
                                            class="flex-grow min-w-0 bg-surface-container-lowest border border-outline-variant/20 border-r-0 rounded-l-xl pl-4 py-3.5 text-sm focus:outline-none focus:border-tertiary/40 transition-all text-on-surface placeholder:text-on-surface-variant/30">
                                        <button onclick="sendChat()" class="btn-brutalist shrink-0 px-6 py-3.5 text-xs font-bold border border-outline-variant/20 border-l-0 rounded-r-xl">
                                            Send
                                        </button>
                                    </div>
                                </div>
                                <div class="mt-2 px-1 flex justify-between">
                                    <span class="text-[9px] text-on-surface-variant/30 font-medium">Ready</span>
                                    <div class="flex items-center gap-3">
                                        <span id="chat-token-usage" class="text-[9px] text-on-surface-variant/40 font-mono hidden"></span>
                                        <span id="typing-indicator" class="text-[9px] text-tertiary font-bold hidden animate-pulse">Sofia is thinking...</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Right Sidebar: Agent Monitor -->
                        <div id="agent-monitor-sidebar" class="w-full lg:w-80 shrink-0 flex flex-col h-64 lg:h-auto">
                            <div class="glass-panel flex flex-col h-full shadow-xl">
                                <div class="p-3 border-b border-outline-variant/10 bg-surface-container-high/50 rounded-t-xl flex items-center justify-between">
                                    <h3 class="text-[10px] font-bold uppercase tracking-widest text-tertiary font-headline">Agent Monitor</h3>
                                    <div class="flex items-center gap-2">
                                        <span class="w-2 h-2 rounded-full bg-tertiary/60 animate-pulse"></span>
                                        <span id="monitor-pulse" class="w-1.5 h-1.5 rounded-full bg-on-surface-variant/30"></span>
                                    </div>
                                </div>
                                <!-- Persistent per-agent cards, built from /api/status -->
                                <div id="agent-card-list" class="flex-grow-fix p-3 overflow-y-auto space-y-2 bg-surface-container-lowest/30">
                                    <!-- Cards injected by renderAgentCards() in layout.html -->
                                    <div class="text-[10px] text-on-surface-variant/30 italic text-center py-6">Loading agents...</div>
                                </div>
                                <!-- Scrolling live-log area, shown when any agent is active -->
                                <div id="agent-live-log" class="hidden border-t border-outline-variant/10 bg-surface-container-lowest/40 flex flex-col rounded-b-xl" style="max-height:160px">
                                    <div class="px-3 py-1.5 flex items-center justify-between border-b border-outline-variant/5">
                                        <span class="text-[8px] text-on-surface-variant/40 font-bold uppercase tracking-widest">Live Activity</span>
                                        <button onclick="document.getElementById('agent-live-log-lines').innerHTML=''" class="text-[8px] text-on-surface-variant/30 hover:text-on-surface-variant">clear</button>
                                    </div>
                                    <div id="agent-live-log-lines" class="overflow-y-auto flex-grow p-2 space-y-0.5 font-mono text-[9px] leading-relaxed"></div>
                                </div>
                            </div>
                        </div>
                </div>
            </div>

<script>
    // currentSessionKey: tracks the active web conversation.
    // Empty string = no conversation started yet (server will generate one on first send).
    let currentSessionKey = '';

    // setActiveSessionKey is called by the History tab's "Resume" button.
    function setActiveSessionKey(key) {
        currentSessionKey = key;
        updateSessionLabel();
        // Clear the DOM chat history so the user starts fresh in the UI
        // (the LLM context is loaded server-side from the persisted session).
        const historyEl = document.getElementById('chat-history');
        if (historyEl) {
            historyEl.innerHTML =
                '<div class="flex gap-4 animate-fade-in">' +
                '<div class="w-8 h-8 rounded-lg bg-tertiary/10 border border-tertiary/20 flex items-center justify-center shrink-0">' +
                '<img src="/assets/sofiamantis.png" class="w-5 h-5 opacity-80"></div>' +
                '<div class="chat-bubble-sofia px-4 py-3 text-sm leading-relaxed max-w-[85%] text-on-surface-variant">' +
                'Session resumed. Context loaded from history.' +
                '</div></div>';
        }
        document.getElementById('chat-input').focus();
    }

    function startNewChat() {
        currentSessionKey = '';
        updateSessionLabel();
        const historyEl = document.getElementById('chat-history');
        if (historyEl) {
            historyEl.innerHTML =
                '<div class="flex gap-4 animate-fade-in">' +
                '<div class="w-8 h-8 rounded-lg bg-tertiary/10 border border-tertiary/20 flex items-center justify-center shrink-0">' +
                '<img src="/assets/sofiamantis.png" class="w-5 h-5 opacity-80"></div>' +
                '<div class="chat-bubble-sofia px-4 py-3 text-sm leading-relaxed max-w-[85%] text-on-surface-variant">' +
                'System initialized. How can I help you?' +
                '</div></div>';
        }
        document.getElementById('chat-input').focus();
    }

    // Quick reply suggestions handler
    window.showChatSuggestions = function(suggestions) {
        const container = document.getElementById('chat-suggestions');
        if (!container) return;

        // Ensure suggestions is an array of strings
        let items = suggestions;
        if (!items) {
            items = [];
        } else if (typeof items === 'object' && !Array.isArray(items)) {
            // If it's an object, try to extract string values
            items = Object.values(items).filter(v => typeof v === 'string');
        } else if (typeof items === 'string') {
            items = [items];
        }

        if (items.length === 0) {
            container.classList.add('hidden');
            container.innerHTML = '';
            return;
        }
        container.classList.remove('hidden');
        container.innerHTML = '';
        items.forEach(function(s) {
            if (typeof s !== 'string') return;
            const btn = document.createElement('button');
            btn.className = 'px-3 py-1.5 text-[10px] font-semibold border border-outline-variant/20 text-on-surface-variant hover:border-tertiary/40 hover:text-tertiary transition-all rounded-lg';
            btn.textContent = s;
            btn.onclick = function() {
                document.getElementById('chat-input').value = s;
                sendChat();
                container.classList.add('hidden');
            };
            container.appendChild(btn);
        });
    };

    // Token usage display handler
    window.showTokenUsage = function(tokens) {
        const el = document.getElementById('chat-token-usage');
        if (!el) return;
        if (!tokens || typeof tokens !== 'object') { el.classList.add('hidden'); return; }
        const parts = [];
        const n = function(v) { return typeof v === 'number' ? v : 0; };
        if (n(tokens.prompt_tokens)) parts.push(n(tokens.prompt_tokens) + ' in');
        if (n(tokens.completion_tokens)) parts.push(n(tokens.completion_tokens) + ' out');
        if (n(tokens.total_tokens)) parts.push(n(tokens.total_tokens) + ' total');
        if (parts.length === 0) { el.classList.add('hidden'); return; }
        el.classList.remove('hidden');
        el.textContent = parts.join(' / ');
    };

    // ===== PASTE IMAGE SUPPORT =====
    // Allow pasting images (Ctrl+V / Cmd+V) into the chat input area
    function setupPasteHandler() {
        const inputArea = document.getElementById('chat-input');
        if (!inputArea || inputArea.dataset.pastebound) return;
        inputArea.dataset.pastebound = '1';

        // Listen on the input itself and also on the whole chat panel
        // so paste works even if focus is slightly off
        const chatPanel = inputArea.closest('.glass-panel') || inputArea.parentElement;

        function handlePaste(e) {
            const items = e.clipboardData && e.clipboardData.items;
            if (!items) return;

            let hasImage = false;
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                if (item.type.startsWith('image/')) {
                    hasImage = true;
                    e.preventDefault();
                    const file = item.getAsFile();
                    if (!file) continue;

                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        // Generate a name from timestamp
                        const ext = file.type.split('/')[1] || 'png';
                        const name = 'pasted-' + new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19) + '.' + ext;

                        // Build the same attachment format as handleFileAttach
                        if (typeof attachedFiles !== 'undefined') {
                            attachedFiles.push({
                                name: name,
                                type: file.type,
                                isText: false,
                                isImage: true,
                                content: btoa(ev.target.result),
                                previewURL: URL.createObjectURL(file),
                            });
                            if (typeof renderFilePreview === 'function') renderFilePreview();
                        }
                    };
                    reader.readAsBinaryString(file);
                }
            }

            // Flash the input border to indicate paste was captured
            if (hasImage) {
                inputArea.classList.add('border-sofia');
                setTimeout(function() { inputArea.classList.remove('border-sofia'); }, 500);
            }
        }

        inputArea.addEventListener('paste', handlePaste);
        if (chatPanel && chatPanel !== inputArea) {
            chatPanel.addEventListener('paste', handlePaste);
        }
    }
    setupPasteHandler();

    // ===== GOAL & PLAN TRACKER =====
    function fetchGoalAndPlan() {
        Promise.all([
            fetch('/api/goals?agent_id=sofia').then(function(r){return r.ok?r.json():[];}),
            fetch('/api/plan').then(function(r){return r.ok?r.json():null;})
        ]).then(function(results) {
            renderGoalPanel(results[0], results[1]);
        }).catch(function(){});
    }

    function renderGoalPanel(goals, plan) {
        const panel = document.getElementById('chat-goal-panel');
        const goalBar = document.getElementById('chat-goal-bar');
        const planBar = document.getElementById('chat-plan-bar');
        if (!panel) return;

        let hasContent = false;

        // Find the highest-priority active goal
        var activeGoal = null;
        if (goals && goals.length > 0) {
            var priorityOrder = {high:0, medium:1, low:2};
            var active = goals.filter(function(g){return g.status==='active';});
            active.sort(function(a,b){return (priorityOrder[a.priority]||9)-(priorityOrder[b.priority]||9);});
            if (active.length > 0) activeGoal = active[0];
        }

        if (activeGoal && goalBar) {
            goalBar.classList.remove('hidden');
            document.getElementById('chat-goal-name').textContent = activeGoal.name || '';
            document.getElementById('chat-goal-desc').textContent = activeGoal.description || '';
            var prioEl = document.getElementById('chat-goal-priority');
            var prioColors = {high:'bg-red-500/15 text-red-400',medium:'bg-amber-500/15 text-amber-400',low:'bg-blue-500/15 text-blue-400'};
            prioEl.className = 'px-1 py-0 rounded text-[8px] font-bold uppercase ' + (prioColors[activeGoal.priority]||'');
            prioEl.textContent = activeGoal.priority || '';
            // Inline action buttons
            var actionsEl = document.getElementById('chat-goal-actions');
            if (actionsEl) {
                actionsEl.innerHTML =
                    '<button onclick="chatGoalPause(' + activeGoal.id + ')" class="p-1 rounded text-amber-400 hover:bg-amber-500/10 transition-colors" title="Pause goal"><i data-lucide="pause" class="w-3 h-3"></i></button>' +
                    '<button onclick="chatGoalStop(' + activeGoal.id + ')" class="p-1 rounded text-red-400 hover:bg-red-500/10 transition-colors" title="Stop goal"><i data-lucide="square" class="w-3 h-3"></i></button>';
                refreshIcons();
            }
            hasContent = true;
        } else if (goalBar) {
            goalBar.classList.add('hidden');
        }

        if (plan && planBar) {
            planBar.classList.remove('hidden');
            document.getElementById('chat-plan-goal').textContent = plan.goal || '';
            var steps = plan.steps || [];
            var completed = steps.filter(function(s){return s.status==='completed';}).length;
            document.getElementById('chat-plan-progress').textContent = completed + '/' + steps.length;

            var stepsEl = document.getElementById('chat-plan-steps');
            stepsEl.innerHTML = '';
            steps.forEach(function(s) {
                var icon, color;
                if (s.status === 'completed') { icon = '\u2714'; color = 'text-green-400'; }
                else if (s.status === 'in_progress') { icon = '\u25B6'; color = 'text-amber-400'; }
                else if (s.status === 'failed') { icon = '\u2718'; color = 'text-red-400'; }
                else { icon = '\u25CB'; color = 'text-on-surface-variant/40'; }

                var row = document.createElement('div');
                row.className = 'flex items-start gap-2 px-1 py-0.5';
                row.innerHTML =
                    '<span class="' + color + ' text-[10px] shrink-0 w-3 text-center">' + icon + '</span>' +
                    '<span class="text-[10px] ' + (s.status==='completed'?'text-on-surface-variant/40 line-through':'text-on-surface-variant') + ' leading-tight">' +
                    escapeHtml(s.description || '') + '</span>' +
                    (s.result ? '<span class="text-[8px] text-on-surface-variant/30 ml-auto shrink-0 font-mono">' + escapeHtml(s.result.substring(0,30)) + '</span>' : '');
                stepsEl.appendChild(row);
            });
            hasContent = true;
        } else if (planBar) {
            planBar.classList.add('hidden');
        }

        panel.classList.toggle('hidden', !hasContent);
    }

    // Chat inline goal actions
    window.chatGoalPause = function(goalId) {
        fetch('/api/goals', {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest'},
            body: JSON.stringify({goal_id: goalId, status: 'paused'})
        }).then(fetchGoalAndPlan);
    };
    window.chatGoalStop = function(goalId) {
        if (!confirm('Stop this goal?')) return;
        fetch('/api/goals', {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest'},
            body: JSON.stringify({goal_id: goalId, status: 'failed'})
        }).then(fetchGoalAndPlan);
    };

    // Poll goal & plan periodically and on WS events
    window._chatGoalPlanRefresh = function() { fetchGoalAndPlan(); };
    fetchGoalAndPlan();
    setInterval(fetchGoalAndPlan, 5000);

    function updateSessionLabel() {
        const label = document.getElementById('chat-session-label');
        if (!label) return;
        if (!currentSessionKey) {
            label.textContent = 'New conversation';
            label.title = '';
        } else {
            // Show a short human-readable label
            const parts = currentSessionKey.split(':');
            // web:ui:2026-03-04T10:00:00Z → show date/time portion
            if (currentSessionKey.startsWith('web:ui:') && parts.length >= 3) {
                const ts = parts.slice(2).join(':');
                try {
                    const d = new Date(ts);
                    label.textContent = isNaN(d) ? ts : d.toLocaleString();
                } catch (_) {
                    label.textContent = ts;
                }
            } else {
                label.textContent = currentSessionKey;
            }
            label.title = currentSessionKey;
        }
    }
</script>
