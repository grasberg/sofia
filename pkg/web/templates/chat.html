<!-- CHAT TAB -->
            <div id="tab-chat" class="tab-content active">
                <div class="flex-grow-fix flex flex-col lg:flex-row gap-6">
                    <!-- Chat Area -->
                        <div class="flex-grow-fix flex flex-col glass-panel border border-[var(--border-color)] shadow-2xl">
                            <div id="chat-history" class="flex-grow-fix overflow-y-auto p-4 lg:p-6 space-y-6">
                                <div class="flex gap-4 animate-fade-in">
                                    <div class="w-8 h-8 bg-sofia/10 border border-sofia/20 flex items-center justify-center shrink-0">
                                        <img src="/assets/sofiamantis.png" class="w-5 h-5 opacity-80">
                                    </div>
                                    <div class="chat-bubble-sofia px-4 py-3 text-xs leading-relaxed max-w-[85%] text-zinc-300">
                                        SYSTEM INITIALIZED. AWAITING INSTRUCTIONS.
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Input Area -->
                            <div class="p-4 bg-black/40 border-t border-[var(--border-color)]">
                                <!-- File preview strip -->
                                <div id="chat-file-preview" class="hidden mb-2 flex flex-wrap gap-2"></div>
                                <!-- Hidden file input -->
                                <input type="file" id="chat-file-input" multiple accept="*/*" class="hidden" onchange="handleFileAttach(this)">
                                <div class="relative flex items-center gap-2">
                                    <!-- Attach button -->
                                    <button onclick="document.getElementById('chat-file-input').click()" 
                                        title="Attach files"
                                        class="shrink-0 w-9 h-9 flex items-center justify-center border border-[var(--border-color)] text-zinc-500 hover:text-sofia hover:border-sofia/40 transition-colors">
                                        <i data-lucide="paperclip" class="w-4 h-4"></i>
                                    </button>
                                    <div class="relative flex-grow flex items-center">
                                        <input type="text" id="chat-input" placeholder="ENTER COMMAND..." 
                                            class="w-full bg-black border border-[var(--border-color)] rounded-none pl-4 pr-24 py-4 text-xs font-mono focus:outline-none focus:border-sofia/50 transition-all text-white placeholder:text-zinc-700">
                                        <div class="absolute right-3">
                                            <button onclick="sendChat()" class="btn-brutalist px-6 py-2 text-[10px]">
                                                EXECUTE
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div class="mt-2 px-1 flex justify-between">
                                    <span class="text-[9px] text-zinc-700 font-bold uppercase">Ready for input</span>
                                    <span id="typing-indicator" class="text-[9px] text-sofia font-bold uppercase hidden animate-pulse">Sofia is thinking...</span>
                                </div>
                            </div>
                        </div>

                        <!-- Right Sidebar: Agent Monitor -->
                        <div id="agent-monitor-sidebar" class="w-full lg:w-80 shrink-0 flex flex-col h-64 lg:h-auto">
                            <div class="glass-panel border border-[var(--border-color)] flex flex-col h-full shadow-2xl">
                                <div class="p-3 border-b border-[var(--border-color)] bg-black/40 flex items-center justify-between">
                                    <h3 class="text-[9px] font-bold uppercase tracking-[0.2em] text-sofia">Agent Monitor</h3>
                                    <div class="flex gap-1">
                                        <span class="w-1.5 h-1.5 bg-sofia animate-pulse"></span>
                                    </div>
                                </div>
                                <div id="agent-activity-monitor" class="flex-grow-fix p-4 overflow-y-auto space-y-4 bg-black/20">
                                    <!-- Agent boxes will be injected here -->
                                </div>
                                <!-- Live Status Panel -->
                                <div id="live-activity-panel" class="p-4 border-t border-[var(--border-color)] bg-sofia/5 hidden">
                                    <div class="flex items-center justify-between mb-3">
                                        <span class="text-[9px] font-bold uppercase text-sofia tracking-widest">Global Link</span>
                                        <div class="w-2 h-2 bg-sofia animate-pulse"></div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <div class="flex items-center gap-2 bg-black/40 p-2 border border-[var(--border-color)] overflow-hidden">
                                            <div class="w-6 h-6 bg-sofia/10 flex items-center justify-center text-sofia shrink-0">
                                                <i data-lucide="bot" class="w-3 h-3"></i>
                                            </div>
                                            <div class="overflow-hidden">
                                                <div class="text-[8px] text-zinc-500 font-bold uppercase">Active</div>
                                                <div id="active-agent-name" class="text-[9px] text-zinc-300 font-mono truncate">-</div>
                                            </div>
                                        </div>
                                        <div class="flex items-center gap-2 bg-black/40 p-2 border border-[var(--border-color)] overflow-hidden">
                                            <div class="w-6 h-6 bg-zinc-900 flex items-center justify-center text-zinc-600 shrink-0">
                                                <i data-lucide="activity" class="w-3 h-3 animate-spin-slow"></i>
                                            </div>
                                            <div class="overflow-hidden">
                                                <div class="text-[8px] text-zinc-500 font-bold uppercase">State</div>
                                                <div id="active-agent-status" class="text-[9px] text-zinc-500 font-mono truncate italic">IDLE</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                </div>
            </div>
