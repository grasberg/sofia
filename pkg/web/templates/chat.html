<!-- CHAT TAB -->
            <div id="tab-chat" class="tab-content active">
                <div class="flex-grow-fix flex flex-col lg:flex-row gap-6">
                    <!-- Chat Area -->
                        <div class="flex-grow-fix flex flex-col glass-panel border border-[var(--border-color)] shadow-2xl">
                            <!-- Chat header: shows current session info + New Chat button -->
                            <div class="px-4 py-2 border-b border-[var(--border-color)] bg-black/30 flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <span class="text-[8px] text-zinc-700 font-bold uppercase tracking-widest">Session</span>
                                    <span id="chat-session-label" class="text-[9px] text-zinc-600 font-mono truncate max-w-[200px]">New conversation</span>
                                </div>
                                <button onclick="startNewChat()" title="New conversation"
                                    class="flex items-center gap-1 px-2 py-1 text-[9px] font-bold uppercase tracking-wider border border-[var(--border-color)] text-zinc-500 hover:border-sofia hover:text-sofia transition-all">
                                    <i data-lucide="plus" class="w-3 h-3"></i>
                                    <span class="hidden lg:inline">New Chat</span>
                                </button>
                            </div>

                            <div id="chat-history" class="flex-grow-fix overflow-y-auto p-4 lg:p-6 space-y-6">
                                <div class="flex gap-4 animate-fade-in">
                                    <div class="w-8 h-8 bg-sofia/10 border border-sofia/20 flex items-center justify-center shrink-0">
                                        <img src="/assets/sofiamantis.png" class="w-5 h-5 opacity-80">
                                    </div>
                                    <div class="chat-bubble-sofia px-4 py-3 text-xs leading-relaxed max-w-[85%] text-zinc-300">
                                        SYSTEM INITIALIZED. AWAITING INSTRUCTIONS.
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Input Area -->
                            <div class="p-4 bg-black/40 border-t border-[var(--border-color)]">
                                <!-- File preview strip -->
                                <div id="chat-file-preview" class="hidden mb-2 flex flex-wrap gap-2"></div>
                                <!-- Hidden file input -->
                                <input type="file" id="chat-file-input" multiple accept="*/*" class="hidden" onchange="handleFileAttach(this)">
                                <div class="relative flex items-center gap-2">
                                    <!-- Attach button -->
                                    <button onclick="document.getElementById('chat-file-input').click()" 
                                        title="Attach files"
                                        class="shrink-0 w-9 h-9 flex items-center justify-center border border-[var(--border-color)] text-zinc-500 hover:text-sofia hover:border-sofia/40 transition-colors">
                                        <i data-lucide="paperclip" class="w-4 h-4"></i>
                                    </button>
                                    <div class="relative flex-grow flex items-center">
                                        <input type="text" id="chat-input" placeholder="ENTER COMMAND..." 
                                            class="w-full bg-black border border-[var(--border-color)] rounded-none pl-4 pr-24 py-4 text-xs font-mono focus:outline-none focus:border-sofia/50 transition-all text-white placeholder:text-zinc-700">
                                        <div class="absolute right-3">
                                            <button onclick="sendChat()" class="btn-brutalist px-6 py-2 text-[10px]">

                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div class="mt-2 px-1 flex justify-between">
                                    <span class="text-[9px] text-zinc-700 font-bold uppercase">Ready for input</span>
                                    <span id="typing-indicator" class="text-[9px] text-sofia font-bold uppercase hidden animate-pulse">Sofia is thinking...</span>
                                </div>
                            </div>
                        </div>

                        <!-- Right Sidebar: Agent Monitor -->
                        <div id="agent-monitor-sidebar" class="w-full lg:w-80 shrink-0 flex flex-col h-64 lg:h-auto">
                            <div class="glass-panel border border-[var(--border-color)] flex flex-col h-full shadow-2xl">
                                <div class="p-3 border-b border-[var(--border-color)] bg-black/40 flex items-center justify-between">
                                    <h3 class="text-[9px] font-bold uppercase tracking-[0.2em] text-sofia">Agent Monitor</h3>
                                    <div class="flex gap-1">
                                        <span id="monitor-pulse" class="w-1.5 h-1.5 bg-zinc-600"></span>
                                    </div>
                                </div>
                                <!-- Persistent per-agent cards, built from /api/status -->
                                <div id="agent-card-list" class="flex-grow-fix p-3 overflow-y-auto space-y-2 bg-black/20">
                                    <!-- Cards injected by renderAgentCards() in layout.html -->
                                    <div class="text-[9px] text-zinc-700 italic text-center py-6">Loading...</div>
                                </div>
                                <!-- Scrolling live-log area, shown when any agent is active -->
                                <div id="agent-live-log" class="hidden border-t border-[var(--border-color)] bg-black/40 flex flex-col" style="max-height:160px">
                                    <div class="px-3 py-1.5 flex items-center justify-between border-b border-[var(--border-color)]/50">
                                        <span class="text-[8px] text-zinc-600 font-bold uppercase tracking-widest">Live Activity</span>
                                        <button onclick="document.getElementById('agent-live-log-lines').innerHTML=''" class="text-[8px] text-zinc-700 hover:text-zinc-500">clear</button>
                                    </div>
                                    <div id="agent-live-log-lines" class="overflow-y-auto flex-grow p-2 space-y-0.5 font-mono text-[9px] leading-relaxed"></div>
                                </div>
                            </div>
                        </div>
                </div>
            </div>

<script>
    // currentSessionKey: tracks the active web conversation.
    // Empty string = no conversation started yet (server will generate one on first send).
    let currentSessionKey = '';

    // setActiveSessionKey is called by the History tab's "Resume" button.
    function setActiveSessionKey(key) {
        currentSessionKey = key;
        updateSessionLabel();
        // Clear the DOM chat history so the user starts fresh in the UI
        // (the LLM context is loaded server-side from the persisted session).
        const historyEl = document.getElementById('chat-history');
        if (historyEl) {
            historyEl.innerHTML =
                '<div class="flex gap-4 animate-fade-in">' +
                '<div class="w-8 h-8 bg-sofia/10 border border-sofia/20 flex items-center justify-center shrink-0">' +
                '<img src="/assets/sofiamantis.png" class="w-5 h-5 opacity-80"></div>' +
                '<div class="chat-bubble-sofia px-4 py-3 text-xs leading-relaxed max-w-[85%] text-zinc-300">' +
                'SESSION RESUMED. CONTEXT LOADED FROM HISTORY.' +
                '</div></div>';
        }
        document.getElementById('chat-input').focus();
    }

    function startNewChat() {
        currentSessionKey = '';
        updateSessionLabel();
        const historyEl = document.getElementById('chat-history');
        if (historyEl) {
            historyEl.innerHTML =
                '<div class="flex gap-4 animate-fade-in">' +
                '<div class="w-8 h-8 bg-sofia/10 border border-sofia/20 flex items-center justify-center shrink-0">' +
                '<img src="/assets/sofiamantis.png" class="w-5 h-5 opacity-80"></div>' +
                '<div class="chat-bubble-sofia px-4 py-3 text-xs leading-relaxed max-w-[85%] text-zinc-300">' +
                'SYSTEM INITIALIZED. AWAITING INSTRUCTIONS.' +
                '</div></div>';
        }
        document.getElementById('chat-input').focus();
    }

    function updateSessionLabel() {
        const label = document.getElementById('chat-session-label');
        if (!label) return;
        if (!currentSessionKey) {
            label.textContent = 'New conversation';
            label.title = '';
        } else {
            // Show a short human-readable label
            const parts = currentSessionKey.split(':');
            // web:ui:2026-03-04T10:00:00Z → show date/time portion
            if (currentSessionKey.startsWith('web:ui:') && parts.length >= 3) {
                const ts = parts.slice(2).join(':');
                try {
                    const d = new Date(ts);
                    label.textContent = isNaN(d) ? ts : d.toLocaleString();
                } catch (_) {
                    label.textContent = ts;
                }
            } else {
                label.textContent = currentSessionKey;
            }
            label.title = currentSessionKey;
        }
    }
</script>
