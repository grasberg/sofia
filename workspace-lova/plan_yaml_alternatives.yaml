# Exempel på hur man använder YAML-filer med plan-verktyget

```bash
# Hypotetiskt kommando för att ladda en plan från YAML
# (kräver implementation)
# sofia plan import --file plan.yaml

# Hypotetiskt kommando för att exportera en plan till YAML
# sofia plan export --id plan-27 --format yaml > plan-27.yaml
```

