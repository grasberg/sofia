<!-- Header Component Template -->
<header class="lp-header">
  <div class="lp-header__container">
    <!-- Logo -->
    <div class="lp-header__logo">
      {{#if logo.src}}
        <a href="{{logo.href}}" class="lp-header__logo-link">
          <img src="{{logo.src}}" alt="{{logo.alt}}" class="lp-header__logo-image">
        </a>
      {{else}}
        <a href="{{logo.href}}" class="lp-header__logo-text">{{logo.text}}</a>
      {{/if}}
    </div>

    <!-- Navigation Menu -->
    <nav class="lp-header__nav">
      <ul class="lp-header__menu">
        {{#each menu}}
        <li class="lp-header__menu-item">
          <a href="{{href}}" class="lp-header__menu-link" {{#if target}}target="{{target}}"{{/if}}>{{label}}</a>
        </li>
        {{/each}}
      </ul>
    </nav>

    <!-- CTA Buttons -->
    <div class="lp-header__cta">
      {{#each cta}}
      <a href="{{href}}" class="lp-button lp-button--{{variant}} lp-header__cta-button" {{#if target}}target="{{target}}"{{/if}}>{{text}}</a>
      {{/each}}
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="lp-header__mobile-toggle" aria-label="Toggle menu">
      <span class="lp-header__mobile-toggle-icon"></span>
    </button>
  </div>
</header>
