<!-- Header Component Template -->
<header class="lp-header">
  <div class="lp-container">
    <div class="lp-header__inner">
      <!-- Logo -->
      <div class="lp-header__logo">
        {{#if logo.src}}
          <a href="{{logo.href}}" class="lp-header__logo-link">
            <img src="{{logo.src}}" alt="{{logo.alt}}" class="lp-header__logo-img">
          </a>
        {{else}}
          <a href="{{logo.href}}" class="lp-header__logo-text">{{logo.text}}</a>
        {{/if}}
      </div>

      <!-- Navigation Menu -->
      <nav class="lp-header__nav">
        <ul class="lp-header__menu">
          {{#each menu}}
          <li class="lp-header__menu-item">
            <a href="{{href}}" class="lp-header__menu-link" {{#if target}}target="{{target}}"{{/if}}>{{label}}</a>
          </li>
          {{/each}}
        </ul>
      </nav>

      <!-- CTA Buttons -->
      <div class="lp-header__actions">
        {{#each ctaButtons}}
        <a href="{{href}}" class="lp-button lp-button--{{variant}}" {{#if target}}target="{{target}}"{{/if}}>{{text}}</a>
        {{/each}}
      </div>

      <!-- Mobile Menu Toggle -->
      <button class="lp-header__toggle" aria-label="Toggle menu">
        <span class="lp-header__toggle-bar"></span>
        <span class="lp-header__toggle-bar"></span>
        <span class="lp-header__toggle-bar"></span>
      </button>
    </div>
  </div>
</header>
