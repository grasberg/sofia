<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niche Selection Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #000000;
            --color-secondary: #ffffff;
            --color-accent: #84cc16;
            --color-accent-dark: #65a30d;
            --color-gray-900: #111827;
            --color-gray-800: #1f2937;
            --color-gray-700: #374151;
            --color-gray-600: #4b5563;
        }
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: var(--color-secondary);
            color: var(--color-primary);
        }
        
        /* Brutalist border utility */
        .border-brutal {
            border: 2px solid var(--color-primary);
            box-shadow: 4px 4px 0px 0px var(--color-primary);
        }
        
        .border-brutal:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px var(--color-primary);
            transition: all 0.15s ease;
        }
        
        .border-brutal-accent {
            border: 2px solid var(--color-accent);
            box-shadow: 4px 4px 0px 0px var(--color-accent);
        }
        
        .border-brutal-accent:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px var(--color-accent);
            transition: all 0.15s ease;
        }
        
        /* Animation classes */
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--color-gray-900);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--color-accent);
            border: 2px solid var(--color-gray-900);
        }
    </style>
</head>
<body class="min-h-screen bg-white">
    <!-- Component will be inserted here -->
    <div id="component-container" class="min-h-screen p-4 md:p-8">
        {{COMPONENT_CONTENT}}
    </div>
    
    <script>
        // Add any shared JavaScript functionality here
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize any shared components
            console.log('Niche Selection Toolkit components loaded');
            
            // Add click handlers for brutalist buttons
            document.querySelectorAll('.btn-brutal').forEach(btn => {
                btn.addEventListener('mousedown', function() {
                    this.style.transform = 'translate(0, 0)';
                    this.style.boxShadow = '2px 2px 0px 0px var(--color-primary)';
                });
                
                btn.addEventListener('mouseup', function() {
                    this.style.transform = 'translate(-2px, -2px)';
                    this.style.boxShadow = '6px 6px 0px 0px var(--color-primary)';
                });
                
                btn.addEventListener('mouseleave', function() {
                    this.style.transform = 'translate(-2px, -2px)';
                    this.style.boxShadow = '4px 4px 0px 0px var(--color-primary)';
                });
            });
        });
    </script>
</body>
</html>
