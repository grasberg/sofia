server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/*log

  - job_name: auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          __path__: /var/log/auth.log

  - job_name: laravel
    static_configs:
      - targets:
          - localhost
        labels:
          job: laravel
          app: affiliate-system
          environment: production
          __path__: /var/www/html/storage/logs/*.log  # Laravel loggfiler

  - job_name: nextjs
    static_configs:
      - targets:
          - localhost
        labels:
          job: nextjs
          app: sofia-ops-app
          environment: production
          __path__: /var/log/nextjs/*.log  # Next.js loggfiler (om filbaserad)
    # Om Next.js loggar till stdout, använd Docker log driver eller systemd journal

  - job_name: mysql
    static_configs:
      - targets:
          - localhost
        labels:
          job: mysql
          __path__: /var/log/mysql/error.log

  - job_name: postgresql
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgresql
          __path__: /var/log/postgresql/*.log

  # Ytterligare loggar för nginx/apache
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          __path__: /var/log/nginx/*log

  - job_name: apache
    static_configs:
      - targets:
          - localhost
        labels:
          job: apache
          __path__: /var/log/apache2/*log