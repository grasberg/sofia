global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Prometheus själv
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter för server-mått
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Laravel app (om den exponerar mått via /metrics endpoint)
  - job_name: 'laravel-app'
    static_configs:
      - targets: ['host.docker.internal:8000'] # Anpassa till din applikationsadress
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Next.js app (om den exponerar mått)
  - job_name: 'nextjs-app'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 30s

  # Blackbox exporter för HTTP/HTTPS health checks (kan läggas till senare)
  # - job_name: 'blackbox'
  #   metrics_path: /probe
  #   params:
  #     module: [http_2xx]
  #   static_configs:
  #     - targets:
  #       - https://example.com
  #       - https://api.example.com
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: __param_target
  #     - source_labels: [__param_target]
  #       target_label: instance
  #     - target_label: __address__
  #       replacement: blackbox-exporter:9115

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']