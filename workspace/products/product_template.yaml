# Product Template Structure
# Core template with optional modules for digital products

# === CORE SECTION (Required) ===
core:
  # Basic product information
  name: "Product Name"
  short_description: "Brief product description for listings"
  full_description: |
    Detailed product description in Markdown format.
    Supports multiple paragraphs, lists, and formatting.
  
  # Pricing
  price:
    amount: 99
    currency: SEK
    # Optional: tiered pricing
    tiers:
      - name: "Basic"
        amount: 99
        features: ["Core product"]
      - name: "Premium" 
        amount: 149
        features: ["Core product", "Bonus materials", "Updates"]
  
  # Product type and delivery
  type: "digital_download"  # digital_download, course, software, template
  delivery_method: "direct_download"
  license: "personal_commercial"  # personal, personal_commercial, commercial
  
  # Files
  files:
    main:
      source: "product.md"  # Source Markdown file
      output: "product.pdf" # Generated output file
      format: "pdf"
    bonus:
      - source: "bonus.md"
        output: "bonus.pdf"
        format: "pdf"
      - source: "guide.md"
        output: "guide.pdf"
        format: "pdf"
  
  # Categories and tags
  category: "Writing & Publishing"
  subcategory: "Writing Tools"
  tags: ["ai", "prompts", "creative", "writing"]

# === OPTIONAL MODULES ===
modules:
  # Module: Bonus materials
  bonus_materials:
    enabled: false
    materials:
      - name: "Extra Prompts Pack"
        description: "Additional prompts for advanced users"
        file: "bonus_extras.pdf"
      - name: "Usage Guide"
        description: "Detailed guide on how to use the product"
        file: "usage_guide.pdf"
  
  # Module: Pricing campaigns
  campaigns:
    enabled: false
    launch_discount:
      enabled: true
      percentage: 20
      duration_days: 30
    coupon_codes:
      - code: "WELCOME10"
        percentage: 10
        expires: "2026-04-30"
  
  # Module: Upsell/Cross-sell
  upsells:
    enabled: false
    products:
      - product_id: "product_2"
        name: "Advanced Prompts Bundle"
        discount: 15  # percentage discount when bought together
  
  # Module: Affiliate program
  affiliate:
    enabled: true
    commission_rate: 7  # percentage
    cookie_duration: 30  # days
  
  # Module: Email integration
  email:
    enabled: false
    sequences:
      - trigger: "purchase"
        days_after: 0
        subject: "Thank you for your purchase!"
        template: "welcome_email.md"
      - trigger: "purchase"
        days_after: 7
        subject: "How's it going with the product?"
        template: "followup_email.md"
  
  # Module: Platform-specific settings
  gumroad:
    enabled: true
    settings:
      visibility: "public"
      purchase_type: "fixed_price"  # fixed_price, pay_what_you_want
      quantity: "unlimited"
      custom_permalink: ""  # optional
      thumbnail: "thumbnail.jpg"  # 1200x630px
    
  # Module: Build configuration
  build:
    enabled: true
    scripts:
      - name: "generate_pdf"
        command: "./build-scripts/generate-pdf.sh"
        inputs: ["product.md"]
        outputs: ["product.pdf"]
    dependencies:
      - pandoc
      - weasyprint
  
  # Module: Testing
  testing:
    enabled: true
    tests:
      - name: "price_validation"
        script: "test_price.py"
      - name: "file_exists"
        script: "test_files.py"

# === METADATA ===
metadata:
  version: "1.0.0"
  created: "2026-03-19"
  updated: "2026-03-19"
  author: "Digital Products Business"
  language: "sv"  # sv, en, etc.