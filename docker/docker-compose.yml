services:
  # ─────────────────────────────────────────────
  # Sofia Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm sofia-agent -m "Hello"
  # ─────────────────────────────────────────────
  sofia-agent:
    image: docker.io/sipeed/sofia:latest
    container_name: sofia-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.sofia
    entrypoint: ["sofia", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Sofia Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml up sofia-gateway
  # ─────────────────────────────────────────────
  sofia-gateway:
    image: docker.io/sipeed/sofia:latest
    container_name: sofia-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.sofia
